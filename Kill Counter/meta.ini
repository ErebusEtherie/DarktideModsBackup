nexusDescription="Let me know any feedback in the comments! I would love to improve this mod to benefit the Warhammer 40k community!\n<br />\n<br />Kill Counter is a lightweight HUD mod for Darktide that adds a live mission kill tracker in the top-right of your screen.\n<br />\n<br />Built to be clear without being distracting, it gives you a constant read on your personal kill count while keeping the default UI clean and readable. The counter updates in real time as you kill enemies and is positioned to avoid major HUD elements as much as possible.\n<br />\n<br />What it does[list]\n<br />[*]Displays a live Kills counter on the HUD during gameplay.\n<br />[*]Tracks your personal kills (not team total).\n<br />[*]Updates immediately on each confirmed enemy kill.\n<br />[*]Resets automatically when a new gameplay run begins.\n<br />[*]Hides itself outside active mission gameplay (so it doesn’t clutter hub/menu flow).\n<br />[/list]"
