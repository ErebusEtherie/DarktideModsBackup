nexusDescription="[color=#00ffff][b]ErrorTracker[/b] is a full crash detection and diagnostics system built specifically for Darktide modding.[/color][color=#00ffff]It is designed to eliminate guesswork when something breaks — whether it's a standard Lua error or a full game crash.[/color][line][color=#00ffff] What it does[/color][color=#00ffff]Detects Lua / Mod Errors (Exact)[/color][color=#00ffff]When a mod throws an error:[/color][list]\n<br />[*][color=#00ffff]captures the [b]exact mod responsible[/b][/color]\n<br />[*][color=#00ffff]logs the [b]error message[/b][/color]\n<br />[*][color=#00ffff]includes a full [b]stack trace[/b][/color]\n<br />[*][color=#00ffff]saves everything to a readable report file\n<br />[/color]\n<br />[/list][color=#00ffff] Reports are saved to:[/color][color=#00ffff]mods/ErrorTracker/reports/[/color][line][color=#00ffff] Handles Hard Crashes (Game closes instantly)[/color][color=#00ffff]For crashes that normally give you zero information:[/color][list]\n<br />[*][color=#00ffff]tracks real-time mod execution\n<br />[/color]\n<br />[*][color=#00ffff]records recent mod activity\n<br />[/color]\n<br />[*][color=#00ffff]analyzes the final moments before the crash\n<br />[/color]\n<br />[/list][color=#00ffff]On next launch, ErrorTracker will:[/color][list]\n<br />[*][color=#00ffff]detect the crash occurred\n<br />[/color]\n<br />[*][color=#00ffff]identify the [b]most likely mod responsible[/b][/color]\n<br />[*][color=#00ffff]show a [b]ranked list of suspects[/b][/color]\n<br />[*][color=#00ffff]generate a recovery report\n<br />[/color]\n<br />[/list][line][color=#00ffff] Smart Crash Analysis[/color][color=#00ffff]Instead of blaming random mods, ErrorTracker:[/color][list]\n<br />[*][color=#00ffff]filters out DMF/internal noise\n<br />[/color]\n<br />[*][color=#00ffff]ignores startup spam\n<br />[/color]\n<br />[*][color=#00ffff]prioritizes meaningful runtime activity\n<br />[/color]\n<br />[*][color=#00ffff]focuses on the most relevant mod actions before the crash\n<br />[/color]\n<br />[/list][line][color=#00ffff] Auto-Disable System[/color][color=#00ffff]If a mod crashes repeatedly:[/color][list]\n<br />[*][color=#00ffff]ErrorTracker can automatically disable it\n<br />[/color]\n<br />[*][color=#00ffff]prevents crash loops\n<br />[/color]\n<br />[*][color=#00ffff]helps stabilize your game quickly\n<br />[/color]\n<br />[/list][line][color=#00ffff] Files Generated[/color][list]\n<br />[*][code][color=#00ffff]reports/[/color][/code][color=#00ffff] → full crash reports (Lua + recovery)[/color]\n<br />[*][code][color=#00ffff]last_trace.txt[/color][/code][color=#00ffff] → recent mod activity[/color]\n<br />[*][code][color=#00ffff]last_mod.txt[/color][/code][color=#00ffff] → last meaningful mod before crash[/color]\n<br />[*][code][color=#00ffff]last_session.txt[/color][/code][color=#00ffff] → crash detection state[/color]\n<br />[/list][line][color=#00ffff] Important Notes[/color][list]\n<br />[*][color=#00ffff]Lua crashes = [b]100% accurate detection[/b][/color]\n<br />[*][color=#00ffff]Hard crashes = [b]best possible detection (engine limitations apply)[/b][/color]\n<br />[*][color=#00ffff]Does NOT modify gameplay — this is a [b]pure utility/debug tool[/b][/color]\n<br />[/list][line][color=#00ffff] Why use ErrorTracker?[/color][color=#00ffff]Without it:[/color][list]\n<br />[*][color=#00ffff]you guess which mod broke your game\n<br />[/color]\n<br />[*][color=#00ffff]you disable mods randomly\n<br />[/color]\n<br />[*][color=#00ffff]you waste time troubleshooting\n<br />[/color]\n<br />[/list][color=#00ffff]With it:[/color][list]\n<br />[*][color=#00ffff]you know exactly what happened\n<br />[/color]\n<br />[*][color=#00ffff]you know where it happened\n<br />[/color]\n<br />[*][color=#00ffff]you know which mod caused it\n<br />[/color]\n<br />[/list][line][color=#00ffff] Designed for:[/color][list]\n<br />[*][color=#00ffff]mod users with large load orders\n<br />[/color]\n<br />[*][color=#00ffff]mod developers debugging their work\n<br />[/color]\n<br />[*][color=#00ffff]anyone tired of mystery crashes [/color]\n<br />[/list]"
