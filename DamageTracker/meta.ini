nexusDescription="[size=4][b]Description[/b][/size]\n<br />[color=#a4c2f4]Damage Tracker provides real-time combat feedback by tracking your outgoing damage directly on the HUD. It features both static damage totals for comprehensive session tracking and dynamic floating combat text (FCT) for immediate impact visualization, including specialized indicators for weakspots and critical strikes.[/color]\n<br />\n<br />[size=4][b]Main features[/b][/size]\n<br />[color=#a4c2f4]Dual Tracking Systems:[/color]\n<br />\n<br />[list]\n<br />[*][color=#a4c2f4]Simultaneously monitor static combat totals and dynamic floating combat text.[/color][/*]\n<br />[/list][color=#a4c2f4]Highly Customizable HUD :[/color]\n<br />\n<br />[list]\n<br />[*][color=#a4c2f4]Fully adjustable UI elements, including color schemes, text sizes, and icon choices for every damage type.[/color][/*]\n<br />[/list][color=#a4c2f4]Finesse &amp; Weakspot Indicators :[/color]\n<br />\n<br />[list]\n<br />[*][color=#a4c2f4]Separate styles for critical hits, weakspot hits, and the combination of both to highlight your precision.[/color][/*]\n<br />[/list][color=#a4c2f4]DoT Support:[/color]\n<br />\n<br />[list]\n<br />[*][color=#a4c2f4]Specialized tracking for damage-over-time effects (e.g., Burn, Bleed), with options to merge them with direct damage or display them separately.[/color][/*]\n<br />[/list][color=#a4c2f4]Mod language: EN, ZH-CN [/color]\n<br />\n<br />[size=4][b]Future[/b][/size]\n<br />[list]\n<br />[*][color=#a4c2f4]Optimize performance, optimize display details and effects[/color][/*]\n<br />[/list][size=4][b]Shout outs[/b][/size]\n<br />[color=#a4c2f4]Inspired by creator dazen's mod:Kill Tracker[/color]"
