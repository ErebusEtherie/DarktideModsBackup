nexusDescription="Shows a scoreboard after missions and additional messages for certain actions during gameplay.\n<br />Saves scoreboards for later review.\n<br />Loads scoreboard rows defined in other mods.\n<br />\n<br />Known plugins\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/113]Scoreboard Explosive[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/126]Scoreboard Damage\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/187]Scoreboard Enhanced Defense Plugin\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/144]Scoreboard Ammunitions Picked[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/160]Loadout Monitor\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/241]Ovenproof's Scoreboard Plugin\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/258]Scoreboard Tag Counter\n<br />[/url]\n<br />Installation\n<br />- Install DML ( Darktide Mod Loader ) and DMF ( Darktide Modding Framework )\n<br />﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/19]Darktide Mod Loader\n<br />[/url]﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/8]Darktide Modding Framework[/url]\n<br />- Install Animation Events\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/21]  ﻿Animation Events\n<br />[/url]\n<br />Vortex Installation\n<br />- Install from file using Vortex, activate mod under load order and deploy\n<br />[url=https://github.com/danreeves/vortex-extension-darktide]  ﻿Darktide-Vortex-Extension[/url]﻿\n<br />- Switch to the Tab \"Load Order\" in Vortex and activate the mods there.\n<br />\n<br />You don't need vortex to install this but it's probably the easiest way to manage the load order.\n<br />\n<br />Manual installation\n<br />- Extract folder \"scoreboard\" to \"Warhammer 40,000 DARKTIDE&#92;mods\"\n<br />- Add \"scoreboard\" to \"mod_load_order.txt\"\n<br />\n<br />Languages\n<br />- English\n<br />- German\n<br />- Russian\n<br />- Chinese\n<br />- French\n<br />\n<br />Thanks to\n<br />- Grimalackt ( Help porting code )\n<br />- deluxghost ( chinese translation )\n<br />- Konok0 ( russian translation )\n<br />- XenoDaimon ( french translation )\n<br />- xsSplater ( Updates )\n<br />- Backup158 ( Updates )\n<br />\n<br />Changelog\n<br />\n<br />2.18\n<br />﻿Update by [url=https://www.nexusmods.com/warhammer40kdarktide/users/127776653]deluxghost[/url]\n<br />﻿Fixed Karnak Twins not detected as boss.\n<br />﻿Updated mission information and text support in scoreboard history\n<br />2.17\n<br />  ﻿Update by [url=https://www.nexusmods.com/users/12367324]MrCraime[/url]\n<br />﻿Fixed chaos spawn not detected as boss.\n<br />Added mission information and text support in scoreboard history\n<br />2.16\n<br />  ﻿Fixed chaos spawn not detected as boss.\n<br />﻿Fixed revived / rescued operatives row.\n<br />﻿Added messages for reviving / rescuing operatives.\n<br />﻿Prevent scoreboard in tactical overview in hub.\n<br />2.15\n<br />﻿Fixed indentation bug\n<br />﻿Compatibility for inventorystats mod\n<br />2.14\n<br />﻿Added maximum scoreboard height option thx @SicongLiuSimon for idea\n<br />﻿Dynamically scoreboard height calcuation\n<br />2.13\n<br />﻿Added dev mode\n<br />﻿  ﻿Added possibility to test scoreboard with current rows\n<br />﻿Changed overkill damage to descending row\n<br />﻿Option for tactical overview feature\n<br />2.12\n<br />﻿Added french translation thx @XenoDaimon\n<br />2.11\n<br />﻿Scoreboard in tactical overlay\n<br />﻿Class symbols in history entry text\n<br />﻿Dynamic text length calculation for generated texts\n<br />﻿Tactical overlay usable in meat grinder\n<br />2.1\n<br />﻿Added class symbol to player name\n<br />﻿Added icons back in ( only for forge material atm )\n<br />2.09\n<br />﻿Added mission info to history files\n<br />﻿Mission name shown in history\n<br />﻿Added alternate column colors to scoreboard\n<br />2.08\n<br />﻿Scoreboard now loads its own rows before any plugin rows.\n<br />2.07\n<br />﻿Fixed custom score rows not being localized in history.\n<br />﻿Changed formatting of date in history thx @deluxghost\n<br />  ﻿Fixed save time not being local timethx @deluxghost\n<br />2.06\n<br />  ﻿Fixed score calculation problems\n<br />﻿Completed chinese translation thx @deluxghost\n<br />﻿Added alternative russian translation thx @xsSplater\n<br />2.05\n<br />﻿Localized messages\n<br />﻿Added russian translation thx @Konok0\n<br />2.04\n<br />﻿Hotfix for crash when scoreboard is saved.\n<br />2.02\n<br />﻿Hotfix for crash when scoreboard should appear.\n<br />2.01\n<br />﻿Hotfix for coherency efficiency and carrying stuff not working.\n<br />2.0\n<br />﻿Redesign\n<br />﻿Modularity\n<br />﻿Localization\n<br />﻿Added history\n<br />1.0\n<br />﻿Initial release"
