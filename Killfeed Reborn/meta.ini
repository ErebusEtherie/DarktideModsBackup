nexusDescription="Yes, I rewrote this again. Reading is not something everyone wants to do so I shortened it for your viewing pleasure.\n<br />\n<br />[b][u]Mod Description:[/u][/b]\n<br />This mod is a combat-feed replacement with Kill Messages related to the damage type you used to kill a target and Death Messages picked based on what target dealt the final blow to you. It is highly customizable, users can change the color of every part of the message and see that color change displayed in real time in the settings page. You can adjust how many messages are shown on screen and for how long, you can even have it show only your own kills and deaths in the combat-feed should you wish.\n<br />\n<br />[u][b]Features:[/b][/u]\n<br />[list]\n<br />[*]Color setting for each party member\n<br />- “Killer #” These are applied semi randomly just like vanilla. It's based on the party slot the player joins in on.[/*]\n<br />[*]Color setting for each part of the message\n<br />- Kill &amp; Death Phrase have separate color settings\n<br />\n<br />[/*]\n<br />[/list][u][b]Behind the scene features:[/b][/u]\n<br />- There’s a system in place that prevents a phrase from being reused. There are 11 damage type categories with 15 phrases in each, the system will not reuse a phrase till all 15 in said category are used once. This also applies to phrases related to Death Messages.\n<br />\n<br />\n<br />[b][u]NOTICE:[/u] [/b]This still is not perfect, so I left my debug tools in for anyone who wants to help improve the accuracy of the kill messages. Feel free to reach out in the comments or PM me if you are interested, or just to tell me how bad of a modder I am because well you would be right… I'm not a modder, I am just having fun and exploring this for entertainment.\n<br />\n<br />"
