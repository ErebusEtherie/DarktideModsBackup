nexusDescription="[b][size=5]1. MOD Description[/size][/b]\n<br />This mod's primary function is to automatically throw knives when the Zealot is equipped with throwing knives and switches to\n<br /> a ranged weapon. It is mainly applicable to ranged weapons with slower \n<br />swap speeds, such as the Bolter and Flamer.\n<br />[b][size=5]2. MOD Use Case[/size][/b]\n<br />It allows you to throw knives at special enemies you spot while switching weapons. For example, when you are attacking horde \n<br />enemies with a melee weapon and spot a special enemy like a Trapper, \n<br />switching to your ranged weapon will automatically throw a knife to \n<br />either kill the target directly or interrupt their action, allowing you \n<br />to then finish them off with your ranged weapon.\n<br />[b][size=5]3. MOD Settings[/size][/b]\n<br />The mod supports a customizable hotkey to toggle the feature on or off. The weapon options in the mod interface determine on \n<br />which ranged weapons the auto-throw feature is active when switching. \n<br />The throw delay is generally best set to 0.\n<br />[size=5]1.MOD介绍[/size]\n<br />这款Mod的主要功能是当狂信徒装备飞刀时，切换到远程武器时自动投掷飞刀。主要适用于切换速度慢的远程武器比如爆弹枪和喷火器。 \n<br />[size=5]2.MOD使用场景 [/size]\n<br />切换武器的同时投掷飞刀攻击你发现的特殊敌人，当你在使用近战武器攻击杂兵敌人时发现特殊敌人比如捕网手，这时候切换远程武器同时自动使用飞刀直接击杀目标或者打断目标动作再用远程武器击杀目标。\n<br /> [size=5]3.MOD设置[/size]   \n<br />mod支持自定义快捷键启用与否，mod界面的武器选项则是设置在哪些远程武器上启用切换时自动投掷飞刀功能。投掷延迟一般设置为0就好。"
