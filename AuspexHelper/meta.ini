nexusDescription="[b]UNFORTUNATELY, DUE TO  PERSONAL TIME CONSTRAINTS, I HAVE HAD LESS TIME TO UPDATE THIS MOD TO THE LATEST PATCHES. NOTE: ISSUES WILL BE FIXED JUST A BIT LONGER THAN EXPECTED AFTER I ' M HAPPY WITH 1.0.2 STABILITY - ETA BY APRIL\n<br />\n<br />Description:[/b]\n<br />Auspex Hub is a combined scanner, minigame, and expeditions minimap helper mod built from the credited works below, with added QOL, cleanup, unified settings, practice mode, overlay/item display options, additional customization, and release-focused fixes.\n<br />\n<br />It combines scan outlines, scanner visibility QoL, auto-decode helper, drill/tree helper, Rolling Steel balance autobalancer, and a practice system into a single hub mod. Specific minigames can be disabled or fine-tuned to preference.\n<br />\n<br />[list]\n<br />[*][b]For setting demonstrations, check the images tab of this mod, and read the Tutorial section at the bottom of this description.[/b]\n<br />[/list][b]\n<br />[list]\n<br />[*][b]Mods that interact/modify the functionality of minigames have a chance to conflict with this mod. You can disable any specific features/minigames of this mod to your liking if you prefer other mods over the ones implemented here[/b]\n<br />[/list]\n<br />[list]\n<br />[*][b]Note: If you are using my standalone mod, [url=https://www.nexusmods.com/warhammer40kdarktide/mods/764]MatchingMinigameSolver[/url], please disable it from your load order as AuspexHelper already includes it. [/b]\n<br />[/list][/b]\n<br />[b]Credits: - To be fair to them please download and endorse their mods as a gesture of thank you[/b]\n<br />ScanHelper fix:   ﻿   ﻿   ﻿   ﻿    ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/657]ScanHelper[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/3525651]Saigofu[/url]\n<br />Original ScanHelper:   ﻿   ﻿   ﻿   ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/352]Scan Helper[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/196519226]yinhaox[/url]\n<br />Transparency Methods:           [url=https://www.nexusmods.com/warhammer40kdarktide/mods/84]Scanner Darkly - Caption Transparency while using Auspex[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/1753087]Wobin[/url]\n<br />Sliding Icon Solver Methods:   ﻿   ﻿  [url=https://www.nexusmods.com/warhammer40kdarktide/mods/426]Decode Minigame Solver[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/1451988]igromanru[/url]\n<br />Rolling Steel Solver Methods:    ﻿     [url=https://www.nexusmods.com/warhammer40kdarktide/mods/420]Train Solver[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/63873646]Sephirothphoenix[/url]\n<br />Visibility Methods:                               [url=https://www.nexusmods.com/warhammer40kdarktide/mods/632]Let me see my scanner (Auspex)[/url] by SashimiChefCat and [url=https://www.nexusmods.com/warhammer40kdarktide/users/209632444]IndicaBunny\n<br />[/url]Drill/Tree methods:   ﻿   ﻿   ﻿   ﻿ [url=https://www.nexusmods.com/warhammer40kdarktide/mods/369]Tree Helper[/url]﻿ by [url=https://www.nexusmods.com/profile/d3fallt]d3fallt[/url]\n<br />\n<br />[b]Auspex Helper[/b] is a scanner helper and practice mod for Darktide. It supports current auspex-related objectives and minigames, lets you choose whether to show them on the physical item or as a centered overlay, and gives you a practice launcher so you can rehearse minigames anywhere with a hotkey for practice or for something to do while you wait.\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773805034-495868136.png[/img]\n<br />\n<br />[b]Current minigames:[/b]\n<br />- Scanner outlines\n<br />- Decode Symbols\n<br />- Drill / Tree (Hab Drayko)\n<br />- Frequency\n<br />- Balance (Rolling Steel)\n<br />- Expeditions 2x2 Matching Minigame -&gt;[b] Beyond The Hive Update[/b]\n<br />\n<br />\n<br />[b]Core Features:[/b][list]\n<br />[*][b]Scanner outlines[/b] with display mode selection: Highlight, Icon, or Both\n<br />[*]Custom color controls for outlines\n<br />[*][b]Minigame display mode toggle: [/b]use the auspex i[b]tem[/b] itself or a centered [b]overlay[/b]\n<br />[*]Overlay scale control and black background opacity control\n<br />[*]Optional overlay decoration/sonar lines toggle to hide stock scanner icons around the minigame\n<br />[*]Scanner HUD visibility/transparency controls while using the auspex or overlay\n<br />[*]Caption opacity control for scanner use\n<br />[*]Decode Symbols / Tree (Drill) / Expeditions helper overlay\n<br />[*]Decode Symbols/Frequency/Tree/Balance autosolve option with timing, strength, and precision tune\n<br />[*]All autosolvers are [b]OFF[/b] by default and must be enabled through settings\n<br />[*][b]Practice Mode with hotkey (DEFAULT KEY F8)[/b]\n<br />[*]Practice support for Decode, Drill / Tree, Frequency, Expeditions 2x2 Match and Balance. Games can be changed through the dropdown in settings, and started using the hotkey\n<br />[*]Practice sessions randomize their patterns\n<br />[*]Per-minigame master toggles so you can completely disable specific paths\n<br />[*]Global mod override toggle\n<br />[/list]\n<br />\n<br />[b]Usage and Practice Minigames:[/b]\n<br />[list]\n<br />[*]Enable Auspex Hub in DMF\n<br />[*]Open mod settings and choose which scanner/minigame paths you want active\n<br />[*]Set [b]Minigame display mode[/b] to [b]Item[/b] if you want the normal scanner presentation, or [b]Overlay[/b] if you want the minigame centered on screen\n<br />[*]Use the [b]Practice[/b] group to choose a minigame and bind a hotkey\n<br />[*]Press the practice hotkey to start a practice session anywhere; if you are not in the offline lobby, it will usually default to Overlay mode.\n<br />[*]You can practice in the hub, offline lobby, in-game, during a gunship ride, results screen, and pre-mission lobby\n<br />[*]Press the hotkey again to close practice\n<br />[*]If you only want help for certain activities, disable the others in the top Enable group\n<br />[/list]\n<br />\n<br />[b]Performance Notes:[/b]\n<br />[list]\n<br />[*]This mod is generally lightweight, but overlay mode and extra UI drawing still add some UI work\n<br />[*]Icon + highlight world scan mode can be slightly heavier than using only one mode\n<br />[*]Practice mode is a local UI/gameplay simulation and is intended for practice or a fun downtime game. [b]It has some difficulty sliders and adjustments, as well as a custom 12-row mode for the Decode Symbol minigame (better in overlay)[/b]\n<br />[/list]\n<br />\n<br />[b]Installation:[/b]\n<br />[list]\n<br />[*]Extract into: ..&#92;Steam&#92;steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE&#92;mods\n<br />[*]Folder path should be: ...&#92;mods&#92;AuspexHelper\n<br />[*]Ensure Darktide Mod Framework (DMF) is installed\n<br />[*]Add AuspexHelper in your mod load order, ideally below other UI mods, but not necessary in most cases\n<br />[*]Launch the game, open the mod menu, and enable Auspex Helper in mod options if it's not already enabled\n<br />[/list]\n<br />\n<br />[b]Compatibility / Limitations:[/b]\n<br />[list]\n<br />[*]If another mod hooks the same scanner/minigame UI or input flow, behavior can conflict\n<br />[*]Practice support is currently intended for the supported scanner minigames only\n<br />[*]If item-mode practice cannot create a valid scanner state on a given build, overlay mode may be more reliable\n<br />[/list]\n<br />\n<br />[b]Changelog:[/b]\n<br />[list]\n<br />[*]1.0.0 - Initial release of Auspex Helper\n<br />[/list]\n<br />[b]Suggestions/Improvements[/b]\n<br />[list]\n<br />[*]All work can be shared and used in other mods with just credit to the authors who paved the way for this mod to be possible from the [b]Credit[/b] section.\n<br />[*]Requested features and improvements are always welcome\n<br />[/list]\n<br />\n<br />[b]Bug Report:[/b]\n<br />[list]\n<br />[*]Attach latest log from: ..&#92;AppData&#92;Roaming&#92;Fatshark&#92;Darktide&#92;console_logs\n<br />[*]Include the Script Error section if one exists\n<br />[*]Include which minigame path was active: World Scan / Decode / Drill / Frequency / Balance / Practice\n<br />[*]Include whether you were using [b]Item[/b] or [b]Overlay[/b] mode\n<br />[*]Include reproduction steps and whether the problem happens in live gameplay or auspex practice mode\n<br />[*]Add screenshot/video when possible\n<br />[*]To open AppData quickly: type %appdata% in Windows search and press Enter\n<br />[/list]\n<br />\n<br />[b]Overview Settings / Customization[/b]:\n<br />[list]\n<br />[*]Enable: Enable mod, Scanner Outlines, Scanner View, Decode Symbols, Drill and Tree, Frequency, Balance, Expedition placeholder, Practice\n<br />[*]Practice: Choose a practice minigame and assign the start/close hotkey\n<br />[*]World Scans: Display mode (Highlight/Icon/Both), RGB color, alpha\n<br />[*]Scanner View: Item or Overlay mode, overlay scale, overlay background opacity, show/hide scanner decorations\n<br />[*]Scanner HUD Fade: transparency amount, smooth fade, fade duration, caption opacity\n<br />[*]Scanner HUD Hide: crosshair, crosshair HUD, dodge counter, dodge count, stamina, ability icons, buff bars\n<br />[*]Decode Symbols: helper toggle, autosolve toggle, interact cooldown, target precision, future row reveal count\n<br />[*]Drill / Tree: helper toggle\n<br />[*]Balance: autosolve toggle and autosolve strength\n<br />[*]Minigame UI Color: RGB + alpha controls for helper overlays inside scanner minigames\n<br />[/list]\n<br />[b]Tutorial:[/b]\n<br />\n<br />[list]\n<br />[*]The [b]Enable[/b] settings group provides an overall override to enable functionality for the entire mod or for individual minigames. If disabled, it will use the default game logic and UI mechanics. This will also disable the minigames from working in practice mode.\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773636513-1281896860.png[/img]\n<br />\n<br />[list]\n<br />[*][b]Practice Mode: [/b]Below are settings for one-shot practice minigame of your choice, through a configurable dropdown and a hotkey to start the practice game, defaulted at F8. As well as a few configurable difficulty sliders for an extra challenge, these sliders do not affect actual in-mission minigames; they only affect practice mode.\n<br />[/list]\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773555323-383987606.png[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773555279-1396628860.png[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773691268-2016456906.png[/img]\n<br />﻿\n<br />[list]\n<br />[*]Minigames such as [b]Sliding Frame (Decode Symbol)[/b], [b]Hab Drako Tree (Drill),[/b] and the new [b]Expeditions 2x2 Decode Symbol match[/b] have options to preview the correct symbol/node that needs to be selected\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773771695-2143023025.png[/img]\n<br />\n<br />[list]\n<br />[*][b]Scanner Outlines: [/b]Scanner outline settings for the in-world highlighting of objects that are needed to scan across various missions.﻿\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773555425-756797949.png[/img]\n<br />\n<br />[list]\n<br />[*][i]Always show if available, [/i]will [b]always show[/b] icons/markers even if you have not equipped the Auspex scanner. By default, this is turned off for better immersion\n<br />[*]Scanner can be used in overlay or default vanilla mode\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773558930-324935839.png[/img]\n<br />\n<br />[list]\n<br />[*][i]See through walls[/i], when disabled attempts to mask as much as I could the overlay. A slight out-of-light hint is still visible and can be even further masked with tuning, but I believe it is close enough to be almost invisible. Color and opacity can be adjusted with the RGBA slider\n<br />[/list]﻿[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773559771-113390034.png[/img]\n<br />\n<br />[list]\n<br />[*]﻿Highlight has 3 Display Mode styles:[b] Icon, Highlights (outlines), or Both[/b]\n<br />[/list][b]\n<br />[/b][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773572618-915129692.png[/img]\n<br />\n<br />[list]\n<br />[*][b]Scanner View﻿: ﻿[/b]Scanner can be set into two modes, Item (vanilla) or Overlay. The default is Overlay, and note that this will effect ingame real minigames and practice minigames, it will NOT affect outline scanner overlay settings.\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773573642-38604002.png[/img]\n<br />\n<br />[list]\n<br />[*]You can adjust the color, size, and transparency of the overlay minigame UI to your preference\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773575340-872473166.png[/img]\n<br />\n<br />[list]\n<br />[*]﻿Decorations are stylized symbols from the vanilla minigame's UI. They are disabled by default, but can be re-enabled if one likes their style\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773578970-117780436.png[/img]\n<br />\n<br />[list]\n<br />[*]Decode Symbol, Expedition, and Drill (Hab Drako) minigames have an option to highlight the next correct input; it is enabled by default\n<br />[*]For the Hab Drako tree minigame, an arrow icon is added to show the correct next movement. Additionally, the sonar decorations can be enabled/disabled\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773578376-718495441.png[/img]\n<br />\n<br />[list]\n<br />[*][b]Expeditions Minimap: [/b]Can be set to overlay or item mode. Additionally, an on-screen minimap can be set to always be available; its position and size can be adjusted in the settings. Minimap is separate from overlay/item auspex in your inventory; you can still have both at the same time.\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773779113-633936721.jpg[/img]﻿\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773779113-472293118.jpg[/img]﻿[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773766404-1904760838.jpg[/img]﻿[list]\n<br />[*][b]Expedition Minimap[/b]: Includes settings for removing teammate arrows, showing items on minimap, and changing transparency/size of said item\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773877568-1345976841.jpg[/img]﻿\n<br />[list]\n<br />[*][b]Expeditions Solver:[/b] The chest minigame can be set to show the correct symbols required to match. Additionally, an autosolver can complete it for you with a specified input speed desired﻿\n<br />[/list][b]\n<br />\n<br />\n<br />[/b][list]\n<br />[*][b]Frequency [/b]minigame has the option to show directional assistance arrows for the proper direction to tune your frequencies, which can be turned on/off in the settings\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773635963-531335395.png[/img]\n<br />﻿\n<br />[list]\n<br />[*][b]Practice Minigames: [/b]All minigames can be practiced during loading, character select, hub, pre-lobby, results screen, offline matches, and online matches (audio may be silent in some modes).\n<br />[/list][img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773578244-747816835.jpg[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773550665-1861529376.jpg[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773550665-994142555.jpg[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773550667-1360671734.jpg[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/757/757-1773756598-1943602593.jpg[/img]"
