nexusDescription="[size=4][b]Work In Progress[/b][/size]\n<br />This mod is under active development. Features may change, and runtime toggling of environment effects is experimental.\n<br />\n<br />[size=4][b]Note[/b][/size]\n<br />If you want flashlights on weapons that don't have them, check out [i]Emperor's Lantern[/i] by leer: https://www.nexusmods.com/warhammer40kdarktide/mods/626\n<br />\n<br />[size=4][b]Overview[/b][/size]\n<br />Enables custom control of map-based light sources and environmental shading effects. Configurable light selection, flicker behaviors, and environment blocking for special mission types.\n<br />\n<br />[size=4][b]Features[/b][/size]\n<br />\n<br />[size=3][u]Environment Control[/u][/size]\n<br />Blocks theme-injected shading environments that create darkness and fog effects.\n<br />[list]\n<br />[*][b]Lights Out[/b] – Blocks darkness shading environments applied by the theme system.\n<br />[*][b]Ventilation Purge[/b] – Blocks fog/volumetric shading environments.\n<br />[*][s][b]Toxic Gas[/b] – Blocks toxic gas shading environments.[/s]\n<br />[*]Mode selection: Off, All Missions, Normal Only, Special Only.\n<br />[*]Operates at theme load time; changing settings requires map reload.\n<br />[/list]\n<br />\n<br />[size=3][u]Light Control[/u][/size]\n<br />Direct manipulation of light group states across the entire map.\n<br />[list]\n<br />[*]Works on all mission types or restricted to special missions only.\n<br />[*]Percentage-based control of active lights per light group.\n<br />[*]Selection modes determine which lights remain active:\n<br />[list]\n<br />[*][b]Incremental[/b] – Lights activate in sequence from first to last.\n<br />[*][b]Alternating[/b] – Every Nth light remains on.\n<br />[*][b]Spread[/b] – Even distribution across the light group.\n<br />[*][b]Random[/b] – Random subset selected per group.\n<br />[/list][*]Captures original light states; toggling off restores original behavior.\n<br />[/list]\n<br />\n<br />[size=3][u]Flicker Effects[/u][/size]\n<br />Optional dynamic lighting behavior applied to controlled lights.\n<br />[list]\n<br />[*]Flicker modes:\n<br />[list]\n<br />[*][b]Static[/b] – No flicker; lights remain in set state.\n<br />[*][b]All[/b] – All controlled lights flicker simultaneously.\n<br />[*][b]Cascade[/b] – Flicker propagates through lights in sequence.\n<br />[*][b]Random[/b] – Random subset flickers each interval.\n<br />[/list][*]Timing parameters:\n<br />[list]\n<br />[*][b]Interval[/b] – Time between flicker events.\n<br />[*][b]Duration[/b] – How long lights remain in flicker state.\n<br />[*][b]Cooldown[/b] – Minimum time before a light can flicker again.\n<br />[/list][*][b]Stutter mode[/b] – Rapid on/off cycling during flicker with configurable cycle count.\n<br />[/list]\n<br />\n<br />[size=4][b]Visuals[/b][/size]\n<br />[size=3][u]Interactive Comparison Slider Images:[/u][/size]\n<br />(click image or follow hyperlink(s))\n<br />[code]* https://imgsli.com/NDM4NTI5\n<br />* https://imgsli.com/NDM4NTM0[/code][url=https://imgsli.com/NDM4NTI5][img]https://staticdelivery.nexusmods.com/mods/4943/images/684/684-1767302193-1709578771.png[/img][/url]\n<br />\n<br />[size=4][b]Community Feedback[/b][/size]\n<br />[list]\n<br />[*][url=https://discord.com/channels/1048312349867646996/1456392778601730139]DT Modding discord thread[/url] prioritized over Nexus comments.\n<br />[*]Bug reports: use Nexus bug tracker with reproduction details.\n<br />[*]Suggestions welcome; keep them concise.\n<br />[/list]\n<br />\n<br />[size=4][b]Credits[/b][/size]\n<br />[size=3][u]Contributions[/u][/size]\n<br />[list]\n<br />[*][b]Localization:[/b] zh-cn - DingXiang233\n<br />[/list]\n<br />[size=3][u]Inspiration[/u][/size]\n<br />[list]\n<br />[*]leer's [i]Emperor's Lantern[/i] mod.\n<br />[*]The scummy varlets complaining about Lights Out and Vent Purge.\n<br />[/list]"
