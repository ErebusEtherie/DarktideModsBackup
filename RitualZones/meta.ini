nexusDescription="Ritual Zones Mod + Pathfinding Utilities\n<br />Progression/Trigger point visualizer for game path triggers and hex rituals.\n<br />\n<br />A mod to display an icon for the hex ritual, along with a distance/timer for ritual completion.\n<br />\n<br />Additionally, it is also a debug mod for progression.\n<br />[list]\n<br />[*]It includes triggers for rituals, timer starts, timer speed up, bosses, twins, ambush, fallback threshold, respawn point guid, respawn beacon, and respawn distance limit.\n<br />[*]Pathing, visual gates, progression point per player, max progression, and player leader progressor\n<br />[*]There was a lot of testing with the witch hex thus I decided to just include this as a 2-part mod that primarily functions as the simple hex indicators and part debug visualizer for developers and players who want to see more precise details of game mechanics.\n<br />[*]Shows respawn point, safe point, respawn beacon proximity, and location,n and where one should be standing for earlier respawns.\n<br />[/list]\n<br />Roadmap\n<br />[list]\n<br />[*]✅1.2.0 - Major update, expanded settings, adjustments, and QOL. Functioning cache for inferred points in online play. \n<br />[*]✅1[s].3.0[/s] [1.2.0]- Localization for Japanese, Mandarin, Korean, French, Russian, Spanish, Portuguese, Polish, and German\n<br />[*]?1.3.0 - Revamped HUD with more options, timeline, and matched colors. Better compatibility in spectator mode\n<br />[*]1.4.0 - Additional spawns, patrols, boss spawn locations on map, witch spawn locations, hex spawn locations, horde/enemy spawn points\n<br />[*]1.5.0 - Director...\n<br />[/list]\n<br />Bugs\n<br />[list]\n<br />[*]✅Priority beacons do not display respawn cut off point, must be implemented - done\n<br />[*]✅High LUA mem usage (~400) combined with other mods can cause memory crashes - debugging\n<br />[/list]\n<br />[b]Bug Reports[/b]\n<br />[list]\n<br />[*]Please find me on Discord [url=https://discordapp.com/users/264193933381337088]LAUREHTE[/url]\n<br />[*]WHEN YOU MESSAGE FOR BUG REPORTS PLEASE ATTACH THE LOG FILE RIGHT AFTER YOUR GAME CRASHES OR ANY RELEVENT IMAGES/VIDEOS EXPLAINING THE ISSUE\n<br />[*]Log can be found at ...&#92;AppData&#92;Roaming&#92;Fatshark&#92;Darktide&#92;console_logs\n<br />[*][b]Please sort by recents and send the correct log for the session that caused the issue (if you crashed and started the game again, the most recent log will not be the correct previous crashed log)[/b]\n<br />[*]To reach AppData, type %appdata% and press Enter in your Windows search bar\n<br />[*]Additionally, you can make a bug report here on Nexus if you are sure this mod is causing your crashes/performance issue/bugs\n<br />[*][b]To be sure, this mod is causing issues and/or crashes, [/b]\n<br />[/list][list=1]\n<br />[*][b]FIRST[/b], turning all mods off (including this one and any dependencies it has), except modloader and the DMF framework mods. Does your issue reproduce? Then your game/modloader/DMF is causing the crashes. \n<br />[*][b]Second, turn only the DEPENDENCIES[/b] (if it has any) for this mod (not the mod itself). Does it reproduce? If so, the dependency is the issue, not the mod. \n<br />[*][b]Finally[/b], if you turn on this mod and you finally can reproduce the crash/issues consistently after multiple times, then THIS MOD is potentially the issue, and you need to contact me with your log file from the location in the previous notes, or post the \"Script Error\" section of your log that should indicate which mod/package is causing the issue\n<br />[/list][b]Notes[/b][list]\n<br />[*]Added additional debug utilities for trigger points, map progression, boss triggers, hex triggers, and hex timer triggers.\n<br />[*]It also includes respawn points to see where you need to backtrack for the game to pull back the spawning of teammates from death\n<br />[*]Cache will not give you exact locations, just a good estimate and what someone should prepare for, and known points player should internalize. This will allow better sync for higher-end groups of teams/speedrunners and solo runners, and give the average player the tool needed to visualize how to be better positioned and how their actions affect pace.\n<br />[*]Debug trigger points, aside from progression and respawn points, are server-sided to decide when and where they spawn. These will only accurately show in offline local matches. An experimental cache is in place to provide an estimate of all possible spawns deduced from data collection. Although it is not accurate, it will allow you to see a potential trigger. This setting can be disabled, and only the simple path and basic exposed information will be shown.\n<br />[/list]\n<br />Post-Scipt[list]\n<br />[*][b][u]Credits to level_debug and debug_utils mods created by Craven for a lot of the methods[/u][/b]\n<br />[*][b][u][url=https://github.com/Craven73/dt_level_debug]https://github.com/Craven73/dt_level_debug[/url]  +  [url=https://github.com/Craven73/dt_debug_utils]https://github.com/Craven73/dt_debug_utils[/url])[/u][/b]\n<br />[*][b]Be aware that in offline mode, the triggers only show for the ones that have been guaranteed to be set by the game. For online play, the mod only displays the known trigger points it does not know the exact ones in the online state, as this information is not exposed to the player while in a public match, it will only show what the game server allows you to know the rest is all estimates, I would NOT rely on using it for optimizing runs during public play.[/b]\n<br />[/list]"
