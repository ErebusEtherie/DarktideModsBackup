nexusDescription="Having just dived into [i]Warhammer 40,000: Darktide[/i], I’ve been utterly immersed in the game—but I’ve also found Fatshark’s movement input design rather unintuitive. After trying out numerous movement-improving mods from other creators and tweaking them to fit my own playstyle, I decided to rewrite a brand-new, all-in-one movement mod.\n<br />\n<br />Here are the core features implemented in this mod:\n<br />\n<br />[list]\n<br />[*]Better Sprint: Pressing the sprint key once activates continuous sprint. Pressing the sprint key again mid-sprint will no longer toggle it off. Continuous sprint will only stop when you release the forward key, perform a reload, or fire your weapon (it will not be interrupted if you have a Run 'n' Gun Blessing equipped). [/*]\n<br />[*]Always Sprint: Must be used alongside [i]Better Sprint[/i]. When enabled, actions such as reloading and shooting will no longer interrupt continuous sprint.[/*]\n<br />[*]Toggle Sprint: Must be used alongside [i]Better Sprint[/i]. When enabled, releasing the forward key won't stop continuous sprint. The sprint key will toggle the continuous sprint state.[/*]\n<br />[*]Hold to Sprint: Must be used alongside [i]Better Sprint[/i]. When enabled, it functions identically to the vanilla game's hold-to-sprint, with the added fix for unintended action cancellation.[/*]\n<br />[*]Hold to Walk: Must be used alongside [i]Better Sprint[/i]. When enabled, continuous sprint is enabled by default. Hold the sprint key to enter walk mode.[/*]\n<br />[*]Prevent Accidental Jumps: Jumping will no longer trigger during consecutive dodges. If Jump and Dodge are bound to the same key, both [i]Sprint Dodge[/i] and [i]Easy Dodge Slide[/i] below require this option enabled to function properly. Highly recommended for players who bind Jump and Dodge to the same key. Please disable this option if you use separate key binds.[/*]\n<br />[*]Sprint Dodge: You can dodge while sprinting. Requires the 'Dodge on diagonal forward' option to be enabled in the game settings.[/*]\n<br />[*]Easy Dodge Slide: Double-tapping the Dodge key triggers a seamless dodge-to-slide combo. Additional detection logic has been added to prevent failed slide attempts from locking you into a crouch state.[/*]\n<br />[*]Hold Dodge Slide: Triggers dodge slide by holding the dodge key while dodging[/*]\n<br />[*]Keep Dodging: Hold dodge key to perform continuous dodge.[/*]\n<br />[*]Better Toggle Crouch: Combines the benefits of Toggle Crouch and Hold Crouch. Matches vanilla Toggle Crouch behavior while walking, and lets you instantly exit crouch by releasing the key after a slide (even if you held it through the full slide animation). Optimized for Easy Dodge Slide, Hold-to-Dodge Slide, and Easy Sprint Slide. Recommended if you use vanilla Toggle Crouch with any of these features.\n<br />[/*][*]Easy Sprint Slide: Pressing the Dodge key while sprinting will directly activate a slide. Highly recommended for players who use separate key binds for Jump and Dodge.[/*]\n<br />[*]Auto Vault: Automatically vaults in mid-air, no need to hold the jump key.[/*]\n<br />[/list]\n<br />Thanks to [url=https://www.nexusmods.com/profile/KamiUnitY/mods?gameId=4943]KamiUnitY[/url], [url=https://www.nexusmods.com/profile/HxeR/mods?gameId=4943]Vxer[/url]﻿, [url=https://www.nexusmods.com/profile/Jaemn/mods?gameId=4943]Jaemn[/url]﻿, the authors of [url=https://www.nexusmods.com/warhammer40kdarktide/mods/342?tab=description]Hybrid Sprint[/url], [url=https://www.nexusmods.com/warhammer40kdarktide/mods/568?tab=description]Dodge and Slide[/url], and [url=https://www.nexusmods.com/warhammer40kdarktide/mods/249?tab=description]Stop accidental jumps[/url]. Their code was a huge inspiration and helped me quickly learn the mod development mechanics for Darktide.\n<br />\n<br />\n<br />\n<br />刚刚入坑《战锤 40K：暗潮》，在沉迷游玩的同时，也深感肥鲨（Fatshark）在移动输入机制设计上的不合理之处。在体验过诸多作者的移动优化 Mod、并按自身操作习惯微调后，我决定重写一款整合核心优化功能的全新移动 Mod。\n<br />\n<br />本 Mod 实现的核心功能如下：\n<br />\n<br />[list]\n<br />[*]更好的疾跑：按下疾跑键后进入持续疾跑状态，疾跑中再次按下疾跑键不会停止疾跑。松开前方向键，执行换弹、射击（跑射祝福除外）等动作时，会退出持续疾跑。[/*]\n<br />[*]始终疾跑：需与「更好的疾跑」搭配启用，开启后换弹、射击等动作不再会打断持续疾跑状态。[/*]\n<br />[*]切换疾跑：需与「更好的疾跑」搭配启用，开启后松开前方向键不再会退出持续疾跑状态，疾跑键将提供切换持续疾跑状态的功能。[/*]\n<br />[*]按住疾跑：需与「更好的疾跑」搭配启用，开启后，功能与原版游戏的按住疾跑完全一致，额外修复了某些武器动作意外取消的问题。[/*]\n<br />[*]按住慢走：需与「更好的疾跑」搭配启用，开启后默认处于持续疾跑状态, 按住疾跑键进入慢走模式。[/*]\n<br />[*]阻止意外跳跃：连续闪避过程中不会再触发跳跃。若跳跃键与闪避键绑定为同一按键，下方的「疾跑闪避」与「轻松闪避滑铲」均需开启本选项才可正常运作。跳跃键和闪避键分开设置的玩家请关闭此选项。[/*]\n<br />[*]疾跑闪避：疾跑状态下可触发闪避，需在游戏设置中开启「向斜前方闪避」选项。[/*]\n<br />[*]轻松闪避滑铲：双击闪避键即可触发「闪避 + 滑铲」丝滑小连招，增加专属判定逻辑，避免滑铲判定失败后进入蹲伏状态。[/*]\n<br />[*]按住闪避滑铲：闪避过程中按住闪避键触发滑铲。[/*]\n<br />[*]连续闪避：按住闪避键以进行连续闪避。[/*]\n<br />[*]更好的切换蹲伏：结合切换蹲伏和长按的蹲伏的优点，在行走状态下提供与原版切换蹲伏一致的功能，在滑铲过程中，则保证玩家即使全程按住蹲伏键也可以在滑铲结束时靠松开蹲伏键立即退出蹲伏状态。同时为模组的轻松闪避滑铲、按住闪避滑铲、轻松疾跑滑铲等功能优化，如果你喜欢原版游戏的切换蹲伏并开启了上述功能，建议开启此选项。\n<br />[/*][*]轻松滑铲疾跑：疾跑状态下按下闪避键可直接触发滑铲，建议键位分开设置跳跃与闪避的玩家启用。[/*]\n<br />[*]自动翻越：在空中时自动触发翻越，无需再按住跳跃键。[/*]\n<br />[/list]\n<br />\n<br />感谢Hybrid Sprint、Dodge and Slide、Stop accidental jumps的作者，他们的代码给了我很大的启发，帮助快速地了解了mod开发机制。"
