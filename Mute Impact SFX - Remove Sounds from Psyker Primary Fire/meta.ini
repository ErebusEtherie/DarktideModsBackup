nexusDescription="Uses the Audio plugin to mute the listed sounds. All sounds are silenced by default, and can be unsilenced in the Mod Options.\n<br />\n<br />[size=5][u][size=5][u]Sounds[/u][/size]\n<br />[/u][/size]Most sounds are silenced by default, and can be unsilenced in the Mod Options. Ones left alone by default are marked with a [-]\n<br />- Psyker staff Primary Fire impact\n<br />- Cracking from lasguns shooting nearby (with options for player and enemy shots)\n<br />- Melee hits\n<br />    - Doing no damage against Carapace\n<br />    - Hitting Carapace or Flak with various weapon types\n<br />    - Reduced damage with axe hits (Axes and Shovels)\n<br />    - Axe light attacks [-]\n<br />   ﻿﻿- Axe heavy attacks [-]\n<br />- Ranged hits (each have options for Lasers and general shots)\n<br />    - Damage negated\n<br />    - Armored\n<br />    - Unarmored [-]\n<br />- UI Sounds\n<br />    - Entering NPC menu\n<br />    - Hadron trait edits\n<br />    - Hadron blessing edits\n<br />    - Hadron Consecration\n<br />    - Hadron Empowerment\n<br />- Player Coughs from Pox Gas\n<br />[size=5][u]\n<br />Load Order[/u][/size]\n<br />[b]DarktideLocalServer\n<br />Audio[/b]\n<br />[i]whatever other Audio mods[/i]\n<br />[b]MuteImpacts[/b]\n<br />[i]whatever other mods[/i]\n<br />\n<br />[size=5][u]FAQ[/u][/size]\n<br />[b]Why does this need to use the Audio Plugin?[/b]\n<br />It's the simplest way to do it. AFAIK editing the weapon sounds directly (if that's even possible since they're in the weapon files with stats) would lead to autodefenestration. Perhaps there's a way to do it like ZipIt by finding the actual audio playing functions but I don't have much time to be digging that much nowadays."
