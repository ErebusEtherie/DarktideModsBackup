nexusDescription="[size=4][b]Key Features[/b][/size]\n<br />[list]\n<br />[*] [b]Visual Buff Indicators:[/b] Color-coded rings show the basic buffs a Stimm Supply drop provides at a glance.\n<br />[*] [b]Intensity:[/b] Brighter rings = stronger buffs.\n<br />[*][b]Progressive Ordering:[/b] Outer rings indicate a higher point investment in the Stimm Lab line compared to inner rings.\n<br />[/list]\n<br />[size=4][b]Customization[/b][/size]\n<br />[list]\n<br />[*] [b]Toggle Rings:[/b] Each ring can be individually disabled.\n<br />[*] [b]Custom Colors:[/b] Set custom RGB values for each ring.\n<br />[*][b]Visibility Threshold:[/b] Choose a minimum node investment for the ring to appear (default = 2 nodes).\n<br />[*] [b]Opacity Scaling:[/b] Configure min/max opacity and how it scales based on the corresponding Stimm Lab investment.\n<br />[/list]\n<br />[size=4][b]What's in the box?[/b][/size]\n<br />This mod is inspired by [url=https://www.nexusmods.com/warhammer40kdarktide/mods/664]What's in the box?[/url], which provides a complete list of stats each Stimm Supply drop provides. I use both mods together."
