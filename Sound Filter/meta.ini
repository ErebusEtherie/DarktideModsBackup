nexusDescription="[size=5][b]🔊Tired of hearing a bunch of unnecessary sounds in Darktide?[/b][/size]\n<br />[b][size=5]\n<br />Well so was I...[/size][/b]\n<br />\n<br />[size=4]After playing Darktide for a very long time, I grew tired of not hearing important sounds from enemies due to the amount of other unnecessary sounds built into every facet of the game.[/size]\n<br />[size=4]I originally commissioned this mod from [b][i][color=#9900ff][url=https://www.nexusmods.com/profile/Sephirothphoenix]Seph[/url][/color][/i][/b] way back in the day for my own personal use.[/size]\n<br />[size=4]But [b][i][color=#00ffff]with his permission,[/color] [/i][/b]I have added more options to it and am uploading it here on Nexus.[/size]\n<br />\n<br />[size=4]I created a mod that allows you to toggle on/off specific in-game sounds, including player sounds, specific class ability/blitz sounds, explosion sounds, havoc mutator sounds, special/boss spawn sounds, horde spawn sounds, stimm sounds, and even player footsteps/player foley sounds.[/size]\n<br />\n<br />[size=4]Now you might think, [i][b]\"Why would I want to disable enemy spawn sounds like specials and bosses?\"[/b][/i]. Personally, I would much rather hear the actual sounds emitted from the enemies in-game than hear their spawn sound knowing that those enemies are going to be spawning all the time and I will face them eventually, as well as the fact that spawn sounds can cover up other existing enemy sounds.[/size]\n<br />[size=4]Also [url=https://www.nexusmods.com/warhammer40kdarktide/mods/384][b][color=#9900ff]Seph's[/color][/b] [/url][b][color=#00ffff][url=https://www.nexusmods.com/warhammer40kdarktide/mods/384]Cackling Trapper[/url] [/color][/b]mod makes hearing [b][color=#00ffff]Trappers [/color]MUCH easier [/b]and [i][b]I highly recommend it.[/b][/i][/size]\n<br />[size=4][i][b]If you don't know, that mod plays makes Trappers do their cackle/laugh voiceline ALL THE TIME.[/b][/i][/size]\n<br />\n<br />[size=4][b][u][color=#00ff00]HAVOC MUTATOR SOUNDS:[/color][/u][/b] Options to disable sounds from [b][color=#00ff00]Havoc Mutators[/color][/b] individually including;[/size]\n<br />[list]\n<br />[*][size=4]The explosion sounds from [color=#00ff00][b]Rotten Armor enemies.[/b][/color][/size][/*]\n<br />[*][size=4]The explosion sounds from [color=#00ff00][b]Blight spreads enemies[/b][/color] and the sound their [color=#00ff00][b]corruption goo[/b][/color] makes while lingering on the floor.[/size][/*]\n<br />[*][size=4]The sound of [b][color=#1e84cc]enemies using stimms[/color][/b] in the [color=#1e84cc][b]Contaminated Stimms mutator.[/b][/color][/size][/*]\n<br />[*][size=4]The sound of [b][color=#674ea7]Cranial Corruption[/color][/b] enemies exploding when killed by a headshot.[/size][/*]\n<br />[/list]\n<br />[size=4][u][b][color=#ff0000]HORDE SPAWN SOUNDS:[/color][/b][/u] Options to disable the various horde spawn sounds individually including [b][color=#ff7700]ambush[/color], [color=#ffff00]signal[/color], [/b]and[b] [color=#00ffff]alarm[/color].[/b][/size]\n<br />\n<br />[size=4][u][b][color=#ff00ff]STIMM SOUNDS:[/color][/b][/u] Options to disable the [b][i]looping duration sound effects[/i][/b] from using [b][color=#ff0000]power[/color], [color=#00ffff]celerity[/color], [color=#ffff00]concentration[/color], and [color=#00ff00]hive scum[/color] stimms[/b] individually.[/size]\n<br />\n<br />[size=4][u][color=#ff7700][b]EXPLOSION / GRENADE SOUNDS: [/b][/color][/u][color=#ffffff]Options to disable blitz explosion sound effects individually for each class as well as explosion echo sound effects for various explosions.[/color][/size]\n<br />\n<br />[size=4][b][u][color=#1e84cc]CLASS-SPECIFIC SOUNDS:[/color][/u][/b] Options to disable [b][color=#1e84cc]class-specific sounds[/color][/b] for each class including abilities and blitzes, disabling some of these sounds immensely improves the sound environment so you can focus more on enemy stingers/attack sounds. View in mod options pictures.[/size]\n<br />\n<br />[size=4][b][u][color=#ff7700]PLAYER SOUNDS:[/color][/u][/b] Lastly, included options to disable [color=#ff7700][b]sounds for the player [/b][/color][color=#ffffff]including;[/color][/size]\n<br />[size=4][b][color=#00ffff]Toughness armor damage[i] [/i]sound[/color][/b] when taking toughness damage as it is very loud and can cover up enemy sounds such as gunners who are shooting you very easily.[/size]\n<br />[size=4]This option also works well for me as I use the [i][url=https://www.nexusmods.com/warhammer40kdarktide/mods/326][b][color=#ffff00]Captain's Shield mod[/color][/b] [/url][/i]from [b][i][color=#9900ff][url=https://www.nexusmods.com/profile/Sephirothphoenix]Seph[/url][/color][/i][/b] and that mod makes it so you hear the [color=#ffff00][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/326]Captain's Shield[/url][/b][/color] damaged sound when taking toughness damage instead, [i][b][color=#00ff00]which I highly recommend.[/color][/b][/i][/size]\n<br />[list]\n<br />[*][size=4]Option to disable the sound of the [color=#ff0000][b]Player taking Health Damage[/b][/color].[/size][/*]\n<br />[*][size=4][color=#ffffff]Option to disable [/color][b][color=#38761d]Player Footsteps sounds[/color][/b], including all [b][color=#93c47d]Upper Body Foley sounds[/color][/b]. [/size][/*]\n<br />[*][size=4]Option to disable [b][color=#ff00ff]Weapon Locomotion sounds[/color][/b] as these are all that remain when you remove [b][color=#93c47d]Upper Body Foley sounds[/color][/b] and [b][color=#38761d]Player Footsteps sounds[/color][/b] should you want the character to be completely silent when moving.[/size][/*]\n<br />[*][size=4]Option to disable the sound of [color=#f1c232][b]Pinging an enemy for you and allies.[/b][/color][/size][/*]\n<br />[*][size=4]Option to disable the stingers for an [color=#cc0000][b]Allied player going down [/b][/color][color=#f4cccc]and [/color][color=#cc0000][b]an allied player dying[/b][/color].[/size][/*]\n<br />[*][size=4]Option to disable the loud [b][color=#1e84cc]Heartbeat sound[/color][/b] when you are knocked down or when you are very low health.[/size][/*]\n<br />[*][size=4]Option to disable the sounds of the player being [b][color=#bf9000]covered in Beast of Nurgle vomit.[/color][/b][/size][/*]\n<br />[*][size=4]Option to disable the sounds of the player [b][color=#00ff00]entering/exiting Pox Gas clouds[/color][/b].[/size][/*]\n<br />[/list]\n<br />[size=4][color=#ff0000][b][u](EXPERIMENTAL) BURSTER BEEPING:[/u][/b][/color][/size]\n<br />[size=4]The final option I want to talk about in the player sounds section is called [b][color=#ff0000]Burster Beeping.[/color][/b][/size]\n<br />[size=4]You might have encountered a moment where the [b][color=#ffff00]Poxburster proximity beeping sound[/color][/b] does not play at all or is very inconsistent in terms of actual player proximity. This [b][color=#ffff00]Poxburster proximity beeping sound[/color][/b] also has a [b][i][color=#ff7700]very high priority[/color][/i][/b] in the sound system meaning sometimes [b]it will entirely [color=#ff0000]mute[/color] other enemy sounds all together no matter how close the enemies are to you.[/b][/size]\n<br />\n<br />[size=4]Now this one will not be for everyone as it is more of an [b][i][color=#ff7700]experimental change[/color][/i][/b]. But I encourage you to try.[/size]\n<br />[size=4][b][color=#ff0000]Burster Beeping option[/color][/b] removes the [color=#ffff00][b]Poxburster proximity beeping sound[/b][/color] [b][color=#00ffff]ENTIRELY[/color] [/b]and instead replaces the [b]Poxburster breath and footstep sounds[/b] with [b][color=#00ff00]Plague Ogryn counterparts[/color][/b].[/size]\n<br />[size=4]Meaning you will hear the [b][color=#00ff00]Plague Ogryn footsteps [/color][color=#ffffff]for [/color][color=#ffff00]Poxbursters footsteps.[/color][/b][/size]\n<br />[size=4]It does have its own issues however, when a [b]Poxburster [/b]is in the recover animation trying to stand up or when it has fallen off a ledge and is trying to get up, the footsteps sounds will only play at the end of the animation meaning otherwise it will be completely silent while in this animation. This also means a Poxburster can be at a spawn door and be completely silent until the door opens and takes his first steps, [b][i]which ironically still happens with the default [color=#ffff00]Poxburster proximity beeping sound[/color][/i][/b][color=#ffff00].[/color][/size]\n<br />[color=#00ff00][size=5][b]HOWEVER....[/b][/size][/color]\n<br />\n<br />[size=4][b][u][color=#00ffff]NEW DOPE MOD INCOMING:[/color][/u][/b] I do have another mod that is almost finished to help solve this issue, it will actually solve the problem of not being able to spot [b][color=#00ff00]ALL specialist enemies ENTIRELY...[/color][/b] coming very very soon. But regardless, I enjoy this option better to remove the [b][color=#ffff00]Poxburster proximity beeping[/color][/b] as it still [color=#ff0000][b]mutes[/b][/color] a lot of other enemy sounds entirely and doesn't work properly most of the time.[/size]\n<br />\n<br />[size=4][b]That's it![/b] Mod options are shown in the mod pictures, with detailed descriptions for each option when you hover over them in-game in the mod options.[/size]\n<br />\n<br />[size=4]I will be updating this mod when the new class comes out next month for their sounds as well. [/size]\n<br />[size=4]If you have any suggestions for other sounds you would like the option to mute feel free to recommend them in the comments or reach out to me in the [b][color=#9900ff]Darktide Modding Discord.[/color] [u][color=#00ff00]@demba[/color][/u][/b][/size]\n<br />\n<br />[size=4]I sincerely hope you enjoy, this might be the best mod I have ever made in terms of quality of life for [b]Darktide, [i]other than the one I am releasing soon,[/i] [/b]and I personally would not play the game without it.[/size]\n<br />\n<br />[size=4]Thank you to my friend Hesus who helped me test the Hive Scum sounds! :)[/size]\n<br />\n<br />[b][color=#00ff00][size=4]If you would like to support me feel free to use the Donation tab by the file manager for downloading the mod. A donation button will also appear on the file download screen if you download the mod more than once, and if you endorse the mod. No support is expected, but any is much appreciated! :) I sincerely hope you enjoy the mods.[/size][/color][/b]\n<br />\n<br />[size=5][b]  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  [u]﻿Check out my other Audible Mods![/u]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/397]🔗[/url] [color=#ff7700]Audible Thrust[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/414]🔗[/url] [color=#1e84cc]Audible Surgical[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/551]🔗[/url] [color=#8e7cc3]Audible Pinpointing Target[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/418]🔗[/url] [color=#ff0000]Audible DECIMATOR[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/449]🔗[/url] [color=#ff00ff]Audible Ability Recharge[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/410]🔗[/url] [color=#00ff00]Audible Grenade Regeneration[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/530]🔗[/url] [color=#bf9000]Audible Successful Dodge[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/564]🔗[/url] [color=#00ffff]Audible True Aim[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/751]🔗[/url] [color=#e06666]Audible BACK OFF[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/750]🔗[/url][color=#6aa84f]Audible No Pushover[/color]\n<br />﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/768]🔗[/url]﻿ [color=#ffff00]Audible Time to Kill[/color]\n<br />[/b]  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿  ﻿[url=https://www.nexusmods.com/warhammer40kdarktide/mods/784]🔗[/url]﻿ [b][color=#c27ba0]Audible Retaliatory Defence[/color][/b][/size]\n<br />[size=5][b]                       [url=https://www.nexusmods.com/warhammer40kdarktide/mods/786]🔗[/url]﻿ [color=#cc4125]Hive Scum Bazooka[/color]\n<br />[/b][u][b]Installation:[/b][/u][/size]\n<br />[list]\n<br />[*][size=5]Download the file, it will be zipped. First, extract it.[/size][/*]\n<br />[*][size=5]Inside, there is the [b]SoundFilter[/b] folder.[/size][/*]\n<br />[*][size=5]Go to [b]steam[/b], on your game list on the left, right click [b]Darktide -&gt; Manage -&gt; Browse local files.[/b][/size][/*]\n<br />[*][size=5]Go to [b]mods[/b] (If there is no mods folder, go to Darktide Modding Framework and follow instructions to install the foundation for mods) and drop [b]SoundFilter[/b] into the mods folder.[/size][/*]\n<br />[/list][list]\n<br />[*][size=5]In the [b]mods[/b] folder, [b]open mod_load_order.txt[/b] and add in the line \"SoundFilter\" down below.[/size][/*]\n<br />[*][size=5]Make sure [i]toggle_darktide_mods[/i] is enabled in the Darktide install folder, too![/size][/*]\n<br />[*][b][size=5]Enjoy! :)[/size][/b][/*]\n<br />[/list]"
