nexusDescription="* Uses human-readable names for buffs to make life easier.\n<br />* Learns buffs and debuffs as you play.\n<br />* Can set individual buffs to be visible, hidden or visible only in Psykhanium.\n<br />* Can change the size and opacity of the buff bars.\n<br />* Takes labels and translations from the game to provide *almost* total support for any language Darktide supports.\n<br />* Handles moods/screen-effects too.\n<br />* New: Can assign buffs to separate buff bars, maximum 3 bars.\n<br />\n<br />For some buffs, changes to filtering rules will not apply until your next loading screen.\n<br />\n<br />Some talent buffs require a deep mapping probe which can cause a short stutter the first time the mod sees that buff.  Once the buff is learned the process is not repeated so performance is not impacted again.\n<br />\n<br />Some keystone or ult buffs will map to keystone/ult addon talent names. That is because Fatshark makes linking buffs to talents hard and we just have to live with it.\n<br />\n<br />Localisations (some menu titles):\n<br />* Chinese by jcyl2023\n<br />* Russian by xsSplater_СанСаныч\n<br />\n<br />Proud member of the Darktide Modders discord https://discord.gg/GFyCGNpJb8"
