nexusDescription="[b][size=4]What it is and why use it[/size][/b]\n<br />\n<br />Holy Light adds a glow effect above pickups and crates in missions, expeditions, and live events. It makes loot easier to spot, especially when items are partially hidden by level geometry, clutter, or lighting.\n<br />\n<br />[b][size=3]How to use[/size][/b]\n<br />[list=1]\n<br />[*]Install the mod (Darktide Mod Framework / your mod manager, following the game's usual mod setup).[/*]\n<br />[*]Enable the mod and open its options in the mod menu.[/*]\n<br />[*]Adjust the glow height and per-zone visibility in the Display group (Modes subgroup).[/*]\n<br />[*]Enable/disable glow per item category in Item categories, Expedition items, and Events groups.[/*]\n<br />[/list]\n<br />[b][size=4]Settings by group[/size][/b]\n<br />\n<br />[b][size=3]Display[/size][/b]\n<br />[list]\n<br />[*]Enable mod - on/off. Default on.[/*]\n<br />[*]Height offset - numeric. Default 0.10. Range 0.10 to 2.00. Step 0.05. Controls how high above the item the glow effect is spawned.[/*]\n<br />[*]Modes\n<br />[list=1]\n<br />[*]Show in missions - on/off. Default on. Glow in regular missions.[/*]\n<br />[*]Show in Havoc missions - on/off. Default on. Glow in Havoc missions.[/*]\n<br />[*]Show in Expeditions - on/off. Default on. Glow during expeditions.[/*]\n<br />[*]In safe zone - on/off. Default off. Sub-option under Show in Expeditions. Glow in the expedition safe zone.[/*]\n<br />[*]Show in Mortis Trials - on/off. Default on. Glow in Mortis Trials.[/*]\n<br />[*]Show in Psykhanium - on/off. Default off. Glow in the Psykhanium training area.[/*]\n<br />[/list][/*]\n<br />[/list]\n<br />[b][size=3]Item categories[/size][/b]\n<br />[list]\n<br />[*]Glow on stimms - on/off. Default on.[/*]\n<br />[*]Glow on ammo pickups - on/off. Default on.[/*]\n<br />[*]Glow on grenade pickups - on/off. Default on.[/*]\n<br />[*]Glow on ammo crates - on/off. Default on.[/*]\n<br />[*]Glow on medical crates - on/off. Default on.[/*]\n<br />[*]Glow on plasteel - on/off. Default on.[/*]\n<br />[*]Glow on diamantine - on/off. Default on.[/*]\n<br />[*]Glow on grimoires - on/off. Default on.[/*]\n<br />[*]Glow on scriptures - on/off. Default on.[/*]\n<br />[/list]\n<br />[b][size=3]Expedition items[/size][/b]\n<br />[list]\n<br />[*]Glow on salvage - on/off. Default on.[/*]\n<br />[*]Glow on tech remnants - on/off. Default on.[/*]\n<br />[*]Glow on reliquaries - on/off. Default on.[/*]\n<br />[*]Glow on strike grenades - on/off. Default on.[/*]\n<br />[*]Glow on servo-triggered mines - on/off. Default on.[/*]\n<br />[*]Glow on explosive luggables - on/off. Default on.[/*]\n<br />[/list]\n<br />[b][size=3]Events[/size][/b]\n<br />[list]\n<br />[*]Glow on skulls - on/off. Default on. Glow on skull collectibles during the Skulls live event.[/*]\n<br />[/list]\n<br />[url=https://www.nexusmods.com/profile/RRMLLNV/mods?gameId=4943][img]https://raw.githubusercontent.com/rrmllnv/darktide-mods/master/_images/all-mods.png[/img][/url]\n<br />"
