nexusDescription="[center][size=6][b]Radar[/b][/size][/center]\n<br />Radar adds a compact, camera-oriented HUD radar for [b]Warhammer 40,000: Darktide[/b]. It is built to surface the targets that matter most during live missions, nearby pickups, objective items, live-event pickups and objectives, deployed support tools, environment interactables, expedition points of interest, teammates, player smart tags, tagged targets, supported ability-outlined enemies, and high-priority enemies, while keeping the presentation configurable from the mod options menu. A centered overview mode can also be toggled during missions when you need a wider tactical read.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Feature Overview[/b][/size]\n<br />\n<br />[list]\n<br />[*]Tracks nearby pickups, materials, mission items, live-event pickups and objectives, deployables, environment interactables, expedition POIs, teammates, player smart tags, tagged targets, supported ability-outlined enemies, and high-priority enemies on a single camera-oriented radar or the temporary centered overview.[/*]\n<br />[*]Adds [b]Dark Rites[/b] support with separate event markers and controls for [b]Tainted Skulls[/b], destroyable [b]Dark Rites Totems[/b], and spawned [b]Dark Rites Servo Skulls[/b].[/*]\n<br />[*]Supports [b]Square[/b], [b]Circle[/b], and [b]Auspex[/b] radar styles. Square and Circle use configurable [b]outline[/b] and [b]guide[/b] options, including the optional [b]Auspex[/b] guide background, while the full [b]Auspex[/b] style adds its own scanner presentation and optional animated sweep.[/*]\n<br />[*]Lets you tune [b]radar size[/b], normal radar [b]range[/b], centered overview [b]zoom range[/b], [b]Radar Colors[/b], [b]maximum marker count[/b], [b]overview marker count[/b], [b]nearby highlight range[/b], supported vertical arrow and hiding behavior, and the dedicated nearby-highlight presentation settings.[/*]\n<br />[*]Adds configurable [b]Opacity[/b], [b]Red[/b], [b]Green[/b], and [b]Blue[/b] sliders for most fixed Radar UI and marker colors, including the radar background, outline, guides, Auspex scanner elements, marker text, vertical arrows, icon-mode marker colors, enemy marker colors, marked-background colors, and nearby highlight colors.[/*]\n<br />[*]Supports per-category [b]Icon size (%)[/b] sliders across item, player, enemy, event, and debug marker groups, plus dedicated enemy sub-category scaling.[/*]\n<br />[*]Supports separate display, range, and vertical arrow controls for [b]bosses[/b], [b]enemy groups[/b], [b]teammates[/b], [b]Player marker range[/b], [b]player smart tags[/b], [b]tagged-only enemy and item filtering[/b], supported [b]ability outlines[/b], and the local [b]player center dot[/b].[/*]\n<br />[*]Adds [b]Player marker range[/b] with [b]Normal[/b] and [b]Infinite[/b] modes, allowing teammate markers to stay visible beyond the normal radar range when desired.[/*]\n<br />[*]Includes mission-ready keybinds for [b]toggle radar on or off[/b], [b]toggle overview mode[/b], temporary radar zoom, and radar movement, plus per-mode enable toggles for [b]Regular Missions[/b], [b]Havoc[/b], [b]Mortis Trials[/b], and [b]Expeditions[/b].[/*]\n<br />[*]Adds a temporary [b]centered overview[/b] radar view with zoom controls and optional scale legends, useful for quick route checks, objective awareness, and loot sweeps without permanently moving the normal radar.[/*]\n<br />[*]Supports anchor-based [b]radar positioning[/b] with offsets, movement keybinds, configurable movement step size, and an optional unrestricted positioning fallback for ultrawide or advanced layouts.[/*]\n<br />[*]Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b] display modes for the supported artwork-based pickup families, with automatic migration from older boolean settings.[/*]\n<br />[*]Supports per-category [b]Expedition POI[/b] display modes: [b]Icon only[/b], [b]Icon + Distance m[/b], and [b]Off[/b]. This lets Sites of Interest, Sanctuaries, Harvesters, Main Objective, Extraction, and Arrival markers each decide independently whether to show distance text.[/*]\n<br />[*]Adds optional nearby screen-space highlight brackets for supported non-enemy marker groups, with configurable thickness, per-marker highlight colors, and optional distance labels on the screen highlight, the radar marker, or both.[/*]\n<br />[*]Adds dedicated [b]Expedition POI[/b] support for numbered [b]Sites of Interest[/b], [b]Deadsider Sanctuaries[/b], [b]Data Reliquary Harvesters[/b], [b]Main Objective[/b], [b]Valkyrie Extraction Zone[/b], and [b]Valkyrie Arrival Zone[/b], with cleanup across active-section and sanctuary transitions.[/*]\n<br />[*]Supports tech-remnant loot modes for [b]Default[/b], [b]Scale by value[/b], and [b]Merge nearby piles[/b], plus optional cluster value text and radius tuning.[/*]\n<br />[*]Includes optional [b]boss distance text[/b], [b]Infinite[/b] boss range, [b]Infinite[/b] teammate marker range, per-enemy-category vertical arrow toggles, [b]debug logs[/b], and an [b]unknown pickups[/b] toggle for discovery and troubleshooting.[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Optional Enhanced Settings Menu[/b][/size]\n<br />\n<br />Radar works with the normal [b]Darktide Mod Framework[/b] options menu. If you also use [url=https://www.nexusmods.com/warhammer40kdarktide/mods/864][b]Alf's Mod Settings Extensions[/b][/url], compatible color slider groups can appear as compact color picker widgets and the settings menu can use the enhanced presentation. This is optional; all settings remain available without it.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]In-Game Radar Examples[/b][/size]\n<br />\n<br />The screenshots below show the live radar styles in gameplay. Together they illustrate the camera-oriented layout, mixed pickup categories, teammate markers, expedition POIs, smart tag support, priority targets, and the optional centered overview mode.\n<br />\n<br />[size=4][b]Circle Radar[/b][/size]\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_1.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_2.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_3.png[/img][/center]\n<br />\n<br />[size=4][b]Square Radar[/b][/size]\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_1.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_2.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_3.png[/img][/center]\n<br />\n<br />[size=4][b]Auspex Radar[/b][/size]\n<br />\n<br />The [b]Auspex[/b] style provides a more diegetic scanner look. It supports the same gameplay marker data as the other radar styles, plus an optional animated sweep that can be disabled independently. Square and Circle radar can also use an Auspex-style guide background when you want the scanner look without switching the full radar style.\n<br />\n<br />[center][b]Solid  |  Dotted  |  Off  |  No sweep[/b][/center]\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/auspex_radar_solid.gif[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/auspex_radar_dotted.gif[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/auspex_radar_off.gif[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/auspex_radar_no_sweep.gif[/img][/center]\n<br />\n<br />[size=4][b]Centered overview mode[/b][/size]\n<br />\n<br />Centered overview mode opens a larger radar view in the middle of the screen from a keybind. It is meant for quick route checks, objective awareness, and loot sweeps, with temporary zoom controls and optional scale legends while the mode is active.\n<br />\n<br />[center][youtube]OTm6TOjFHvw[/youtube][/center]\n<br />[center][size=1]Debug logs are deactivated by default.[/size][/center]\n<br />It respects the selected style, outline, and guides. Scale legends can be turned off too.\n<br />\n<br />[size=4][b]Nearby highlight example[/b][/size]\n<br />\n<br />Nearby highlights add small screen-space brackets for supported non-enemy markers when they are close enough to matter. You can tune their thickness, set per-marker highlight colors with [b]Opacity[/b], [b]Red[/b], [b]Green[/b], and [b]Blue[/b] sliders, and show item distance text on the screen highlight, the radar marker, or both.\n<br />\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/highlight_example.png[/img][/center]\n<br />\n<br />[size=4][b]Vertical item and enemy arrows[/b][/size]\n<br />\n<br />Vertical arrows can show a small [b]up[/b] or [b]down[/b] overlay when a supported marker is on another level but still close enough horizontally to matter. Item markers can use this behavior globally, and enemy markers can now use it per enemy category: [b]Boss[/b], [b]Horde[/b], [b]Common[/b], [b]Shooter[/b], [b]Elite[/b], [b]Special[/b], and [b]Misc[/b].\n<br />\n<br />The arrow range and vertical hiding threshold remain global, so enemy arrows reuse the same distance behavior as supported item arrows without adding separate per-category hiding rules. The shared arrow color can be customized in [b]Radar Colors[/b].\n<br />\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_up.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_down.png[/img][/center]\n<br />[center][b]Same level  |  Above you  |  Below you[/b][/center]\n<br />[center][size=1]The example uses item markers, but the same arrow overlay can also be enabled for enemy categories.[/size][/center]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Display and Behavior[/b][/size]\n<br />\n<br />[b]Square[/b] and [b]Circle[/b] radar styles support the same outline and guide options, and the frame rendering is tuned so crosshairs fit the active frame, view guides reach the border cleanly, circle range rings stay thin and solid, circle outlines remain visually continuous, and square dotted outlines render as proper dots. They can also use the [b]Auspex[/b] guide background if you prefer a scanner-like guide treatment on those shapes.\n<br />\n<br />The full [b]Auspex[/b] style is a separate presentation layer rather than another outline or guide combination. It uses its own frame treatment and can optionally render with an animated sweep. The [b]Auspex[/b] guide background for Square and Circle is a guide option, so it can be combined with the normal Square or Circle radar shape.\n<br />\n<br />[b]Centered overview mode[/b] is a temporary, keybind-driven overview radar. It keeps the normal radar placement intact, opens a larger centered view when needed, and supports captured zoom inputs so overview zooming does not accidentally trigger unrelated actions.\n<br />\n<br />[size=4][b]Square radar variants[/b][/size]\n<br />\n<br />[b]Crosshair[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_square_solid_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_square_off_crosshair.png[/img][/center]\n<br />\n<br />[b]View Guides[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_solid_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_off_view_guides.png[/img][/center]\n<br />\n<br />[b]Rings[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_square_solid_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_square_off_rings.png[/img][/center]\n<br />\n<br />[b]Off[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_square_solid_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_square_off_off.png[/img][/center]\n<br />\n<br />[size=4][b]Circle radar variants[/b][/size]\n<br />\n<br />[b]Crosshair[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_circle_solid_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_circle_off_crosshair.png[/img][/center]\n<br />\n<br />[b]View Guides[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_solid_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_off_view_guides.png[/img][/center]\n<br />\n<br />[b]Rings[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_circle_solid_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_circle_off_rings.png[/img][/center]\n<br />\n<br />[b]Off[/b]\n<br />[center][b]Solid  |  Dotted  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_circle_solid_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_circle_off_off.png[/img][/center]\n<br />\n<br />[size=4][b]Artwork, Icon, Off display modes[/b][/size]\n<br />\n<br />Supported artwork-based markers can be shown as [b]Artwork[/b], [b]Icon[/b], or [b]Off[/b]. Existing saved boolean settings are migrated automatically, with old [b]true[/b] values becoming [b]Artwork[/b] and old [b]false[/b] values becoming [b]Off[/b].\n<br />\n<br />[b]Common pickups and materials[/b]\n<br />[center][b]Artwork  |  Icon  |  Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown_alternative.png[/img][b]Hidden[/b][/center]\n<br />\n<br />[size=4][b]Expedition POI display modes[/b][/size]\n<br />\n<br />Expedition POI categories use their own display-mode dropdowns. Each category can be configured independently.\n<br />\n<br />[list]\n<br />[*][b]Icon only[/b] - Shows the POI icon without distance text.[/*]\n<br />[*][b]Icon + Distance m[/b] - Shows the POI icon together with the current distance in meters.[/*]\n<br />[*][b]Off[/b] - Hides that POI category completely.[/*]\n<br />[/list]\n<br />[b]Default Expedition POI modes[/b]\n<br />[list]\n<br />[*][b]Sites of Interest[/b] - [b]Icon + Distance m[/b][/*]\n<br />[*][b]Deadsider Sanctuaries[/b] - [b]Icon only[/b][/*]\n<br />[*][b]Data Reliquary Harvesters[/b] - [b]Icon only[/b][/*]\n<br />[*][b]Main Objective[/b] - [b]Icon only[/b][/*]\n<br />[*][b]Valkyrie Extraction Zone[/b] - [b]Icon only[/b][/*]\n<br />[*][b]Valkyrie Arrival Zone[/b] - [b]Icon only[/b][/*]\n<br />[/list]\n<br />Existing saved boolean values are migrated automatically: old [b]true[/b] values become [b]Icon only[/b], and old [b]false[/b] values become [b]Off[/b]. This keeps existing user preferences stable while adding the new distance-text mode.\n<br />\n<br />[b]Tech-Remnant cluster example[/b]\n<br />\n<br />The example below shows [b]Tech-Remnant marker mode[/b] set to [b]Merge nearby piles[/b]. In this mode, nearby piles are combined into a single clustered radar marker, which helps reduce clutter in dense expedition loot areas. Also for reference [b]Show tech-remnant value text[/b] is set to [b]true[/b].\n<br />\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/tech-remnants_scale_amount_example.png[/img][/center]\n<br />\n<br />[b]Radar Controls[/b]\n<br />[list]\n<br />[*][b]Enable radar[/b] - Master on or off switch for the HUD element.[/*]\n<br />[*][b]Enable in Regular Missions[/b] - Enables or disables the radar for standard mission runs.[/*]\n<br />[*][b]Enable in Havoc[/b] - Enables or disables the radar in Havoc.[/*]\n<br />[*][b]Enable in Mortis Trials[/b] - Enables or disables the radar in Mortis Trials.[/*]\n<br />[*][b]Enable in Expeditions[/b] - Enables or disables the radar in Expeditions.[/*]\n<br />[*][b]Toggle radar on or off[/b] - Assign a key to switch the radar HUD visibility during gameplay without opening the options menu.[/*]\n<br />[*][b]Toggle overview mode[/b] - Assign a key to open or close the centered overview radar during a mission.[/*]\n<br />[*][b]Radar zoom modifier[/b] - Hold this key to let the shared zoom inputs control the normal radar instead of overview mode.[/*]\n<br />[*][b]Radar zoom in[/b] - Zooms the active radar view in, depending on overview state and modifier use.[/*]\n<br />[*][b]Radar zoom out[/b] - Zooms the active radar view out, depending on overview state and modifier use.[/*]\n<br />[*][b]Reset radar zoom[/b] - Restores the active radar zoom level to its default.[/*]\n<br />[*][b]Show scale legends[/b] - Shows scale reference labels in overview mode.[/*]\n<br />[*][b]Max overview markers[/b] - Controls how many markers can be shown in overview mode.[/*]\n<br />[*][b]Radar size[/b] - Adjustable from [b]100[/b] to [b]1200[/b].[/*]\n<br />[*][b]Radar range / filter distance[/b] - Adjustable from [b]10 m[/b] to [b]200 m[/b] for the normal radar.[/*]\n<br />[*][b]Show vertical arrows within range (m)[/b] - Adjustable from [b]25 m[/b] to [b]100 m[/b]. Supported item markers and enemy markers with vertical arrows enabled show a small [b]up[/b] or [b]down[/b] arrow when they are on another level and still within this horizontal range.[/*]\n<br />[*][b]Hide vertical markers above/below (m)[/b] - Adjustable from [b]8 m[/b] to [b]50 m[/b]. Supported item markers and enemy markers with vertical arrows enabled are hidden when their vertical separation is larger than this value.[/*]\n<br />[*][b]Max radar markers[/b] - Adjustable from [b]10[/b] to [b]200[/b].[/*]\n<br />[*][b]Scale icons with radar size[/b] - Keeps marker size fixed or scales it with the radar. The final combined icon size is capped at [b]4.0x[/b].[/*]\n<br />[*][b]Radar style[/b] - [b]Square[/b], [b]Circle[/b], or [b]Auspex[/b].[/*]\n<br />[*][b]Radar outline[/b] - [b]Solid[/b], [b]Dotted[/b], or [b]Off[/b]. Only used by the [b]Square[/b] and [b]Circle[/b] radar styles.[/*]\n<br />[*][b]Radar guides[/b] - [b]Crosshair[/b], [b]View guides[/b], [b]Range rings[/b], [b]Auspex[/b], or [b]Off[/b]. Only used by the [b]Square[/b] and [b]Circle[/b] radar styles.[/*]\n<br />[*][b]Radar Colors[/b] - ARGB sliders for the radar background, outline, guides, Auspex scanner layers, marker text, vertical arrows, and overview legend indicators.[/*]\n<br />[*][b]Animated radar sweep[/b] - Enables or disables the animated sweep used by the full [b]Auspex[/b] radar style and by Square or Circle radar when the [b]Auspex[/b] guide background is selected.[/*]\n<br />[*][b]Nearby highlight range (m)[/b] - Adjustable from [b]5 m[/b] to [b]20 m[/b]. Controls how close supported items must be before their screen-space bracket highlights appear.[/*]\n<br />[*][b]Highlight thickness[/b] - Adjusts the line thickness used by nearby screen-space highlight brackets.[/*]\n<br />[*][b]Marker highlight colors[/b] - Supported marker groups can have their own nearby highlight color, configured with [b]Opacity[/b], [b]Red[/b], [b]Green[/b], and [b]Blue[/b] sliders next to the marker option they affect.[/*]\n<br />[*][b]Show distance above nearby highlights[/b] - Shows item distance text above supported nearby screen-space highlights.[/*]\n<br />[*][b]Show distance on radar markers[/b] - Shows distance text on supported nearby radar markers.[/*]\n<br />[*][b]Boss marker style[/b] - [b]Icon only[/b] or [b]Marked icon[/b].[/*]\n<br />[*][b]Boss marker range[/b] - [b]Normal[/b] or [b]Infinite[/b]. Lets boss-type markers follow the normal radar range or stay visible at any distance.[/*]\n<br />[*][b]Show boss distance text[/b] - Shows yellow distance text in meters for bosses except the daemonhost.[/*]\n<br />[*][b]Teammates[/b] - Shows or hides teammate markers on the radar.[/*]\n<br />[*][b]Player marker range[/b] - [b]Normal[/b] or [b]Infinite[/b]. Lets teammate markers follow the normal radar range or stay visible at any distance.[/*]\n<br />[*][b]Player center dot[/b] - Shows or hides your own center point on the radar.[/*]\n<br />[*][b]Player marker style[/b] - [b]Icon only[/b], [b]Marked icon[/b], [b]Dot only[/b], or [b]Marked dot[/b].[/*]\n<br />[*][b]Player Tags[/b] - Shows or hides player smart tags and pings on the radar.[/*]\n<br />[*][b]Show player tag distance text[/b] - Shows the current distance in meters next to player tag markers.[/*]\n<br />[*][b]Player tag display style[/b] - [b]Icon only[/b] or [b]Marked icon[/b].[/*]\n<br />[*][b]Radar anchor[/b] - [b]Top left[/b], [b]Top right[/b], [b]Bottom left[/b], or [b]Bottom right[/b]. Sets the corner the radar offsets from.[/*]\n<br />[*][b]Allow unrestricted radar positioning[/b] - Removes the normal UI-space clamping fallback, which is useful for ultrawide or highly customized layouts.[/*]\n<br />[*][b]Horizontal offset[/b] - Sets the radar's horizontal offset from the selected anchor.[/*]\n<br />[*][b]Vertical offset[/b] - Sets the radar's vertical offset from the selected anchor.[/*]\n<br />[*][b]Steps per input[/b] - Sets how far each radar movement key press nudges the radar.[/*]\n<br />[*][b]Move radar left[/b] - Assign a key to move the radar left by the configured step size.[/*]\n<br />[*][b]Move radar right[/b] - Assign a key to move the radar right by the configured step size.[/*]\n<br />[*][b]Move radar up[/b] - Assign a key to move the radar up by the configured step size.[/*]\n<br />[*][b]Move radar down[/b] - Assign a key to move the radar down by the configured step size.[/*]\n<br />[/list]\n<br />[b]Marker display mode controls[/b]\n<br />[list]\n<br />[*][b]Common Pickups[/b] - Crates, with [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].[/*]\n<br />[*][b]Collectable Materials[/b] - Diamantine and Plasteel, with [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].[/*]\n<br />[*][b]Expeditions-Specific Items[/b] - Salvage, Tech-Remnants, Dropped Tech-Remnants, Servo-Triggered Mine, Purgation Snare, Voltaic Snare, Void Shell, Bombing Run Signal Marker, Artillery Locator Beacon, Modified Grenade, and Fire-Support Signal Marker, each with [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].[/*]\n<br />[*][b]Expedition POIs[/b] - Sites of Interest, Deadsider Sanctuaries, Data Reliquary Harvesters, Main Objective, Valkyrie Extraction Zone, and Valkyrie Arrival Zone, each with [b]Icon only[/b], [b]Icon + Distance m[/b], and [b]Off[/b].[/*]\n<br />[*][b]Enemy bosses[/b] - Daemonhost, Monstrosities, Captains, and Karnak Twins, with [b]Icon only[/b] or [b]Marked icon[/b].[/*]\n<br />[*][b]Enemy groups[/b] - Common enemies and Shooters, with [b]Icon only[/b], [b]Marked icon[/b], or [b]Off[/b].[/*]\n<br />[*][b]Individual enemy toggles[/b] - Elite, Special, and Misc enemies listed below, with [b]Icon only[/b], [b]Marked icon[/b], or [b]Off[/b].[/*]\n<br />[/list]\n<br />[b]Per-category icon size controls[/b]\n<br />[list]\n<br />[*]Each major option group includes an [b]Icon size (%)[/b] slider.[/*]\n<br />[*]These sliders resize the whole marker family from [b]50%[/b] to [b]300%[/b].[/*]\n<br />[*]When combined with [b]Scale icons with radar size[/b], the final rendered icon size is still capped at [b]4.0x[/b].[/*]\n<br />[*][b]Common Pickups[/b] - Crates, ammo, grenades, portable crates, and stimms.[/*]\n<br />[*][b]Collectable Materials[/b] - Diamantine and Plasteel.[/*]\n<br />[*][b]Primary Objective Items[/b] - Mission luggables and primary objective pickups.[/*]\n<br />[*][b]Secondary Objective Items[/b] - Grimoires and Scriptures.[/*]\n<br />[*][b]Expeditions POI[/b] - Sites of Interest, sanctuaries, harvesters, main objective, extraction, and arrival markers.[/*]\n<br />[*][b]Expeditions-Specific Items[/b] - Salvage, Tech-Remnants, expedition pocketables, and related expedition pickups.[/*]\n<br />[*][b]Martyr's Skull Items[/b] - Martyr's Skull markers and related power cell markers.[/*]\n<br />[*][b]Environment[/b] - Medicae Station, Power Socket, and Heretic Idol.[/*]\n<br />[*][b]Deployed Items[/b] - Ammo Crate and Medical Crate deployables.[/*]\n<br />[*][b]Enemies[/b] - High-priority boss markers.[/*]\n<br />[*][b]Enemy Boss[/b] - Daemonhost, Monstrosities, Captains, and Karnak Twins.[/*]\n<br />[*][b]Enemy Horde[/b] - Horde enemies.[/*]\n<br />[*][b]Enemy Common[/b] - Common enemies.[/*]\n<br />[*][b]Enemy Shooter[/b] - Shooter enemies.[/*]\n<br />[*][b]Enemy Elite[/b] - Elite enemies.[/*]\n<br />[*][b]Enemy Special[/b] - Special enemies.[/*]\n<br />[*][b]Enemy Misc[/b] - Ritualists.[/*]\n<br />[*][b]Players[/b] - Teammate markers.[/*]\n<br />[*][b]Event-Related Items[/b] - Event pickups and event objectives, including Dark Rites totems and servo skulls.[/*]\n<br />[*][b]Debugging[/b] - Unknown pickup markers and debug visuals.[/*]\n<br />[/list]\n<br />[b]Nearby Highlight Controls[/b]\n<br />[list]\n<br />[*][b]Nearby highlight range (m)[/b] - Global range for the nearby screen-space bracket effect.[/*]\n<br />[*][b]Highlight thickness[/b] - Adjusts the line thickness used by nearby screen-space highlight brackets.[/*]\n<br />[*][b]Per-marker highlight colors[/b] - Supported marker groups can have their own nearby highlight color. Each color uses [b]Opacity[/b], [b]Red[/b], [b]Green[/b], and [b]Blue[/b] sliders placed next to the marker option it belongs to.[/*]\n<br />[*][b]Show distance above nearby highlights[/b] - Shows item distance text above supported nearby screen-space highlights.[/*]\n<br />[*][b]Show distance on radar markers[/b] - Shows distance text on supported nearby radar markers.[/*]\n<br />[*][b]Common Pickups[/b] - Highlights nearby ammo, grenades, crates, portable crates, and stimms.[/*]\n<br />[*][b]Collectable Materials[/b] - Highlights nearby diamantine and plasteel.[/*]\n<br />[*][b]Primary Objective Items[/b] - Highlights nearby mission luggables and main objective pickups.[/*]\n<br />[*][b]Secondary Objective Items[/b] - Highlights nearby grimoires and scriptures.[/*]\n<br />[*][b]Expeditions-Specific Items[/b] - Highlights nearby salvage, tech-remnants, expedition pocketables, and related expedition pickups.[/*]\n<br />[*][b]Martyr's Skull Items[/b] - Highlights nearby martyr's skull items and their orange power cell markers.[/*]\n<br />[*][b]Environment[/b] - Highlights nearby medicae stations, power sockets, and heretic idols.[/*]\n<br />[*][b]Event-Related Items[/b] - Highlights nearby event pickups and event objectives, including Dark Rites totems and servo skulls.[/*]\n<br />[/list]\n<br />[b]Enemy Radar Controls[/b]\n<br />[list]\n<br />[*][b]Boss marker style[/b] - [b]Icon only[/b] or [b]Marked icon[/b].[/*]\n<br />[*][b]Boss marker range[/b] - [b]Normal[/b] or [b]Infinite[/b].[/*]\n<br />[*][b]Show boss distance text[/b] - Shows yellow distance text for bosses except the daemonhost.[/*]\n<br />[*][b]Enemy Boss icon size[/b] - Boss-only size slider.[/*]\n<br />[*][b]Monstrosities[/b] - Shows daemonhost and generic monstrosity markers.[/*]\n<br />[*][b]Ability-marked enemies[/b] - Also includes enemies while they have a supported ability or smart-tag outline, subject to the normal enemy display rules.[/*]\n<br />[*][b]Tagged enemies only[/b] - Only shows enemy markers while the enemy has an active in-game tag. Tagged enemies also ignore the normal radar range limit while tagged.[/*]\n<br />[*][b]Captains[/b] - Shows captain markers.[/*]\n<br />[*][b]Karnak Twins[/b] - Shows the dedicated Karnak Twins marker.[/*]\n<br />[*][b]Enemy Horde icon size[/b] - Size slider for horde enemies.[/*]\n<br />[*][b]Horde enemies[/b] - Single toggle for horde markers. Horde enemies stay on or off rather than using per-unit display modes.[/*]\n<br />[*][b]Enemy Common icon size[/b] - Size slider for common enemies.[/*]\n<br />[*][b]Common enemies[/b] - Shared display-style dropdown for common enemy markers.[/*]\n<br />[*][b]Enemy Shooter icon size[/b] - Size slider for shooter enemies.[/*]\n<br />[*][b]Shooters[/b] - Shared display-style dropdown for shooter enemy markers.[/*]\n<br />[*][b]Enemy Elite icon size[/b] - Size slider for elite enemies.[/*]\n<br />[*][b]Enemy Special icon size[/b] - Size slider for special enemies.[/*]\n<br />[*][b]Enemy Misc icon size[/b] - Size slider for misc enemies.[/*]\n<br />[*]Most elite, special, and misc enemies have their own [b]Icon only[/b], [b]Marked icon[/b], or [b]Off[/b] dropdown.[/*]\n<br />[*]Horde enemies stay intentionally simple and use a single on or off toggle.[/*]\n<br />[/list]\n<br />[b]Enemy Vertical Arrow Controls[/b]\n<br />[list]\n<br />[*][b]Show boss vertical arrows[/b] - Enables vertical arrows for daemonhost, monstrosity, captain, and Karnak Twin markers.[/*]\n<br />[*][b]Show horde vertical arrows[/b] - Enables vertical arrows for horde enemy markers.[/*]\n<br />[*][b]Show common enemy vertical arrows[/b] - Enables vertical arrows for common enemy markers.[/*]\n<br />[*][b]Show shooter vertical arrows[/b] - Enables vertical arrows for shooter enemy markers.[/*]\n<br />[*][b]Show elite vertical arrows[/b] - Enables vertical arrows for elite enemy markers.[/*]\n<br />[*][b]Show special vertical arrows[/b] - Enables vertical arrows for special enemy markers.[/*]\n<br />[*][b]Show misc enemy vertical arrows[/b] - Enables vertical arrows for misc enemy markers, currently Ritualists.[/*]\n<br />[*]These options only control the [b]up[/b] or [b]down[/b] arrow overlay. They do not change core marker visibility, display style, range mode, or tagged-only behavior.[/*]\n<br />[*]All enemy vertical arrow options use the shared [b]Show vertical arrows within range (m)[/b] and [b]Hide vertical markers above/below (m)[/b] settings.[/*]\n<br />[*]The shared vertical arrow color is available in [b]Radar Colors[/b].[/*]\n<br />[/list]\n<br />[b]Tech-Remnant Controls[/b]\n<br />[list]\n<br />[*][b]Tech-Remnants[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].[/*]\n<br />[*][b]Dropped Tech-Remnants[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].[/*]\n<br />[*][b]Tech-Remnant marker mode[/b] - [b]Default[/b], [b]Scale by value[/b], or [b]Merge nearby piles[/b].[/*]\n<br />[*][b]Cluster horizontal radius[/b] - Horizontal merge range for clustered tech-remnant markers.[/*]\n<br />[*][b]Cluster vertical radius[/b] - Vertical merge range for clustered tech-remnant markers.[/*]\n<br />[*][b]Show cluster value[/b] - Shows a value badge on clustered tech-remnant markers.[/*]\n<br />[/list]\n<br />[b]Expedition POI Controls[/b]\n<br />[list]\n<br />[*][b]Expeditions POI[/b] - Group of expedition location marker display modes.[/*]\n<br />[*][b]Ignore range limit for POI[/b] - Lets expedition POI markers bypass the normal radar range filter.[/*]\n<br />[*][b]Sites of Interest[/b] - Shows registered expedition opportunity locations, including numbered scanner-map opportunity markers. Default: [b]Icon + Distance m[/b].[/*]\n<br />[*][b]Deadsider Sanctuaries[/b] - Shows expedition transition or sanctuary locations with the dedicated transition icon. Default: [b]Icon only[/b].[/*]\n<br />[*][b]Data Reliquary Harvesters[/b] - Shows expedition loot converters with the dedicated harvester icon while inside the sanctuary where they are usable. Default: [b]Icon only[/b].[/*]\n<br />[*][b]Main Objective[/b] - Shows expedition main objective locations with the dedicated objective icon. Default: [b]Icon only[/b].[/*]\n<br />[*][b]Valkyrie Extraction Zone[/b] - Shows extraction points with the dedicated extraction icon. Default: [b]Icon only[/b].[/*]\n<br />[*][b]Valkyrie Arrival Zone[/b] - Shows arrival points with the dedicated arrival icon. Default: [b]Icon only[/b].[/*]\n<br />[*]Each POI category supports [b]Icon only[/b], [b]Icon + Distance m[/b], and [b]Off[/b].[/*]\n<br />[/list]\n<br />[b]Environment Controls[/b]\n<br />[list]\n<br />[*][b]Environment[/b] - Group of toggles for interactable world objects that are useful to spot on the radar.[/*]\n<br />[*][b]Medicae Station[/b] - Shows medicae station and equivalent health station interactions.[/*]\n<br />[*][b]Power Socket[/b] - Shows luggable power socket targets.[/*]\n<br />[*][b]Heretic Idol[/b] - Shows active heretic idols while they are still present.[/*]\n<br />[/list]\n<br />[b]Event Controls[/b]\n<br />[list]\n<br />[*][b]Event-Related Items[/b] - Group of toggles for live-event pickups and event objectives.[/*]\n<br />[*][b]Tainted Skulls[/b] - Shows tainted skull pickups from skull live-event circumstances.[/*]\n<br />[*][b]Dark Rites Totems[/b] - Shows destroyable Dark Rites ritual totems while they are still active.[/*]\n<br />[*][b]Dark Rites Servo Skulls[/b] - Shows the spawned Dark Rites servo skull objective interactable.[/*]\n<br />[*][b]Tainted Communications Device[/b] - Shows corrupted auspex scanner event pickups.[/*]\n<br />[*][b]Holy Relics[/b] - Shows Holy Relics event pickups.[/*]\n<br />[*][b]Stolen Rations[/b] - Shows Stolen Rations event pickups.[/*]\n<br />[/list]\n<br />[b]Positioning and Toggle Use[/b]\n<br />[list]\n<br />[*]Use [b]Toggle radar on or off[/b] for quick in-mission HUD control, or the per-mode enable toggles if you want Radar active only in selected activities.[/*]\n<br />[*]Use [b]Toggle overview mode[/b] when you want a quick centered scan of the nearby area without changing where the normal radar sits on your HUD.[/*]\n<br />[*]Use the zoom keybinds to adjust the overview radar while it is active. Hold [b]Radar zoom modifier[/b] when you want those same zoom inputs to affect the normal radar instead.[/*]\n<br />[*]Use [b]Radar anchor[/b], [b]Horizontal offset[/b], and [b]Vertical offset[/b] for stable placement, then fine-tune with the movement keybinds and [b]Steps per input[/b].[/*]\n<br />[*]Standard placement stays clamped to the visible UI space, while [b]Allow unrestricted radar positioning[/b] is available for ultrawide or advanced layouts.[/*]\n<br />[/list]\n<br />[b]Marker Rules[/b]\n<br />[list]\n<br />[*][b]Enemies[/b], [b]teammates[/b], and [b]player smart tags[/b] each use their own display rules and style settings. Teammates also have a [b]Player marker range[/b] mode, so they can follow the normal radar range or stay visible at any distance. The local [b]center dot[/b] has its own toggle and is not affected by teammate range mode.[/*]\n<br />[*]Supported enemies can also be surfaced through active ability-mark or smart-tag outline states when [b]Ability-marked enemies[/b] is enabled.[/*]\n<br />[*][b]Tagged enemies only[/b] and [b]Tagged items only[/b] restrict visibility to actively tagged targets, and those tagged targets ignore the usual radar range limit while the tag remains active.[/*]\n<br />[*][b]Supported item markers[/b] and [b]enemy markers from enabled enemy categories[/b] can show a small [b]up[/b] or [b]down[/b] arrow when they are above or below you within the configured arrow range. They use the shared vertical arrow range and shared vertical hide threshold.[/*]\n<br />[*][b]Nearby highlights[/b] appear as small screen-space brackets for supported categories, use their own per-marker color sliders, and are suppressed when the matching radar marker category is turned off.[/*]\n<br />[*][b]Expedition POIs[/b] can show icons only, icons with distance text in meters, or be hidden per POI category. They can optionally ignore the normal radar range limit.[/*]\n<br />[*][b]Expedition POIs[/b], [b]environment markers[/b], and [b]tech-remnant clusters[/b] follow their own category-specific rules so outdated markers clear correctly, context-sensitive markers only appear when relevant, and expedition markers clean up more reliably across Deadsider Sanctuary transitions.[/*]\n<br />[*][b]Event markers[/b] use elevated marker priority so Dark Rites objectives stay easier to see when dense enemy markers are nearby.[/*]\n<br />[*][b]Player smart tags[/b] intentionally stay flatter and cleaner than supported item markers. They do not use the item-style elevation arrow presentation.[/*]\n<br />[*][b]Centered overview mode[/b] uses the same marker categories as the normal radar, with its own overview marker limit and zoom presentation for readability.[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Target Markers[/b][/size]\n<br />\n<br />The legend below follows the marker groups shown in the Radar options menu. Enemy markers are listed in the same gameplay-oriented order used by the enemy settings: bosses, horde, common, shooters, elites, specials, and misc. Each enemy category can also enable vertical [b]up[/b] and [b]down[/b] arrows independently. The preview tiles use the same artwork and default colors as the in-game markers.\n<br />\n<br />[size=4][b]Ability outline and smart-tag examples[/b][/size]\n<br />\n<br />These examples show supported outline states that can optionally count as radar-visible enemy targets when [b]Ability-marked enemies[/b] is enabled.\n<br />\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/adamant_mark_target.png[/img][/b] - Adamant mark target - Example of Arbitrator's \"Execution Order\" target outline.\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/adamant_smart_tag.png[/img][/b] - Adamant smart tag - Example of a Cyber-Mastiff attack order style outline state.\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/broker_proximity_target.png[/img][/b] - Broker proximity target - Example of a Hive Scum's \"Enhanced Desperado\" outline state.\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/psyker_marked_target.png[/img][/b] - Psyker marked target - Example of a Psyker's \"Disrupt Destiny\" effect.\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/veteran_smart_tag.png[/img][/b] - Veteran smart tag - Example of a Veteran's \"Focus Target!\" outline state.\n<br />[b][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/veteran_special_target.png[/img][/b] - Veteran special target - Example of a Veteran's \"Executioner's Stance\" outline state, with local-owning-context gating to avoid unrelated shared outlines.\n<br />\n<br />[size=4][b]High-Priority Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_daemonhost.png[/img] [b]Daemonhost[/b] - Separate presentation under the [b]Monstrosities[/b] toggle. It uses boss marker styling but does not show boss distance text.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_monstrosity.png[/img] [b]Monstrosities[/b] - Covers the generic boss presentation used for Beast of Nurgle, Plague Ogryn, Chaos Spawn, and Ogryn Houndmaster. [b]Boss marker range[/b] can be set to [b]Normal[/b] or [b]Infinite[/b], and optional boss distance text is supported.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_captain.png[/img] [b]Captains[/b] - Red danger marker with bracket accent in marked mode.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_karnak_twin.png[/img] [b]Karnak Twins[/b] - Dedicated presentation for the twins.\n<br />\n<br />Display style example for boss and enemy markers:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_icon_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_monstrosity.png[/img]\n<br />Left: [b]Icon only[/b]. Right: [b]Marked icon[/b].\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Horde Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/horde.png[/img] [b]Horde enemies[/b] - Shared horde presentation used for Groaners, Moebian 21st infantry, Poxwalkers, lesser mutated poxwalkers, mutated poxwalkers, and related horde-only infected. Horde enemies use a single on or off toggle plus the [b]Enemy Horde[/b] size slider.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Common Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_melee.png[/img] [b]Dreg Bruiser[/b] - Uses the shared [b]Common enemies[/b] display-style dropdown.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_melee.png[/img] [b]Scab Bruiser[/b] - Uses the shared [b]Common enemies[/b] display-style dropdown.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Shooter Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_assault.png[/img] [b]Dreg Stalker[/b] - Uses the shared [b]Shooters[/b] display-style dropdown.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_assault.png[/img] [b]Scab Stalker[/b] - Uses the shared [b]Shooters[/b] display-style dropdown.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_rifleman.png[/img] [b]Scab Shooter[/b] - Uses the shared [b]Shooters[/b] display-style dropdown.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Elite Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_gunner.png[/img] [b]Dreg Gunner[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_berzerker.png[/img] [b]Dreg Rager[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_shocktrooper.png[/img] [b]Dreg Shotgunner[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_gunner.png[/img] [b]Scab Gunner[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_radio_operator.png[/img] [b]Scab Gunner Radio Operator, a mutator variant[/b] - Uses the same toggle and size settings as [b]Scab Gunner[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_executor.png[/img] [b]Scab Mauler[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_plasma_gunner.png[/img] [b]Scab Plasma Gunner[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_berzerker.png[/img] [b]Scab Rager[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_shocktrooper.png[/img] [b]Scab Shotgunner[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_ogryn_bulwark.png[/img] [b]Ogryn - Bulwark[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_ogryn_executor.png[/img] [b]Ogryn - Crusher[/b] - Individual elite enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_ogryn_gunner.png[/img] [b]Ogryn - Reaper[/b] - Individual elite enemy toggle.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Special Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_grenadier.png[/img] [b]Scab Bomber[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_grenadier.png[/img] [b]Dreg Tox Bomber[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_flamer.png[/img] [b]Scab Flamer[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_flamer_mutator.png[/img] [b]Scab Flamer, mutator variant[/b] - Uses the same toggle and size settings as [b]Scab Flamer[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_flamer.png[/img] [b]Dreg Tox Flamer[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/cultist_mutant.png[/img] [b]Mutant[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_hound.png[/img] [b]Pox Hound[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_hound_mutator.png[/img] [b]Pox Hound, mutator variant[/b] - Uses the same toggle and size settings as [b]Pox Hound[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_armored_hound.png[/img] [b]Armored Pox Hound[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_poxwalker_bomber.png[/img] [b]Poxburster[/b] - Individual special enemy toggle. The default display style is [b]Marked icon[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_sniper.png[/img] [b]Sniper[/b] - Individual special enemy toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/renegade_netgunner.png[/img] [b]Trapper[/b] - Individual special enemy toggle.\n<br />\n<br />Poxburster style example:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_poxwalker_bomber.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_poxwalker_bomber_marked.png[/img]\n<br />Left: [b]Icon only[/b]. Right: [b]Marked icon[/b].\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Misc Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/chaos_ritualist.png[/img] [b]Ritualist[/b] - Dedicated misc enemy toggle with its own [b]Enemy Misc[/b] size slider.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Teammates[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_sample.png[/img] [b]Teammates[/b] - Uses class icons, colored by teammate slot at runtime. Can be shown as [b]Icon only[/b], [b]Marked icon[/b], [b]Dot only[/b], and [b]Marked dot[/b]. Teammates can be toggled independently from the local player center dot, and [b]Player marker range[/b] can be set to [b]Normal[/b] or [b]Infinite[/b].\n<br />\n<br />Display style example for teammate markers:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_icon_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_dot_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_marked_dot_sample.png[/img]\n<br />From left to right:\n<br />[list]\n<br />[*][b]Icon only[/b][/*]\n<br />[*][b]Marked icon[/b][/*]\n<br />[*][b]Dot only[/b][/*]\n<br />[*][b]Marked dot[/b][/*]\n<br />[/list]\n<br />Supported class icon mappings in the HUD:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammates_classes.png[/img]\n<br />From left to right: [b]Veteran[/b], [b]Zealot[/b], [b]Psyker[/b], [b]Ogryn[/b], [b]Arbitrator[/b], [b]Hive Scum[/b].\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Player Tags[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_enemy_marked.png[/img] [b]Enemy[/b] - Radar support for enemy callout tags. Uses the dedicated [b]Player tag display style[/b] setting and can optionally show distance text.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_go_there_marked.png[/img] [b]Go There[/b] - Radar support for movement and positioning callouts placed by players.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_look_there_marked.png[/img] [b]Look There[/b] - Radar support for attention and look-here callouts placed by players.\n<br />\n<br />Display style example for player tags:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_enemy.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_enemy_marked.png[/img]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_go_there.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_go_there_marked.png[/img]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_look_there.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_tag_look_there_marked.png[/img]\n<br />\n<br />Player tags intentionally stay flatter and cleaner than supported item markers. They do not use the item-style elevation arrow presentation.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Common Pickups[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown_alternative.png[/img] [b]Crates[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b]. Artwork keeps the pickup art, icon mode uses a simplified loot icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_small.png[/img] [b]Ammo Tin[/b] - Small ammo pickup, recolored with an ammo-specific yellow.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_big.png[/img] [b]Ammo Stash[/b] - Large ammo pickup, recolored with an ammo-specific yellow.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_grenade.png[/img] [b]Grenade[/b] - Uses a warm grenade-specific amber tint.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_ammo_crate.png[/img] [b]Ammo Crate[/b] - Pocketable ammo crate, recolored to match the ammo family.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_medical_crate.png[/img] [b]Medical Crate[/b] - Pocketable medical crate with a medicae green tint.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_ability.png[/img] [b]Concentration Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_corruption.png[/img] [b]Med Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_power.png[/img] [b]Combat Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_speed.png[/img] [b]Celerity Stimm[/b] - Recolored syringe template.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Collectable Materials[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_diamantine.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_diamantine_alternative.png[/img] [b]Diamantine[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b]. Icon mode uses a simplified blue material icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_plasteel.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_plasteel_alternative.png[/img] [b]Plasteel[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b]. Icon mode uses a simplified steel-grey material icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Primary Objective Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_power_cell_teal.png[/img] [b]Power Cell[/b] - Teal luggable objective marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_cryonic_rod.png[/img] [b]Cryonic Rod[/b] - Pale ice-blue luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_moebian_pox_zetaphyte_13_sample.png[/img] [b]Moebian Pox Zetaphyte-13 Sample[/b] - Sickly green luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_vacuum_capsule.png[/img] [b]Vacuum Capsule[/b] - Dark steel-grey luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_special_issue_ammo.png[/img] [b]Special Issue Ammo[/b] - Olive-green luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_prismata_crystal_repository.png[/img] [b]Prismata Crystal Repository[/b] - Bright red luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_mortis_relic.png[/img] [b]Mortis Relic[/b] - Recolored device icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_coordinates_paper.png[/img] [b]Coordinates[/b] - Uses the paper document icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Secondary Objective Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_grimoire.png[/img] [b]Grimoire[/b] - Secondary objective pocketable.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_scripture.png[/img] [b]Scripture[/b] - Secondary objective pocketable.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Expedition POIs[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_xi_2_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_n_4_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_m_1_4x.png[/img] [b]Sites of Interest[/b] - Unmarked expedition opportunity markers, using scanner-map glyphs with location numbering. Default display mode: [b]Icon + Distance m[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_yellow_n_4_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_purple_xi_2_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_blue_m_1_4x.png[/img] [b]Sites of Interest, player-marked[/b] - Player-marked expedition opportunity markers, using the same glyph and number combinations with the expedition marked colors. Uses the same Sites of Interest display mode.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_transition.png[/img] [b]Deadsider Sanctuaries[/b] - Transition marker for sanctuary travel and section movement. Default display mode: [b]Icon only[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_loot_converter.png[/img] [b]Data Reliquary Harvesters[/b] - Uses the expedition harvester icon and is only shown while inside the sanctuary where the converter is relevant. Default display mode: [b]Icon only[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_main_objective.png[/img] [b]Main Objective[/b] - Main expedition objective location marker. Default display mode: [b]Icon only[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_extraction.png[/img] [b]Valkyrie Extraction Zone[/b] - Extraction location marker. Default display mode: [b]Icon only[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_arrival.png[/img] [b]Valkyrie Arrival Zone[/b] - Arrival location marker. Default display mode: [b]Icon only[/b].\n<br />\n<br />These markers are driven by expedition navigation data rather than standard pickup scanning. [b]Sites of Interest[/b] can appear as unmarked opportunity markers or player-marked variants, while the remaining expedition POIs use dedicated objective-style icons. Each POI category supports [b]Icon only[/b], [b]Icon + Distance m[/b], and [b]Off[/b]. They can optionally ignore the normal radar range limit, are filtered to the currently active expedition section, and clear outdated location markers when the active section or Deadsider Sanctuary state changes.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Expeditions-Specific Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_currency.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_currency_alternative.png[/img] [b]Salvage[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b]. Artwork uses the salvage item art, icon mode uses a simplified salvage icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_alternative.png[/img] [b]Tech-Remnants[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_player_drop.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_player_drop_alternative.png[/img] [b]Dropped Tech-Remnants[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b]. Icon mode uses a red-tinted simplified icon to help distinguish dropped loot.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_data_reliquary.png[/img] [b]Data Reliquaries[/b] - Gold luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_explosive.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_explosive_alternative.png[/img] [b]Servo-Triggered Mine[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_fire.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_fire_alternative.png[/img] [b]Purgation Snare[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_shock.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_shock_alternative.png[/img] [b]Voltaic Snare[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_void_shield.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_void_shield_alternative.png[/img] [b]Void Shell[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_airstrike.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_airstrike_alternative.png[/img] [b]Bombing Run Signal Marker[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_artillery_strike.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_artillery_strike_alternative.png[/img] [b]Artillery Locator Beacon[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_big_grenade.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_big_grenade_alternative.png[/img] [b]Modified Grenade[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_valkyrie_hover.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_valkyrie_hover_alternative.png[/img] [b]Fire-Support Signal Marker[/b] - Supports [b]Artwork[/b], [b]Icon[/b], and [b]Off[/b].\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_promethium_barrel.png[/img] [b]Promethium Barrel[/b] - Orange explosive barrel marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_large_ammunition_crate.png[/img] [b]Large Ammunition Crate[/b] - Large ammo container, recolored to match the ammo family.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_anti_rad_stimm.png[/img] [b]Anti-Rad Stimms[/b] - Uses the expedition time syringe icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Martyr's Skull Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_martyr_skull.png[/img] [b]Martyr's Skull[/b] - Gold skull marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_power_cell_orange.png[/img] [b]Power Cell[/b] - Orange luggable marker used for the Martyr's Skull group.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Environment Markers[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/medicae_station.png[/img] [b]Medicae Station[/b] - Green medical interaction marker used for medicae stations and equivalent health-station interactions.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_socket.png[/img] [b]Power Socket[/b] - Yellow power socket marker for luggable socket targets.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/heretic_idol.png[/img] [b]Heretic Idol[/b] - Sickly green idol marker shown while the idol is still active. Active idols now appear reliably on the radar.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Deployed Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_cache_deployable.png[/img] [b]Ammo Crate[/b] - Ammo-yellow deployable ammo crate marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_medkit.png[/img] [b]Medical Crate[/b] - Green deployable medical crate marker.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Event-Related Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_tainted_skull.png[/img] [b]Tainted Skulls[/b] - Green skull marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/dark_rites_totem.png[/img] [b]Dark Rites Totems[/b] - Green heretics icon marker for destroyable Dark Rites ritual totems.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/dark_rites_servo_skull.png[/img] [b]Dark Rites Servo Skulls[/b] - Green ability icon marker for spawned Dark Rites servo skull objective interactables.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_corrupted_auspex_scanner.png[/img] [b]Tainted Communications Device[/b] - Orange auspex scanner marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_saints.png[/img] [b]Holy Relics[/b] - Gold relic marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_stolen_rations.png[/img] [b]Stolen Rations[/b] - Green crate marker.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Debug Marker[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_unknown.png[/img] [b]Unknown pickups[/b] - Optional fallback marker used when debug discovery is enabled.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Display Modes and Color Rules[/b][/size]\n<br />\n<br />The preview icons follow the HUD presentations used by the mod. Most fixed Radar UI and marker colors can now be changed from the options menu with [b]Opacity[/b], [b]Red[/b], [b]Green[/b], and [b]Blue[/b] sliders.\n<br />\n<br />[b]Configurable color groups[/b]\n<br />[list]\n<br />[*][b]Radar Colors[/b] - Radar background, outline, guides, Auspex scanner layers, marker text, vertical arrows, and overview legend indicators.[/*]\n<br />[*][b]Marker icon colors[/b] - Icon-mode colors for supported pickup, objective, expedition, event, enemy, and debug marker groups.[/*]\n<br />[*][b]Marker background colors[/b] - Marked enemy and boss background or bracket colors.[/*]\n<br />[*][b]Nearby highlight colors[/b] - Per-marker colors for supported nearby screen-space highlights.[/*]\n<br />[/list]\n<br />Plain DMF shows these as normal numeric sliders. With [url=https://www.nexusmods.com/warhammer40kdarktide/mods/864][b]Alf's Mod Settings Extensions[/b][/url], compatible color groups can appear as compact color picker widgets.\n<br />\n<br />[b]Artwork mode[/b]\n<br />[list]\n<br />[*]Artwork mode keeps the original item artwork for supported markers.[/*]\n<br />[*]This is the default mode for all markers that support the display dropdowns.[/*]\n<br />[*]Crates, Diamantine, Plasteel, Salvage, Tech-Remnants, Dropped Tech-Remnants, and supported expeditions pocketables all keep their original item art in this mode.[/*]\n<br />[/list]\n<br />[b]Icon mode[/b]\n<br />[list]\n<br />[*]Icon mode swaps supported markers to simplified HUD icons with configurable colors for easier reading at a glance.[/*]\n<br />[*]Crates use a simplified loot icon.[/*]\n<br />[*]Diamantine and Plasteel use simplified material icons.[/*]\n<br />[*]Salvage, Tech-Remnants, and Dropped Tech-Remnants use simplified expeditions icons.[/*]\n<br />[*]Supported expeditions pocketables such as mines, strike markers, Modified Grenade, and Void Shell also have icon-mode versions.[/*]\n<br />[/list]\n<br />[b]Expedition POI modes[/b]\n<br />[list]\n<br />[*][b]Icon only[/b] keeps the marker compact and matches the previous enabled behavior after migration.[/*]\n<br />[*][b]Icon + Distance m[/b] adds meter text to the POI marker, similar to the boss distance presentation.[/*]\n<br />[*][b]Off[/b] keeps the category hidden and matches the previous disabled behavior after migration.[/*]\n<br />[/list]\n<br />[b]Default recolors for regular markers[/b]\n<br />[list]\n<br />[*][b]Ammo Tin[/b], [b]Ammo Stash[/b], [b]Large Ammunition Crate[/b], and [b]Deployable Ammo Crate[/b] default to an ammo-family yellow.[/*]\n<br />[*][b]Grenade[/b] and [b]Modified Grenade[/b] default to a warm amber tone.[/*]\n<br />[*][b]Pocketable Medical Crate[/b] and [b]Medicae Station[/b] default to a medicae green.[/*]\n<br />[*][b]Power Socket[/b] defaults to a bright yellow power-interaction tint.[/*]\n<br />[*][b]Heretic Idol[/b] defaults to a sickly green tone that fits the world object better than plain white.[/*]\n<br />[*][b]Dark Rites Totems[/b] use the heretics category icon and default to the same green event color as Tainted Skulls.[/*]\n<br />[*][b]Dark Rites Servo Skulls[/b] use the default ability icon and default to the same green event color as Tainted Skulls.[/*]\n<br />[*]Mission luggables, stimms, relics, barrels, and event markers also default to dedicated family colors so they are easier to tell apart.[/*]\n<br />[/list]\n<br />[b]Runtime-dynamic colors[/b]\n<br />[list]\n<br />[*][b]Teammates[/b] use the class icon for the detected archetype and take their color from the active HUD slot color at runtime.[/*]\n<br />[*][b]The radar center dot[/b] also uses the local player's HUD color.[/*]\n<br />[*][b]Player smart tags[/b] follow their tag presentation: attention and location tags use player-slot colors, while enemy/threat tags keep their warning color.[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Requirements[/b][/size]\n<br />\n<br />[list]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/8]Darktide Mod Framework[/url][/b][/*]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/19]Darktide Mod Loader[/url][/b][/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Notes[/b][/size]\n<br />\n<br />[list]\n<br />[*]The radar is intended for active gameplay and suppresses itself outside valid runtime states such as hub and menu contexts.[/*]\n<br />[*]The radar now remains visible while the comms wheel is open, which makes live callouts and tag placement easier to track.[/*]\n<br />[*]The DMF options view remembers the last scroll position inside the [b]Radar[/b] category while the options view remains open. Credit to [b][url=https://www.nexusmods.com/warhammer40kdarktide/users/5378401]Alfthebigheaded[/url][/b] for the scroll position persistence implementation.[/*]\n<br />[*][b]Centered overview mode[/b] is intended as a temporary awareness view. It has separate zoom, scale-legend, and marker-cap controls and automatically exits when the radar runtime state is no longer valid.[/*]\n<br />[*]Normal radar range supports [b]10 m[/b] to [b]200 m[/b], and the zoom keybinds can temporarily control that range while the radar zoom modifier is held.[/*]\n<br />[*][b]Auspex[/b] is a full radar style with an optional animated sweep, and the included documentation GIFs show the solid, dotted, off, and no-sweep variants. Square and Circle radar can also use the Auspex-style background as a guide option.[/*]\n<br />[*]Teammates, teammate marker range, the local player center dot, and player smart tags have separate controls, so ally information can be tuned more precisely.[/*]\n<br />[*]Player smart tags support optional distance text, but no longer use player-tag elevation arrows or related elevation hiding behavior. Enemy markers can use vertical arrows separately through their own category options.[/*]\n<br />[*]Supported ability-marked and smart-tag outlined enemies can optionally be treated as radar-visible targets, and shared [b]special_target[/b] outline handling is gated to the local owning context so unrelated outlines do not leak into radar visibility. Enemy vertical arrow toggles only affect arrow display, not whether those enemies are eligible for radar visibility.[/*]\n<br />[*]Nearby highlights now support thickness, per-marker ARGB colors, and optional distance labels, and their placement was adjusted to stay aligned more reliably under scaled HUD layouts.[/*]\n<br />[*][b]Tagged enemies only[/b] and [b]Tagged items only[/b] are filters, not new marker families. They reuse the game's active tag state and let tagged targets ignore the normal radar range limit while tagged.[/*]\n<br />[*][b]Dark Rites[/b] event markers have separate toggles for tainted skulls, destroyable ritual totems, and spawned servo skull objective interactables. The Dark Rites totem and servo skull markers are guarded by live-event detection and use elevated marker priority for better visibility in combat.[/*]\n<br />[*]Expedition POIs and section-scoped expedition items are filtered to the active expedition section. Sanctuary-state transitions trigger cleanup so stale safe-zone markers do not leak into open zones, while active player-dropped Tech-Remnants can still be shown.[/*]\n<br />[*]Expedition POI settings now use display-mode dropdowns. Old enabled values migrate to [b]Icon only[/b], old disabled values migrate to [b]Off[/b], and the new [b]Icon + Distance m[/b] mode can be enabled per POI category.[/*]\n<br />[*]Marker previews in this description were generated from the included template assets and documentation images so the legend matches the mod's configured presentations as closely as possible.[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Contributions Welcome[/b][/size]\n<br />\n<br />Want to help improve [i]Radar[/i]? Contributions are very welcome via PRs on [url=https://github.com/LucLeto/darktide-mods-radar]GitHub[/url].\n<br />\n<br />Bug fixes, feature improvements, cleanup, and general polish are all appreciated.\n<br />"
