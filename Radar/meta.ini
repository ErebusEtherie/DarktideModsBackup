nexusDescription="[center][size=6][b]Radar[/b][/size][/center]\n<br />Radar adds a compact, camera-oriented HUD radar for [b]Warhammer 40,000: Darktide[/b]. It is built to surface the targets that matter most during live missions, nearby pickups, objective items, deployed support tools, teammates, and high-priority enemies, while keeping the presentation configurable from the mod options menu.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Feature Overview[/b][/size]\n<br />\n<br />[list]\n<br />[*]Tracks nearby pickups, materials, mission items, event items, teammates, and priority enemies on a single radar.\n<br />[*]Projects markers relative to your current facing, so the radar rotates with your view instead of acting like a fixed minimap.\n<br />[*]Supports [b]square[/b] and [b]circle[/b] radar frames, plus configurable [b]outline[/b] and [b]guide[/b] styles for both shapes.\n<br />[*]Lets you adjust [b]radar size[/b], [b]scan range[/b], and [b]maximum marker count[/b].\n<br />[*]Supports optional [b]icon scaling with radar size[/b].\n<br />[*]Adds dropdown-based display modes for supported markers: [b]Artwork[/b], [b]Icon[/b], or [b]Off[/b].\n<br />[*]Recolors remaining white pickup icons with clearer semantic colors and adds dedicated environment markers for [b]Medicae Station[/b], [b]Power Socket[/b], and [b]Heretic Idol[/b].\n<br />[*]Supports separate marker styles for [b]enemies[/b] and [b]teammates[/b]: [b]Icon only[/b] or [b]Marked icon[/b].\n<br />[*]Includes a [b]toggle radar on or off[/b] keybind, so you can hide or restore the radar during a mission without opening the options menu.\n<br />[*]Supports configurable [b]radar positioning[/b] with [b]Radar position X[/b], [b]Radar position Y[/b], [b]Steps per input[/b], and dedicated movement keybinds for nudging the radar [b]left[/b], [b]right[/b], [b]up[/b], or [b]down[/b].\n<br />[*]Adds dedicated [b]Expedition POI[/b] support for numbered [b]Sites of Interest[/b] opportunity markers, plus dedicated icons for [b]Deadsider Sanctuaries[/b], [b]Data Reliquary Harvesters[/b], [b]Main Objective[/b], [b]Valkyrie Extraction Zone[/b], and [b]Valkyrie Arrival Zone[/b], with an option to ignore the normal range limit for these markers.\n<br />[*]Keeps the radar position clamped to the visible UI space, so moving or resizing it does not push it off-screen.\n<br />[*]Colors the radar center dot from the local player HUD slot color.\n<br />[*]Uses class icons for teammate markers instead of generic dots.\n<br />[*]Exposes category-based toggles for common pickups, materials, objectives, expeditions items, [b]Expedition POIs[/b], deployed items, enemies, teammates, and event items.\n<br />[*]Includes optional [b]debug logs[/b] and an [b]unknown pickups[/b] toggle for discovery and troubleshooting.\n<br />[*]Includes a groundwork [b]highlighting[/b] option, but the actual highlighting behavior is currently still under development.\n<br />[/list]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]In-Game Radar Examples[/b][/size]\n<br />\n<br />The screenshots below show both radar styles during an expedition mission. They illustrate the camera-oriented layout, mixed pickup categories, teammate markers, and priority targets in live gameplay.\n<br />\n<br />[size=4][b]Circle Radar[/b][/size]\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_1.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_2.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/circle_radar_3.png[/img][/center]\n<br />\n<br />[size=4][b]Square Radar[/b][/size]\n<br />[center][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_1.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_2.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/square_radar_3.png[/img][/center]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Display and Behavior[/b][/size]\n<br />\n<br />Both radar shapes support the same outline and guide options, and the frame rendering is tuned so crosshairs fit the active frame, view guides reach the border cleanly, circle range rings stay thin and solid, circle outlines remain visually continuous, and square dotted outlines render as proper dots.\n<br />\n<br />[size=4][b]Square radar variants[/b][/size]\n<br />\n<br />[b]Crosshair[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_square_solid_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_square_off_crosshair.png[/img][/center]\n<br />\n<br />[b]View Guides[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_solid_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_off_view_guides.png[/img][/center]\n<br />\n<br />[b]Rings[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_square_solid_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_square_off_rings.png[/img][/center]\n<br />\n<br />[b]Off[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_square_solid_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_square_dotted_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_square_off_off.png[/img][/center]\n<br />\n<br />[size=4][b]Circle radar variants[/b][/size]\n<br />\n<br />[b]Crosshair[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_circle_solid_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_crosshair.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_1_circle_off_crosshair.png[/img][/center]\n<br />\n<br />[b]View Guides[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_solid_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_view_guides.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_off_view_guides.png[/img][/center]\n<br />\n<br />[b]Rings[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_circle_solid_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_rings.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_3_circle_off_rings.png[/img][/center]\n<br />\n<br />[b]Off[/b]\n<br />[center][b]Solid   |   Dotted   |   Off [/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_circle_solid_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_2_circle_dotted_off.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/radar_4_circle_off_off.png[/img][/center]\n<br />\n<br />[size=4][b]Marker display mode examples[/b][/size]\n<br />\n<br />Supported markers can now be shown as [b]Artwork[/b], [b]Icon[/b], or [b]Off[/b].\n<br />[center][b]Artwork   |   Icon   |   Off[/b]\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown_alternative.png[/img][b]Hidden[/b][/center]\n<br />\n<br />[b]Radar Controls[/b]\n<br />[list]\n<br />[*][b]Enable radar[/b] - Master on or off switch for the HUD element.\n<br />[*][b]Toggle radar on or off[/b] - Assign a key to switch the radar HUD visibility during gameplay without opening the options menu.\n<br />[*][b]Radar size[/b] - Adjustable from [b]100[/b] to [b]350[/b].\n<br />[*][b]Radar range / filter distance[/b] - Adjustable from [b]25 m[/b] to [b]100 m[/b].\n<br />[*][b]Max radar markers[/b] - Adjustable from [b]10[/b] to [b]100[/b].\n<br />[*][b]Scale icons with radar size[/b] - Keeps marker size fixed or scales it with the radar.\n<br />[*][b]Pickup and environment marker modes[/b] - Supported markers can be shown as [b]Artwork[/b], [b]Icon[/b], or [b]Off[/b].\n<br />[*][b]Radar style[/b] - [b]Square[/b] or [b]Circle[/b].\n<br />[*][b]Radar outline[/b] - [b]Solid[/b], [b]Dotted[/b], or [b]Off[/b].\n<br />[*][b]Radar guides[/b] - [b]Crosshair[/b], [b]View guides[/b], [b]Range rings[/b], or [b]Off[/b].\n<br />[*][b]Enemy marker style[/b] - [b]Icon only[/b] or [b]Marked icon[/b].\n<br />[*][b]Player marker style[/b] - [b]Icon only[/b] or [b]Marked icon[/b].\n<br />[*][b]Radar position X[/b] - Sets the radar's horizontal position. The value is clamped to the visible UI space.\n<br />[*][b]Radar position Y[/b] - Sets the radar's vertical position. The value is clamped to the visible UI space.\n<br />[*][b]Steps per input[/b] - Sets how far each radar movement key press nudges the radar.\n<br />[*][b]Move radar left[/b] - Assign a key to move the radar left by the configured step size.\n<br />[*][b]Move radar right[/b] - Assign a key to move the radar right by the configured step size.\n<br />[*][b]Move radar up[/b] - Assign a key to move the radar up by the configured step size.\n<br />[*][b]Move radar down[/b] - Assign a key to move the radar down by the configured step size.\n<br />[*][b]Highlight distance[/b] - Present in the options menu, but the highlighting feature is currently still under development.\n<br />[/list]\n<br />\n<br />[b]Expedition POI Controls[/b]\n<br />[list]\n<br />[*][b]Expeditions POI[/b] - Group of toggles for expedition location markers.\n<br />[*][b]Ignore range limit for POI[/b] - Lets expedition POI markers bypass the normal radar range filter.\n<br />[*][b]Sites of Interest[/b] - Shows registered expedition opportunity locations, including numbered scanner-map opportunity markers.\n<br />[*][b]Deadsider Sanctuaries[/b] - Shows expedition transition or sanctuary locations with the dedicated transition icon.\n<br />[*][b]Data Reliquary Harvesters[/b] - Shows expedition loot converters with the dedicated harvester icon while inside the sanctuary where they are usable.\n<br />[*][b]Main Objective[/b] - Shows expedition main objective locations with the dedicated objective icon.\n<br />[*][b]Valkyrie Extraction Zone[/b] - Shows extraction points with the dedicated extraction icon.\n<br />[*][b]Valkyrie Arrival Zone[/b] - Shows arrival points with the dedicated arrival icon.\n<br />[/list]\n<br />\n<br />[b]Positioning and Toggle Use[/b]\n<br />[list]\n<br />[*]Use [b]Toggle radar on or off[/b] to quickly hide or restore the radar while staying in the mission.\n<br />[*]Use [b]Radar position X[/b] and [b]Radar position Y[/b] when you want to place the radar precisely in a fixed HUD location.\n<br />[*]Use [b]Move radar left[/b], [b]right[/b], [b]up[/b], and [b]down[/b] when you want to fine-tune the placement in live gameplay with key presses.\n<br />[*][b]Steps per input[/b] controls how large each movement increment is, which makes it easier to do either quick repositioning or small adjustments.\n<br />[*]Radar placement is automatically clamped against the current UI space, so the widget stays within the visible screen area even after changing size or resolution scale.\n<br />[/list]\n<br />\n<br />[b]Marker Rules[/b]\n<br />[list]\n<br />[*][b]Enemies[/b] use dedicated danger icons and, in marked mode, red bracket accents.\n<br />[*][b]Teammates[/b] use archetype icons and their runtime HUD slot color.\n<br />[*][b]The center dot[/b] uses the local player HUD color instead of a fixed green.\n<br />[*][b]Objective and event items[/b] reuse a small number of template icons, recolored through ARGB values where needed.\n<br />[*][b]Expedition POIs[/b] use numbered scanner-map glyphs for opportunity markers, can also reflect player-marked states in expedition colors, use dedicated icons for transition, harvester, main objective, extraction, and arrival locations, can optionally ignore the normal radar range limit, and are filtered to the active expedition section so outdated location markers do not linger after section changes.\n<br />[/list]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Target Markers[/b][/size]\n<br />\n<br />The legend below follows the option groups exposed by [b]Radar_data.lua[/b]. The preview tiles were generated from the included [b]doc/img[/b] templates and the ARGB values used by the HUD presentations.\n<br />\n<br />[size=4][b]High-Priority Enemies[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_daemonhost.png[/img] [b]Daemonhost[/b] - Separate presentation under the [b]Monstrosities[/b] toggle.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_monstrosity.png[/img] [b]Monstrosities[/b] - Covers the generic monstrosity presentation used for Beast of Nurgle, Plague Ogryn, Chaos Spawn, and Ogryn Houndmaster.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_captain.png[/img] [b]Captains[/b] - Red danger marker with bracket accent in marked mode.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_karnak_twin.png[/img] [b]Karnak Twins[/b] - Dedicated presentation for the twins.\n<br />\n<br />Display style example for enemy markers:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_icon_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/enemy_monstrosity.png[/img]\n<br />Left: [b]Icon only[/b]. Right: [b]Marked icon[/b].\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Teammates[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_sample.png[/img] [b]Teammates[/b] - Uses class icons, colored by teammate slot at runtime. Can be shown as [b]Icon only[/b], [b]Marked icon[/b], [b]Dot only[/b], or [b]Marked dot[/b].\n<br />\n<br />Display style example for teammate markers:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_icon_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_dot_only_sample.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammate_marked_dot_sample.png.png[/img]\n<br />From left to right:\n<br />[list]\n<br />[*][b]Icon only[/b]\n<br />[*][b]Marked icon[/b]\n<br />[*][b]Dot only[/b]\n<br />[*][b]Marked dot[/b]\n<br />[/list]\n<br />\n<br />Supported class icon mappings in the HUD:\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/player_teammates_classes.png[/img]\n<br />From left to right: [b]Veteran[/b], [b]Zealot[/b], [b]Psyker[/b], [b]Ogryn[/b], [b]Arbitrator[/b], [b]Hive Scum[/b].\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Common Pickups[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/crate_unknown_alternative.png[/img] [b]Crates[/b] - Generic chest or crate pickup marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_small.png[/img] [b]Ammo Tin[/b] - Small ammo pickup.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_big.png[/img] [b]Ammo Stash[/b] - Large ammo pickup.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_grenade.png[/img] [b]Grenade[/b] - Uses the supplied grenade icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_ammo_crate.png[/img] [b]Ammo Crate[/b] - Pocketable ammo crate.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_medical_crate.png[/img] [b]Medical Crate[/b] - Pocketable medical crate.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_ability.png[/img] [b]Concentration Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_corruption.png[/img] [b]Med Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_power.png[/img] [b]Combat Stimm[/b] - Recolored syringe template.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_syringe_speed.png[/img] [b]Celerity Stimm[/b] - Recolored syringe template.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Collectable Materials[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_diamantine.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_diamantine_alternative.png[/img] [b]Diamantine[/b] - Uses the supplied item artwork unchanged or a blue colored icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_plasteel.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_plasteel_alternative.png[/img] [b]Plasteel[/b] - Uses the supplied item artwork unchanged or a grey colored icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Primary Objective Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_power_cell_teal.png[/img] [b]Power Cell[/b] - Teal luggable objective marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_cryonic_rod.png[/img] [b]Cryonic Rod[/b] - Pale ice-blue luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_moebian_pox_zetaphyte_13_sample.png[/img] [b]Moebian Pox Zetaphyte-13 Sample[/b] - Sickly green luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_vacuum_capsule.png[/img] [b]Vacuum Capsule[/b] - Dark steel-grey luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_special_issue_ammo.png[/img] [b]Special Issue Ammo[/b] - Olive-green luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_prismata_crystal_repository.png[/img] [b]Prismata Crystal Repository[/b] - Bright red luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_mortis_relic.png[/img] [b]Mortis Relic[/b] - Recolored device icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_coordinates_paper.png[/img] [b]Coordinates[/b] - Uses the paper document icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Secondary Objective Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_grimoire.png[/img] [b]Grimoire[/b] - Secondary objective pocketable.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_scripture.png[/img] [b]Scripture[/b] - Secondary objective pocketable.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Expedition POIs[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_xi_2_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_n_4_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_unmarked_m_1_4x.png[/img] [b]Sites of Interest[/b] - Unmarked expedition opportunity markers, using scanner-map glyphs with location numbering.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_yellow_n_4_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_purple_xi_2_4x.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_marked_blue_m_1_4x.png[/img] [b]Sites of Interest, player-marked[/b] - Player-marked expedition opportunity markers, using the same glyph and number combinations with the expedition marked colors.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_transition.png[/img] [b]Deadsider Sanctuaries[/b] - Transition marker for sanctuary travel and section movement.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_loot_converter.png[/img] [b]Data Reliquary Harvesters[/b] - Uses the expedition harvester icon and is only shown while inside the sanctuary where the converter is relevant.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_main_objective.png[/img] [b]Main Objective[/b] - Main expedition objective location marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_extraction.png[/img] [b]Valkyrie Extraction Zone[/b] - Extraction location marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/expedition_objective_arrival.png[/img] [b]Valkyrie Arrival Zone[/b] - Arrival location marker.\n<br />\n<br />These markers are driven by expedition navigation data rather than standard pickup scanning. [b]Sites of Interest[/b] can appear as unmarked opportunity markers or player-marked variants, while the remaining expedition POIs use dedicated objective-style icons. They can optionally ignore the normal radar range limit, are filtered to the currently active expedition section, and clear outdated location markers when the active section changes.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Expeditions-Specific Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_currency.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_currency_alternative.png[/img] [b]Salvage[/b] - Uses the supplied item artwork unchanged or a copper green colored icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_alternative.png[/img] [b]Tech-Remnants[/b] - Uses the supplied item artwork unchanged or a antique gold colored icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_player_drop.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/material_expeditions_loot_player_drop_alternative.png[/img] [b]Dropped Tech-Remnants[/b] - Uses the supplied item artwork unchanged or a red colored icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_data_reliquary.png[/img] [b]Data Reliquaries[/b] - Gold luggable marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_explosive.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_explosive_alternative.png[/img] [b]Servo-Triggered Mine[/b] - Explosive landmine.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_fire.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_fire_alternative.png[/img] [b]Purgation Snare[/b] - Fire landmine.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_shock.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_landmine_shock_alternative.png[/img] [b]Voltaic Snare[/b] - Shock landmine.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_void_shield.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_void_shield_alternative.png[/img] [b]Void Shell[/b] - Uses the supplied item artwork unchanged or a sand colored icon.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_airstrike.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_airstrike_alternative.png[/img] [b]Bombing Run Signal Marker[/b] - Airstrike support marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_artillery_strike.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_artillery_strike_alternative.png[/img] [b]Artillery Locator Beacon[/b] - Artillery support marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_big_grenade.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_big_grenade_alternative.png[/img] [b]Modified Grenade[/b] - Special expeditions grenade pickup.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_valkyrie_hover.png[/img][img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_valkyrie_hover_alternative.png[/img] [b]Fire-Support Signal Marker[/b] - Valkyrie hover signal marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_promethium_barrel.png[/img] [b]Promethium Barrel[/b] - Orange explosive barrel marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_large_ammunition_crate.png[/img] [b]Large Ammunition Crate[/b] - White ammo container marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_anti_rad_stimm.png[/img] [b]Anti-Rad Stimms[/b] - Uses the expedition time syringe icon.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Martyr's Skull Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_martyr_skull.png[/img] [b]Martyr's Skull[/b] - Gold skull marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_power_cell_orange.png[/img] [b]Power Cell[/b] - Orange luggable marker used for the Martyr's Skull group.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Deployed Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_ammo_cache_deployable.png[/img] [b]Ammo Crate[/b] - Pale green deployable ammo crate marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_medkit.png[/img] [b]Medical Crate[/b] - Green deployable medical crate marker.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Environment Markers[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/medicae_station.png[/img] [b]Medicae Station[/b] - Green station marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/luggable_socket.png[/img] [b]Power Socket[/b] - Yellow socket marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/heretic_idol.png[/img] [b]Heretic Idol[/b] - Dedicated idol marker.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Event-Related Items[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_tainted_skull.png[/img] [b]Tainted Skulls[/b] - Green skull marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pocketable_corrupted_auspex_scanner.png[/img] [b]Tainted Communications Device[/b] - Orange auspex scanner marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_saints.png[/img] [b]Holy Relics[/b] - Gold relic marker.\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_stolen_rations.png[/img] [b]Stolen Rations[/b] - Green crate marker.\n<br />\n<br />[line]\n<br />\n<br />[size=4][b]Debug Marker[/b][/size]\n<br />\n<br />[img]https://raw.githubusercontent.com/LucLeto/darktide-mods-radar/main/doc/img/pickup_unknown.png[/img] [b]Unknown pickups[/b] - Optional fallback marker used when debug discovery is enabled.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Icons and Color Rules[/b][/size]\n<br />\n<br />The preview icons follow the HUD presentations used by the mod.\n<br />\n<br />Several pickup and environment markers that previously stayed plain white now use clearer semantic colors for easier at-a-glance reading.\n<br />\n<br />[b]Icons Left Unchanged[/b]\n<br />[list]\n<br />[*][b]diamantine_big.png[/b]\n<br />[*][b]empty.png[/b]\n<br />[*][b]engram_rarity_04.png[/b]\n<br />[*][b]plasteel_big.png[/b]\n<br />[*][b]salvage_big.png[/b]\n<br />[*][b]tech_dropped.png[/b]\n<br />[*][b]tech_remnant_big.png[/b]\n<br />[*][b]void_shield.png[/b]\n<br />[/list]\n<br />\n<br />[b]Recolored Template Families[/b]\n<br />[list]\n<br />[*][b]lugged.png[/b] - Data Reliquary, Power Cell, Cryonic Rod, Moebian Pox Zetaphyte-13 Sample, Vacuum Capsule, Special Issue Ammo, Prismata Crystal Repository. ARGB: [b](255, 192, 160, 0)[/b], [b](255, 0, 200, 200)[/b], [b](255, 180, 220, 255)[/b], [b](255, 150, 190, 60)[/b], [b](255, 80, 85, 90)[/b], [b](255, 95, 125, 70)[/b], [b](255, 255, 70, 90)[/b]\n<br />[*][b]party_syringe.png[/b] - Concentration, Med, Combat, Celerity Stimms. ARGB: [b](255, 230, 192, 13)[/b], [b](255, 38, 205, 26)[/b], [b](255, 205, 51, 26)[/b], [b](255, 0, 127, 218)[/b]\n<br />[*][b]enemy.png[/b] - Martyr's Skull, Tainted Skulls. ARGB: [b](255, 255, 215, 0)[/b], [b](255, 150, 190, 60)[/b]\n<br />[*][b]pocketable_ammo.png[/b] - Deployable Ammo Crate, Large Ammunition Crate. ARGB: [b](255, 215, 237, 188)[/b], unchanged white\n<br />[*][b]devices.png[/b] - Mortis Relic. ARGB: [b](255, 110, 95, 125)[/b]\n<br />[*][b]barrel_explosive.png[/b] - Promethium Barrel. ARGB: [b](255, 255, 110, 0)[/b]\n<br />[*][b]auspex_scanner.png[/b] - Tainted Communications Device. ARGB: [b](255, 255, 120, 0)[/b]\n<br />[*][b]live_event_01.png[/b] - Holy Relics. ARGB: [b](255, 192, 160, 0)[/b]\n<br />[*][b]Enemy accent brackets[/b] - Daemonhost, Monstrosity, Captain, Karnak Twins. ARGB: [b](220, 255, 0, 0)[/b]\n<br />[/list]\n<br />\n<br />[b]Runtime-Dynamic Colors[/b]\n<br />[list]\n<br />[*][b]Teammates[/b] use the class icon for the detected archetype and take their color from the active HUD slot color at runtime.\n<br />[*][b]The radar center dot[/b] also uses the local player's HUD color.\n<br />[/list]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Requirements[/b][/size]\n<br />\n<br />[list]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/8]Darktide Mod Framework[/url][/b]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/19]Darktide Mod Loader[/url][/b]\n<br />[/list]\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Notes[/b][/size]\n<br />\n<br />[list]\n<br />[*]The radar is intended for active gameplay and suppresses itself outside valid runtime states such as hub and menu contexts.\n<br />[*]Expedition POIs are filtered to the active expedition section, and [b]Data Reliquary Harvesters[/b] are only shown inside the relevant [b]Deadsider Sanctuary[/b] where they can actually be used.\n<br />[*]The highlighting option is visible in the configuration, but the actual highlighting behavior is still work in progress.\n<br />[*]Marker previews in this documentation were generated from the included template assets so the legend matches the mod's configured presentations as closely as possible.\n<br />[*]The gameplay screenshots in this documentation were captured during an expedition mission and show both radar frame styles in live use.\n<br />[/list]\n<br />\n<br />[size=5][b]Contributions Welcome[/b][/size]\n<br />\n<br />Want to help improve [i]Radar[/i]? Contributions are very welcome via PRs on [url=https://github.com/LucLeto/darktide-mods-radar]GitHub[/url].\n<br />\n<br />Bug fixes, feature improvements, cleanup, and general polish are all appreciated."
