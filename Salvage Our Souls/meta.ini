nexusDescription="[size=4][b]Description[/b][/size]\n<br />[color=#D4D4D8]\n<br />[b]Visual effects: [/b]Adds selectable visual effects to Expeditions' Salvage and Tech Remnants. Luggable Data Reliquaries have their own on/off option using an electricity effect which turns off while carried.\n<br />\n<br />[b]Exit markers: [/b]Also adds optional Exit markers to help locate sanctuary gates and extraction points during Expedition zones. Marker will always appear if you're carrying a data reliquary. Optionally, have a warning appear on screen if someone triggers the evacuation before the final zone.\n<br />\n<br />[b]Expeditions: [/b]The mod only runs in Expeditions (not normal missions or Mortis Trials) and clears effects in sanctuaries to reduce unnecessary load.[/color]\n<br />\n<br />[size=4][b]Main features[/b][/size]\n<br />\n<br />Salvage Our Souls adds optional visual effects to key Expedition resources so they are easier to spot during active Expedition zones.\n<br />\n<br />[b]Applies to items:[/b]\n<br />[list]\n<br />[*]Salvage[/*]\n<br />[*]Tech Remnants[/*]\n<br />[*]Data Reliquaries[/*]\n<br />[/list][b]Choose from effects:[/b]\n<br />[list]\n<br />[*]Decal (green for remnants, blue for salvage)[/*]\n<br />[*]Spreading Fire[/*]\n<br />[*]Fire Plume[/*]\n<br />[*]Staggering Pulse[/*]\n<br />[*]Electricity Grenade[/*]\n<br />[*]Shield[/*]\n<br />[/list][list]\n<br />[*]Note: Data Reliquaries always use their own electricity effect but stop when you're carrying them.[/*]\n<br />[/list][b]Exit marker features:[/b]\n<br />[list]\n<br />[*]Optional exit markers for Expedition extraction points[/*]\n<br />[*]Option to hide markers outside your field of view [/*]\n<br />[*]Option to hide markers until timer gets below 3 minutes[/*]\n<br />[*]Option to hide markers when you're right on top of the exit already[/*]\n<br />[/list][b]Exit marker colours:[/b]\n<br />[list]\n<br />[*][color=#00ff00]Green [/color]- normal[/*]\n<br />[*][color=#ff0000]Red [/color]- 3 mins to go / Evacuation is already underway[/*]\n<br />[*][color=#ff7700]Orange [/color]- Defend the Sanctuary Gates is underway[/*]\n<br />[/list][b]Premature evacuation:[/b]\n<br />[list]\n<br />[*]Option [i][color=#ff0000]Evacuation triggered early[/color][/i] warning if Valkyrie called before final zone.[/*]\n<br />[/list][b]Dropped remnants:[/b]\n<br />[list]\n<br />[*]Option to flash a warning on the screen[/*]\n<br />[*]Option to see a marker and the number of remnants next to dropped remnants[/*]\n<br />[/list][b]Protect your comrades:[/b]\n<br />[list]\n<br />[*]Options to mark comrades who are dead, or downed, or disabled, or your preferred combination of those.[/*]\n<br />[/list]\n<br />[size=4][b]Installation instructions[/b][/size]\n<br />\n<br />[list]\n<br />[*][color=#D4D4D8]Install Darktide Mod Loader and Darktide Mod Framework first.[/color][/*]\n<br />[*][color=#D4D4D8]Extract the salvage folder into your Darktide mods folder.[/color][/*]\n<br />[*][color=#D4D4D8]Add salvage to your mod_load_order.txt.[/color][/*]\n<br />[*][color=#D4D4D8]Launch the game and configure the mod from the Mod Options menu.[/color][/*]\n<br />[/list][/*]\n<br />"
