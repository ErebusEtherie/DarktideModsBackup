nexusDescription="A compact, crosshair-adjacent HUD designed to display only the most relevant combat information — exactly when you need it.\n<br />\n<br />[b]Ring HUD at a glance[/b]\n<br />[list]\n<br />[*]Context-first: most elements appear only when relevant (with an optional [i]Force Show[/i] hotkey to temporarily reveal everything).\n<br />[*]Highly configurable: scale, separation, position (X/Y), ADS behaviour, crosshair-follow, and more.\n<br />[*]Immersive.  Can be configured to a nearly HUDless experience using context or to support a \"cybersight\" aesthetic, for example.\n<br />[/list]\n<br />\n<br />[b]Survival — Toughness / Health / Corruption[/b]\n<br />[list]\n<br />[*]Dynamic arc showing current toughness, health, and corruption.\n<br />[*]Segments visually reflect key states (including gold / broken toughness behaviour).\n<br />[*]Visibility modes include contextual and \"always\" variants, including options that keep numeric readouts visible for players who prefer constant numbers.\n<br />[/list]\n<br />\n<br />[b]Stamina[/b]\n<br />[list]\n<br />[*]Single arc displaying current stamina.\n<br />[*]Visibility controlled by a threshold (set to 0 to always show; negative to always hide).\n<br />[/list]\n<br />\n<br />[b]Dodges[/b]\n<br />[list]\n<br />[*]Segmented arc representing remaining dodge count / effectiveness.\n<br />[*]Visibility controlled by a threshold.\n<br />[/list]\n<br />\n<br />[b]Peril / Heat[/b]\n<br />[list]\n<br />[*]Curved bar near the crosshair showing peril (psyker) or heat/overheat (weapons).\n<br />[*]Optional peril label, optional crosshair peril colour.\n<br />[/list]\n<br />\n<br />[b]Munitions — Ammo + Grenades[/b]\n<br />[list]\n<br />[*][b]Loaded Ammo[/b]: bar, text, or both — including \"forecast\" modes for charged weapons.\n<br />[*][b]Reserve Ammo[/b]: percentage, raw count, or forecast (estimated shots remaining for weapons like plasma).\n<br />[*][b]Grenades / Blitz[/b]: segmented arc showing available charges and regeneration progress.\n<br />[/list]\n<br />\n<br />[b]Charge Bar (multi-purpose)[/b]\n<br />[list]\n<br />[*]Two-segment arc that can track multiple \"charge-like\" mechanics depending on your build/loadout.\n<br />[*]Supports:\n<br />[list]\n<br />[*]Peril generators (e.g. psyker / plasma-style behaviour)\n<br />[*]Kill-based charges (e.g. force greatsword / throwing shivs)\n<br />[*]Other charge systems (e.g. Helbore, Arbites shield charge, blessings like Thrust / Pinpoint Targeting, and Ogryn power maul recharge progress)\n<br />[/list][/list]\n<br />\n<br />[b]Ability + Talent Timers (cooldowns and active durations)[/b]\n<br />[list]\n<br />[*]Cooldown display modes: timer-only, icons + timer, count + timer, coloured timer, etc.\n<br />[*]Buff duration tracking for major active abilities (including stealth) and selected high-impact talents.\n<br />[*]Optional [b]Ready Sound[/b] when your ability is available (choose from a small set, or keep the vanilla sound).\n<br />[/list]\n<br />\n<br />[b]Pocketables / Supplies[/b]\n<br />[list]\n<br />[*]Stimm / crate icons.\n<br />[*]Stimm timers and reminders for Hive Scum.\n<br />[/list]\n<br />\n<br />[b]Team HUD (optional)[/b]\n<br />[list]\n<br />[*]Alternative team panel modes (minimalist/docked/floating variants) with adjustable scale and positioning.\n<br />[*]Team health bar options with contextual text behaviour.\n<br />[*]Configurable teammate name/icon/status, plus optional team munitions + pocketables info.\n<br />[/list]\n<br />\n<br />[b]Vanilla UI decluttering + \"Streamline Popups\"[/b]\n<br />[list]\n<br />[*]Optional toggles to hide specific vanilla HUD elements (ability widget, weapon carousel, your own player panel).\n<br />[*][b]Streamline Popups[/b] reduces clutter by filtering static objectives and hiding decorative elements.\n<br />[*]When enabled, it can also:\n<br />[list]\n<br />[*]Show class icons in assist interaction popups\n<br />[*]Show ammo waste feedback (only if you are [b]not[/b] using Numeric UI)\n<br />[/list][/list]\n<br />\n<br />[b]Controls / Behaviour[/b]\n<br />[list]\n<br />[*][b]Force Show[/b] hotkey: hold to temporarily show all Ring HUD elements.\n<br />[*][b]ADS settings[/b]: hide in ADS, show only in ADS, or treat ADS as Force Show (with separate ADS scale/separation).\n<br />[*][b]Move with crosshair[/b]: optional crosshair-follow during sway/recoil.\n<br />[*][b]Auspex separation override[/b]: optional spacing override while the Auspex Scanner is active.\n<br />[/list]\n<br />\n<br />[b]Localization[/b]\n<br />[list]\n<br />[*]English\n<br />[*]中文（简体 / 繁體）\n<br />[/list]\n<br />Chinese translation by jcyl2023\n<br />\n<br />[b]Discord[/b]\n<br />Proud member of the Darktide Modders discord:\n<br />[url=https://discord.gg/GFyCGNpJb8]https://discord.gg/GFyCGNpJb8[/url]"
