nexusDescription="[img]https://staticdelivery.nexusmods.com/mods/4943/images/719/719-1770390295-366344565.png[/img]\n<br />\n<br />[b]Description:[/b]\n<br />QuickLeave adds a “Leave Mission” button and a mouse cursor during intro and defeat cutscenes, so you can exit immediately instead of waiting for the cutscene or final score screen.\n<br />Features:\n<br />[list]\n<br />[*]Shows a Leave Mission button during the mission intro cutscene\n<br />[*]Shows a Leave Mission button during the victory/defeat cutscene\n<br />[*]Forces a usable mouse cursor when these cutscenes are active\n<br />[*]Cleans up the cursor when the cutscene ends, or you leave mission\n<br />[*]Optional debug logging to help troubleshoot for future patches\n<br />[/list]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/719/719-1770386733-369018668.png[/img]\n<br />\n<br />[b]Settings / Customization:[/b]\n<br />[list]\n<br />[*]Show in intro cutscene\n<br />[list]\n<br />[*]Enable or disable the button/cursor during the mission intro\n<br />[/list][*]Show the victory/defeat cutscene\n<br />[list]\n<br />[*]Enable or disable the button/cursor during the victory/defeat cutscene\n<br />[/list][*]Safe button, alternative look\n<br />[*]Debug logging\n<br />[list]\n<br />[*]Toggle detailed logging to chat/console_log for troubleshooting\n<br />[/list][*]Dedicated hotkey to force leave a match\n<br />[/list]\n<br />[b]Usage:[/b]\n<br />[list]\n<br />[*]When the cutscene starts, move the mouse and click “Leave Mission”\n<br />[*]If you don’t want it, turn the cutscene option off in Mod Settings\n<br />[*]For a forced cleanup type this command in chat\n<br />[list][*][b]/ql_clean_curso[/b]\n<br />[/list][/list][b]\n<br />[/b][b]Installation:[/b]\n<br />[list]\n<br />[*]Extract the mod into your MODS folder.\n<br />[*]Your mods folder is typically located here if installed through Steam: ..&#92;Steam&#92;steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE&#92;mods\n<br />[*]Place the QuickLeave folder inside ...&#92;Warhammer 40,000 DARKTIDE&#92;mods\n<br />[*]Make sure Darktide Mod Framework (DMF) is installed\n<br />[*]Launch the game and enable QuickLeave in the mod list\n<br />[/list]\n<br />[b]Changelog:[/b]\n<br />[list]\n<br />[*]1.0.0 - Initial release\n<br />[/list][b]Bugs / Known Issues:[/b]\n<br />[list]\n<br />[*]If you see a stuck cursor/double cursor after leaving a mission, disable and re-enable QuickLeave to force cleanup. You can also achieve a similar effect by turning the debug logging setting on and off.\n<br />[/list]\n<br />[b]Bug Report:[/b]\n<br />[list]\n<br />[*]Please find me on Discord [url=https://discordapp.com/users/264193933381337088]LAUREHTE[/url]\n<br />[*]If something breaks, please attach the log file from: ..&#92;AppData&#92;Roaming&#92;Fatshark&#92;Darktide&#92;console_logs\n<br />[*]Use the log created right after the issue happens (sort by most recent)\n<br />[*]Include screenshots or short clips if possible\n<br />[/list]\n<br />[list]\n<br />[*]To reach AppData, type %appdata% and press Enter in your Windows search bar\n<br />[*]Additionally, you can make a bug report here on Nexus if you are sure this mod is causing your crashes/performance issue/bugs\n<br />[/list]\n<br />[list]\n<br />[*]To be sure, this mod is causing issues and/or crashes, \n<br />[/list][list=1]\n<br />[*]FIRST, turning all mods off (including this one and any dependencies it has), except modloader and the DMF framework mods. Does your issue reproduce? Then your game/modloader/DMF is causing the crashes. \n<br />[*]Second, turn only the DEPENDENCIES (if it has any) for this mod (not the mod itself). Does it reproduce? If so, the dependency is the issue, not the mod. \n<br />[*]Finally, if you turn on this mod and you finally can reproduce the crash/issues consistently after multiple times, then THIS MOD is potentially the issue, and you need to contact me with your log file from the location in the previous notes, or post the \"Script Error\" section of your log that should indicate which mod/package is causing the issue\n<br />[/list]\n<br />[b]Credits:[/b]\n<br />[list]\n<br />[*]For button and cursor methods: [url=https://www.nexusmods.com/profile/xsSplater?gameId=4943][/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/502]Cancel Loading at Warhammer 40,000: Darktide Nexus - Mods and community[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/210][/url]\n<br />[/list]\n<br />[b]My other Mods:[/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/warhammer40kdarktide/mods/687]RitualZones - Pathfinding Utilities at Warhammer 40,000: Darktide Nexus - Mods and community[/url]\n<br />[*][url=https://www.nexusmods.com/warhammer40kdarktide/mods/665]MiniAudioAddon at Warhammer 40,000: Darktide Nexus - Mods and community[/url]\n<br />[*][url=https://www.nexusmods.com/warhammer40kdarktide/mods/686]SlowMode at Warhammer 40,000: Darktide Nexus - Mods and community[/url]\n<br />[*][url=https://www.nexusmods.com/warhammer40kdarktide/mods/669]ElevatorMusic at Warhammer 40,000: Darktide Nexus - Mods and community[/url]\n<br />[*][url=https://www.nexusmods.com/warhammer40kdarktide/mods/707]TalentPreview at Warhammer 40,000: Darktide Nexus - Mods and community[/url]\n<br />[/list]"
