ize=3][img]https://steamuserimages-a.akamaihd.net/ugc/2028353404259516040/8513EF823472650B70486E6E7664D0E5A68C4E7C/[/img][/size]\n<br />[color=#bbbbbb][size=5][b]Previous versions:[/b][/size][/color]\n<br />[spoiler][color=#bbbbbb]// Enhanced Descriptions v5.8[/color]\n<br />[list]\n<br />[*][color=#bbbbbb]Updated Penances for All classes.[/color][/*]\n<br />[*][color=#bbbbbb]Some fixes[/color][/*]\n<br />[/list]\n<br />[color=#bbbbbb]// Enhanced Descriptions v5.5[/color]\n<br />[list]\n<br />[*][color=#bbbbbb]Updated Talents and Blessings.[/color][/*]\n<br />[*][color=#bbbbbb]Some fixes[/color][/*]\n<br />[/list]\n<br />[color=#bbbbbb]// Enhanced Descriptions v5.2 BETA[/color]\n<br />[list]\n<br />[*][color=#bbbbbb]Updated Hive Scum Talents.[/color][/*]\n<br />[*][color=#bbbbbb]Some fixes[/color][/*]\n<br />[*][color=#bbbbbb]Added test AI-generated translations for all Weapon Perks and Curios localizations.\n<br />[i]I can't verify their accuracy, so I'm asking for your help.[/i][/color][/*]\n<br />[*][color=#bbbbbb]Added description localization override.\n<br />[i]Now you can, for example, keep your game in French but have my mod's descriptions in English — just set it in the settings.[/i][/color][/*]\n<br />[/list][i][color=#bbbbbb][img width=555,height=444]https://staticdelivery.nexusmods.com/mods/4943/images/210/210-1770818587-522467305.png[/img][/color][/i]\n<br />\n<br />[i][color=#bbbbbb]// Enhanced Descriptions v5.0[/color][/i]\n<br />[list]\n<br />[*][i]Updated Hive Scum Talents. EN+RU[/i][/*]\n<br />[*][i]Some fixes[/i][/*]\n<br />[*][i]Color settings for Dump Stats have been added to the Enhanced Descriptions Mod menu.[/i][/*]\n<br />[/list][i]\n<br />[color=#bbbbbb]// Enhanced Descriptions v4.95 BETA[/color][/i]\n<br />[list]\n<br />[*][i]Updated Ogryn Talents. EN+RU[/i][/*]\n<br />[*][i]Some fixes[/i][/*]\n<br />[*][i]Updated some localizations[/i][/*]\n<br />[/list][i]\n<br />[color=#bbbbbb]// Enhanced Descriptions v4.9 BETA[/color][/i]\n<br />[list]