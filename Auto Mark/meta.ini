nexusDescription="Since I started playing Darktide, I’ve been maining the Arbites and cyber mastiff. However, after repeated nerfs, the class suffers from fundamental design issues: boring mechanics and underpowered builds.\n<br />\n<br />In my opinion, the core problem with the Arbites is the companion. Why doesn’t the cyber mastiff have its own talent tree? Why no AI customization? Why can’t it break the net from the scab trapper? (Scab Trapper, I l**e you)\n<br />   ﻿\n<br />To make sure the $11.99 spent on dog food doesn’t go to waste, I’ve been developing this mod. What started as a simple companion marking tool has grown into a complete auto-marking system with nearly every feature you could ask for.\n<br />   ﻿\n<br />Please read the following details carefully to use the mod correctly.\n<br />\n<br />[b][size=5]Mod Settings[/size]\n<br />\n<br />[/b][list]\n<br />[*][b]Toggle Mod[/b]: Enable or disable [b]auto-mark[/b]. Does not affect Arbites [i][b]Companion Mark [/b][b]Keybind[/b] [/i]or [b][i]Veteran Switch Target on Attack[/i][/b].\n<br />[*][b]Toggle Mod Key[/b]: Hotkey for the above function.\n<br />[*][b]Toggle Notification[/b]: Show a notification when toggling the mod with the hotkey.\n<br />[*][b]Debug Mode[/b]: Prints developer logs. Disable if you are not a developer.\n<br />[/list][size=5][b]Arbites Settings[/b][/size]\n<br />\n<br />[list]\n<br />[*][b]Execution Order Priority[/b]: When enabled, Arbites companion auto-mark prioritizes enemies targeted by Execution Order. If the currently marked enemy is not targeted by Execution Order, but your aimed enemy is, the mark switches to your aimed target. Not affected by [i]Mark Limit [/i]and[i] Cooldown[/i].\n<br />[*][b]Companion Mark Keybind[/b]: Dedicated key for companion marking. As Arbites, you can now use both normal mark and companion mark simultaneously. When Companion Target Tag is set to Press Once, this keybind will perform normal enemy marking. Note: The vanilla game's single-tap companion mark function cannot override your own normal enemy marks.\n<br />[*][b]Range Limitation[/b]: Restricts the maximum distance between your cyber mastiff and a target that can be marked by the auto-mark system.\n<br />[*][b]Cancel Mark on Condition[/b]: The master toggle for all subordinate options below. Only work for human-sized enemy and does not affect manual marks.\n<br />[*][b]Health Threshold[/b]: Cancel the companion mark when the health of your cyber mastiff's current attack target falls below your selected health percentage.\n<br />[*][b]Time Threshold[/b]: Cancel the companion mark when your cyber mastiff has been attacking its current target for longer than your selected duration (in seconds).\n<br />[/list][size=5][b]Veteran Settings[/b][/size]\n<br />\n<br />[list]\n<br />[*][b]Focus Target Overwrite[/b]: When disabled (default), auto-mark will not re-mark enemies already marked by your Focus Target. When enabled, if you aim at an enemy marked by Focus Target, the mod checks if your Focus Target stacks exceed those on the enemy. If the stack difference is greater than or equal[b] [/b]to [b][i]Focus Target Overwrite Delta[/i][/b] or your stacks are at max, Focus Target will be reapplied.\n<br />[*][b]Focus Target Overwrite Delta[/b]: Threshold used for the above check.\n<br />[*][b]Switch Target on Attack[/b]: When attacking, Focus Target marks your currently aimed target. Triggers on both pressing and releasing the attack key. For enemies already marked by Focus Target, the above [b][i]Focus Target Overwrite[/i][/b] logic applies to avoid redundant marking. When wielding a melee weapon, mark range is limited to [b]5m[/b]; for ranged weapons, range matches normal marking. This function counts as manual marking.\n<br />[/list][b]    Note to Veterans[/b]: Please stop binding your mark key to attack button. Use[b][i] Switch Target on Attack[/i][/b] for a far smoother experience.\n<br />\n<br />[size=5][b]Auto-Mark Settings[/b][/size]\n<br />\n<br />Customize auto-mark behavior per class. Select a class first to load its settings. Special thanks to [url=https://www.nexusmods.com/profile/SanctionedPsyker/mods?gameId=4943]Norkkom [/url]for the implementation method.\n<br />[list]\n<br />[*][b]Class[/b]: Select the class to customize, including base classes, [b][i]Arbites Companion[/i][/b], and [b][i]Veteran Focus Target[/i][/b] for separate configuration.\n<br />[*][b]Toggle[/b]: Toggle auto-mark for this class.\n<br />[*][b]Cooldown Time[/b]: In seconds. Auto-mark enters cooldown after a successful mark.\n<br />[*][b]Reset Cooldown[/b]: Resets auto-mark cooldown when the last mark expires (e.g., timed out, enemy died, mark limit reached).\n<br />[*][b]Mark Limit[/b]: Pauses auto-mark while the last mark is active.\n<br />[*][b]Max Range[/b]: Maximum effective range of auto-mark.\n<br />[*][b]Override Manual[/b]: When disabled (default), auto-mark pauses after you manually mark an enemy until that mark expires. Enable to remove this restriction.\n<br />[*][b]Priority Switch[/b]: Automatically switches the current mark to a higher-priority enemy based on the priority table below. Not affected by [i]Mark Limit [/i]and [i]Cooldown[/i].\n<br />[*][b]Elite Toggle[/b]: Enable/disable auto-mark for all elites.\n<br />[*][b]Specialist Toggle[/b]: Enable/disable auto-mark for all specialists.\n<br />[*][b]Boss Toggle[/b]: Enable/disable auto-mark for all bosses.\n<br />[*][b]Other Toggle[/b]: Enable/disable auto-mark for all other enemies.\n<br />[*][b]Enemy Priority[/b]:[b]﻿ Off - [/b]Auto-mark ignores this enemy; [b]Priority Low / Medium / High - [/b]Set priority for [b][i]Priority Switch[/i][/b] logic.\n<br />[/list]\n<br />[b][size=5]Reset Auto Mark Settings[/size]\n<br />\n<br />[/b]Resets all options for all classes to default values.\n<br />Due to the special save/load system used, settings for each class can only be reset using this option.\n<br />\n<br />[b][size=5]Marking Logic[/size][/b]\n<br />\n<br />[list]\n<br />[*][s][/s]Removed the vanilla game's marking tolerance limit, making auto-mark much easier to find targets.\n<br />[*]The Arbites’ two types of auto-mark systems can run at the same time.\n<br />[*]Arbites companion mark can be affected by both [b][i]Execution Order Priority[/i][/b] and [b][i]Priority Switch[/i][/b]. [b][i]Priority Switch[/i][/b] only works if a mark is already active. [b][i]Execution Order Priority[/i][/b] always works. If both are enabled, [b][i]Execution Order Priority[/i][/b] takes priority.\n<br />[*]Arbites companion auto-mark will not mark enemies already marked by another Arbites’ companion mark.\n<br />[*]Focus Target marking from this mod will not cancel other Arbites’ companion marks, preventing their companions from losing targets. (When will Fatshark fix this “feature” ?)\n<br />[/list][b][size=5]Compatibility[/size][/b]\n<br />\n<br />Please avoid using other auto-marking mods to prevent conflicts.\n<br />If you use[i] [b]Execution Order Priority[/b][/i], avoid mods that alter enemy outlines, as the mod relies on outlines to detect Execution Order targets.\n<br />\n<br />[b][size=5]Credits[/size][/b]\n<br />\n<br />Special thanks to [url=https://www.nexusmods.com/profile/ethan7648/mods?gameId=4943]crispy cranky[/url], [url=https://www.nexusmods.com/profile/SanctionedPsyker/mods?gameId=4943]Norkkom[/url], and [url=https://www.nexusmods.com/profile/gpkgpk?gameId=4943]gpk[/url] – the authors of [url=https://www.nexusmods.com/warhammer40kdarktide/mods/556]Auto Ping[/url], [url=https://www.nexusmods.com/warhammer40kdarktide/mods/539]Dog Whistle[/url], and [url=https://www.nexusmods.com/warhammer40kdarktide/mods/545]LessAnnoyingArbites[/url].\n<br />This mod would not have been possible without their amazing work and contributions.\n<br />\n<br />\n<br />–––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––————\n<br />\n<br />\n<br />自从入坑暗潮以来，一直奋战在法务官与狗的最前线，然而随着肥鲨惊世智慧的展现，法务官在一次又一次的削弱后暴露了设计上的根本问题：无趣的机制和不够超模的build。在我看来，法务官不行的根本问题就是狗不行，为什么狗没有单开一页的天赋树？为什么狗没有ai自定义功能？为什么狗不能解开网子姐的网子（网子姐我爱你）？为了不让58块狗粮钱打水漂，所以一直潜心编写此mod，起初只是想为伙伴标记编写功能，到现在成品完成几乎涵盖了所有可能提供的功能。以下为本mod的详细介绍，为了确保你能正确使用本mod，请仔细阅读。\n<br />\n<br />[b][size=5]模组设置\n<br />[/size][/b]\n<br />模组相关的通用设置\n<br />[list]\n<br />[*]模组开关：开启/关闭自动标记。对后面的法务官「伙伴标记按键」、老兵「攻击时切换目标」无效。\n<br />[*]模组开关按键：上面功能的快捷键。\n<br />[*]模组开关通知：使用快捷键开关模组时是否显示通知。\n<br />[*]调试模式：输出一些开发者信息，非开发人员请关闭。\n<br />[/list][size=5][b]法务官设置\n<br />[/b][/size]\n<br />法务官相关设置\n<br />[list]\n<br />[*]遵从处决指令：开启后，法务官伙伴自动标记将优先标记已被处决指令选中的敌人。当已标记的敌人没有被处决指令选中，而正在瞄准的敌人被处决指令选中时，将切换至瞄准的目标。不受「标记限制」和「冷却时间」影响。\n<br />[*]伙伴标记按键：伙伴标记专用按键，现在你可以作为法务官，同时使用普通标记和伙伴标记了。当伙伴目标标记被设置为按一次时，该按键将提供普通敌人标记的功能。注，原版游戏的单击伙伴标记功能无法覆盖自己的普通敌人标记。\n<br />[*]范围限制：限制自动标记系统可标记的目标与你的机械战犬之间的最大距离。\n<br />[*]根据条件取消标记：下方选项的总开关。只对人形敌人生效，不影响手动标记。\n<br />[*]生命值阈值：当你的机械战犬当前攻击目标的血量低于你所选的百分比时，取消该目标的伙伴标记。\n<br />[*]时间阈值：当你的机械战犬攻击当前目标的持续时间超过你所选的时长（单位：秒）时，取消该目标的伙伴标记。\n<br />[/list][size=5][b]老兵设置[/b][/size]\n<br />\n<br />老兵相关设置\n<br />[list]\n<br />[*]聚焦目标覆盖：默认关闭时，自动标记不会重新标记已被聚焦目标标记过的敌人。开启后，当瞄准正在被你自己的聚焦目标标记的敌人时，会检测玩家自身聚焦目标层数是否高于敌人已被施加的层数，如果层数差大于等于下方选项「聚焦目标覆盖最小层数差」或者自身层数已满，将对该敌人重新施加聚焦目标。\n<br />[*]聚焦目标覆盖最小层数差：用于上方选项的判断。\n<br />[*]攻击时切换目标：当进行攻击时，聚焦目标将标记当前瞄准的敌人。在按下攻击键和放下攻击键时触发，对于正在被聚焦目标标记的敌人，将应用上方「聚焦目标覆盖」的逻辑，避免无意义的重复标记。手持近战武器时，标记距离将被限制在5m内，远程武器则与普通标记相同。本功能视同手动标记。\n<br />[/list]注意：请广大老兵玩家停止把标记键绑到攻击键上的行为，使用本mod的「攻击时切换目标」功能将提供更好的体验。\n<br />\n<br />[b][size=5]自动标记设置[/size][/b]\n<br />\n<br />自定义各个职业的自动标记设置，选择职业后加载对应的选项，感谢Norkkom提供的实现方法。\n<br />[list]\n<br />[*]职业：选择你要自定义的职业，除基础职业外还包括法务官伙伴和老兵聚焦目标，用以单独设置这两种特殊标记。\n<br />[*]开关：开启/关闭此职业的自动标记功能。\n<br />[*]冷却时间：单位 秒。标记完成后，自动标记将进入冷却。\n<br />[*]刷新冷却：当上个标记消失时（如时间过期，敌人死亡，超出标记数量限制等），刷新自动标记冷却时间。\n<br />[*]标记限制：当上个标记存在时，停止自动标记。\n<br />[*]最大范围：限制自动标记的最大范围。\n<br />[*]覆盖手动标记：默认关闭时，自动标记将会在你手动标记敌人后停止，直到该手动标记消失。开启后，自动标记将取消此限制。\n<br />[*]优先级切换：根据下方设置的各个敌人的优先级，在已标记敌人时，自动切换标记目标至拥有更高优先级的敌人。不受「标记限制」和「冷却时间」影响。\n<br />[*]精英开关：开启/关闭对所有精英类敌人的自动标记功能。\n<br />[*]专家开关：开启/关闭对所有专家类敌人的自动标记功能。\n<br />[*]Boss开关：开启/关闭对所有Boss类敌人的自动标记功能。\n<br />[*]其他开关：开启/关闭对所有不是以上种类敌人的自动标记功能\n<br />[*]具体敌人的优先级设置：关闭 - 自动标记将忽略此敌人；﻿低/中/高优先级 - 为敌人设置优先级，将用于开启「优先级切换」后的优先级判断。\n<br />[/list]\n<br />[size=5][b]重置自动标记设置[/b][/size]\n<br />\n<br />将所有职业的所有选项重置为默认值。因为使用了特殊的设置存取方法，各个职业的设置只能通过此选项重置。\n<br />\n<br />[b][size=5]标记逻辑[/size][/b]\n<br />\n<br />一些具体逻辑的详细说明\n<br />[list]\n<br />[*][s][/s]取消了原版游戏的标记宽容度限制，自动标记更加容易找到敌人。\n<br />[*]法务官的两种自动标记可以同时运行。\n<br />[*]法务官伙伴标记可以同时受「遵从处决指令」和「优先级切换」影响，其中「优先级切换」只有在存在正在标记的敌人时才会工作，「遵从处决指令」则不受此影响。当二者同时开启时，「遵从处决指令」具有更高的权重。\n<br />[*]法务官伙伴自动标记不会标记被其他法务官伙伴标记的敌人。\n<br />[*]模组提供的聚焦目标标记功能皆不会取消其他法务官的伙伴标记，避免其他法务官玩家的伙伴丢失目标（肥鲨什么时候修复这个「feature」？）。\n<br />[/list][b][size=5]兼容性[/size]\n<br />[/b]\n<br />请不要使用其他自动标记模组以免出现冲突问题。如果你想要使用「遵从处决指令」的话，请尽量不要使用更改敌人轮廓的模组，因为我需要根据敌人身上的轮廓判断它是否被处决指令选中。\n<br />\n<br />[b][size=5]特别感谢[/size][/b]\n<br />\n<br />感谢[url=https://www.nexusmods.com/warhammer40kdarktide/mods/556]Auto Ping[/url]、 [url=https://www.nexusmods.com/warhammer40kdarktide/mods/539]Dog Whistle[/url]、[url=https://www.nexusmods.com/warhammer40kdarktide/mods/545]LessAnnoyingArbites[/url]的作者[url=https://www.nexusmods.com/profile/ethan7648/mods?gameId=4943]crispy cranky[/url]、[url=https://www.nexusmods.com/profile/SanctionedPsyker/mods?gameId=4943]Norkkom[/url]、[url=https://www.nexusmods.com/profile/gpkgpk/mods?gameId=4943]gpk[/url]，没有他们的贡献就没有这个模组的诞生。"
