nexusDescription="[quote]For [b]GlobalStat [/b]users: If you have previously used the [b]GlobalStat [/b]mod, make sure to delete it before installing [b]PlayerProgression[/b].[/quote]\n<br />\n<br />This mod adds a dedicated window to display your global player statistics.\n<br />\n<br />A customizable hotkey is available to toggle the display panel (Toggle Stats Display).\n<br />\n<br />[b]The tabs include[/b]:\n<br />[list]\n<br />[*][b]General[/b]: Total kills, faction breakdown, and special objectives.\n<br />[*][b]Enemies[/b]: Bosses, Elites, and Specialists with detailed type tracking.\n<br />[*][b]Missions[/b]: Total count, Auric/Havoc runs, mission ranks, deathless completions, and category progress.\n<br />[*][b]Mission Progress[/b]: Tracking of current completion status.\n<br />[/list][b]Additional Features[/b]:\n<br />[list]\n<br />[*][b]Visibility Settings[/b]: Choose where to show stats (Hub, Mission, Psykhanium, Prologue).\n<br />[*][b]Tactical Overlay Integration[/b]: Display selected stats in the right-side panel of the Tactical Overlay (Tab menu).\n<br />[*][b]Gamepad Support[/b]: Fully rebindable buttons for PlayStation and Xbox controllers.\n<br />[*][b]Real-time Updates[/b]: Automatic data refreshing in the Tactical Overlay during missions.\n<br />[/list][quote]Don't forget to assign hotkeys![/quote]\n<br />\n<br />[url=https://www.nexusmods.com/profile/RRMLLNV/mods?gameId=4943][img]https://www.mllnv.com/uploads/pictures/all-mods.png[/img][/url]\n<br />\n<br />\n<br />\n<br />Enjoying the mods? You can support my work via donationalerts: [url=https://www.donationalerts.com/r/rrmllnv]https://www.donationalerts.com/r/rrmllnv\n<br />\n<br />[img]https://www.mllnv.com/uploads/pictures/doneishen-alerts_medium.png[/img][/url]"
