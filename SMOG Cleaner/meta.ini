nexusDescription="[size=4][b]Description\n<br />[/b][/size]\n<br />[b][color=#ffb000]S[/color][/b]imple[b] [color=#ffb000]M[/color][/b]od[b] [color=#ffb000]O[/color][/b]bject[b] [color=#ffb000]G[/color][/b]arbage[b] [color=#ffb000]C[/color][/b][color=#ffb000][b]leaner[/b][/color]\n<br />\n<br />[color=#D4D4D8]SMOG Cleaner attempts to lower memory strain and reduce the chance of Lua VM out-of-memory errors. It helps reduce Lua heap pressure by running Lua garbage collection when needed, clearing unused objects.\n<br />\n<br />The mod watches heap usage and gives escalating warnings as it rises. If the heap reaches the critical threshold, it automatically runs garbage collection.\n<br />\n<br />Use [b][color=#ffb000]/clear[/color][/b] in chat to manually run garbage collection once. It reports the Lua heap before and after cleaning, the amount recovered, and the detected maximum Lua heap size.[/color]\n<br />\n<br />[size=4][b]Options[/b][/size]\n<br />[list]\n<br />[*][b][color=#ffb000]Auto clean on mission start [/color][color=#b6b6b6]- [/color][/b][color=#D4D4D8]Runs garbage collection shortly after entering a mission. It ignores the Mourningstar hub.[/color][/*]\n<br />[*][b][color=#ffb000]Auto clean every 10 minutes[/color][/b][color=#D4D4D8] - Runs garbage collection at 10-minute intervals while active.[/color][/*]\n<br />[*][b][color=#ffb000]Silent running[/color][/b] - [color=#D4D4D8]Hides automatic reports from warnings and auto-cleaning. (Output from manual [color=#ffb000]/clear[/color] is still shown.)[/color][/*]\n<br />[/list]\n<br />[size=4][b]Main features[/b][/size]\n<br />[list]\n<br />[*][color=#D4D4D8]Automatic cleaning at critical Lua heap levels.[/color][/*]\n<br />[*][color=#D4D4D8]Manual Lua garbage collection with [color=#ffb000]/clear[/color].[/color][/*]\n<br />[*][color=#D4D4D8]Optional cleaning on mission start.[/color][/*]\n<br />[*][color=#D4D4D8]Optional cleaning every 10 minutes.[/color][/*]\n<br />[*][color=#D4D4D8]Escalating heap warnings.[/color][/*]\n<br />[*][color=#D4D4D8]Minimal chat output.[/color][/*]\n<br />[*][color=#D4D4D8]No HUD.[/color][/*]\n<br />[*][color=#D4D4D8]Silent mode to mute the chat notifications.[/color][/*]\n<br />[/list]\n<br />[size=4][b]Requirements[/b][/size]\n<br />\n<br />[color=#D4D4D8]Requires Darktide Mod Loader and Darktide Mod Framework.[/color]\n<br />\n<br />"
