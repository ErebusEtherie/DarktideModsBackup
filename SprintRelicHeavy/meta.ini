nexusDescription="[center][size=6][b][url=https://github.com/ImperialSkoom/Darktide-SprintRelicHeavy]SprintRelicHeavy[/url][/b][/size][/center]\n<br />[center][i]Improves consistency when chaining Relic Blade sprint heavy windups.[/i][/center]\n<br />\n<br />[line]\n<br />\n<br />[b]SprintRelicHeavy[/b] is a Relic Blade helper that maintains consistent sprint-heavy chaining while reducing input strain.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Features[/b][/size]\n<br />\n<br />[list]\n<br />[*]Helps chain [b]Relic Blade[/b] sprint heavy windups while sprinting[/*]\n<br />[*]Built around the [b]main sprint route[/b] for the most reliable behavior[/*]\n<br />[*]Optional [b]block fallback[/b] support[/*]\n<br />[*]Includes a [b]sprint override[/b] and [b]hotkey[/b][/*]\n<br />[*]Only activates with supported [b]Relic Blade[/b] weapons[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Supported Weapons[/b][/size]\n<br />\n<br />[list]\n<br />[*][b]Munitorum Mk II Relic Blade[/b][/*]\n<br />[*][b]Munitorum Mk X Relic Blade[/b][/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Usage Notes[/b][/size]\n<br />\n<br />[list]\n<br />[*]This is [b]not[/b] a simple macro. The Relic Blade sprint heavy has specific timing and state behavior, and this mod is tuned around those mechanics[/*]\n<br />[*]Player timing and control still matter; the mod assists the sequence but does not replace positioning, release timing, or weapon control[/*]\n<br />[*]Performs best when used within normal movement and sprint flow[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Compatibility Notes[/b][/size]\n<br />\n<br />[list]\n<br />[*]Compatibility with all input-hooking mods is [b]not guaranteed[/b][/*]\n<br />[*]Behavior may vary with mods that alter [b]inputs, sprint state, or attack flow[/b][/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Installation[/b][/size]\n<br />\n<br />[list=1]\n<br />[*]Extract the [b]SprintRelicHeavy[/b] folder into your Darktide [b]mods[/b] directory[/*]\n<br />[*]Add [b]SprintRelicHeavy[/b] to [b]mod_load_order.txt[/b][/*]\n<br />[*]Launch the game with DMF enabled[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Special Thanks[/b][/size]\n<br />\n<br />[list]\n<br />[*]Thanks to [b][url=https://www.nexusmods.com/profile/do0m3d1804]do0m3d1804[/url][/b][/*]\n<br />[/list]"
