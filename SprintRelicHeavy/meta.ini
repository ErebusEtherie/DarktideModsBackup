nexusDescription="[center][size=6][b]SprintRelicHeavy[/b][/size]\n<br />[i]Performs a Relic Blade heavy windup while sprinting.[/i][/center]\n<br />\n<br />[line]\n<br />\n<br />[b]SprintRelicHeavy[/b] is a Relic Blade helper for players who want a cleaner way to chain sprint heavy windups with less input strain.\n<br />\n<br />[line]\n<br />\n<br />[size=5][b]Features[/b][/size]\n<br />\n<br />[list]\n<br />[*]Helps chain [b]Relic Blade[/b] sprint heavy windups while sprinting[/*]\n<br />[*]Built around the [b]main sprint route[/b] for the most reliable behavior[/*]\n<br />[*]Can optionally use a [b]block-cancel fallback[/b] after a confirmed hit[/*]\n<br />[*]Includes a simple [b]toggle keybind[/b] so the mod can be turned on or off in mission[/*]\n<br />[*]Only activates with supported [b]Relic Blade[/b] weapons[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Supported Weapons[/b][/size]\n<br />\n<br />[list]\n<br />[*][b]Munitorum Mk II Relic Blade[/b][/*]\n<br />[*][b]Munitorum Mk X Relic Blade[/b][/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Usage Notes[/b][/size]\n<br />\n<br />[list]\n<br />[*]This is [b]not[/b] a simple macro. The Relic Blade sprint heavy has unusual timing and state behavior, and this mod was tuned specifically around that mechanic[/*]\n<br />[*]Player timing and control still matter. The mod helps the sequence, but it does not replace positioning, release timing, or general weapon control[/*]\n<br />[*]The mechanic behaves best when used as part of normal movement and sprint flow[/*]\n<br />[/list]\n<br />[line]\n<br />\n<br />[size=5][b]Compatibility Notes[/b][/size]\n<br />[list]\n<br />[*]Compatibility with every possible input-hooking mod is [b]not guaranteed[/b][/*]\n<br />[*]The Relic Blade sprint heavy is an unusually awkward mechanic, so behavior may vary depending on other mods that alter [b]inputs, sprint state, or attack flow[/b][/*]\n<br />[/list]\n<br />[line]\n<br />[b]\n<br />[size=5][b]Installation[/b][/size]\n<br />[/b]\n<br />[list=1]\n<br />[*][b]Extract the [b]SprintRelicHeavy[/b] folder into your Darktide [b]mods[/b] directory[/b][/*]\n<br />[*][b]Add [b]SprintRelicHeavy[/b] to [b]mod_load_order.txt[/b][/b][/*]\n<br />[*][b]Launch the game with DMF enabled[/b][/*]\n<br />[/list]"
