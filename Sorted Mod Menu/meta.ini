nexusDescription="[b]Install Instructions[/b]\n<br />\n<br />SortModMenu can be installed normally and placed anywhere in mod_load_order.txt\n<br />\n<br />If you installed previously, you had to place it on the bottom of mod_load_order.txt - this is no longer the case.\n<br />\n<br />[b]Features[/b]\n<br />\n<br />[list]\n<br />[*]Sort your mod list alphabetically, in ascending or descending order\n<br />[*]Pin up to 10 mods on the top of the list, with the option to add icons to them\n<br />[*]Adds a search bar to filter mods - which can be disabled\n<br />[*]Mods listed under \"Toggle Mods\" are also sorted\n<br />[*]Translations for ﻿﻿Spanish, Russian, Simplified Chinese, Korean, and Japanese\n<br />[/list]\n<br />[b]How it works[/b]\n<br />\n<br />This mod patches the code DMF (Darktide Mod Framework) runs to create the Mod Options menu - by default DMF lists mods in the order of your mod_load_order.txt. This mod changes that to sort the list of mods before it displays them. It does not affect the actual loading of mods, ONLY the GUI.\n<br />\n<br />It works even if the mod's name is colored or has special characters in the menu.\n<br />\n<br />[b]Acknowledgements[/b]\n<br />\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/users/1992757]GideonAriphael[/url][b] [/b](creator of Simple Buff Filter) provided code so this mod doesn't need special install instructions (like placing it on the bottom of the mod_load_order.txt). This contribution also made it compatible with Auto Mod Loading and Ordering, so big thanks to him"
