nexusDescription="[quote][b]For TeamKillTracker users[/b]: If you have previously used the [b]TeamKillTracker [/b]mod, make sure to delete it before installing [b]TeamKills[/b].[/quote]\n<br />\n<br />TeamKills tracks the combat statistics of the entire team in real-time via three HUD trackers and a detailed statistics board. \n<br />\n<br />The mod displays kills, damage (total and last-hit), individual killstreaks, shooting accuracy, and granular stats for 46 enemy types across 7 categories. \n<br />\n<br />When a boss is defeated, it triggers a detailed notification showing the damage distribution among players. \n<br />\n<br />It includes an API for integration with other mods and offers extensive visualization customization.\n<br />\n<br />\n<br />[b]Team Kills Tracker[/b]\n<br />\n<br />The main panel in the bottom-left corner displays overall team statistics and individual player metrics: kill count, total damage, last damage dealt, and active killstreaks.\n<br />\n<br />\n<br />[b]Shot Tracker\n<br />[/b]\n<br />A shooting tracker for the local player featuring icons for shot count, misses, and headshots. It helps track firing accuracy during combat.\n<br />\n<br />\n<br />[b]Boss Damage Tracker\n<br />[/b]\n<br />Integrates into the boss health bar, displaying each player's damage in real-time with percentage distribution and last damage dealt. Supports tracking multiple bosses simultaneously.\n<br />\n<br />\n<br />[b]Boss Death Notification[/b]\n<br />\n<br />When a boss is defeated, a detailed notification is automatically displayed. it includes information on who killed the boss (last hit data), the team's total damage, the top damage dealer with their percentage contribution, and a full list of damage dealt by each player with its percentage distribution.\n<br />\n<br />\n<br />[b]KillStreak Board[/b]\n<br />\n<br />A full-screen statistics board in the tactical overlay featuring a detailed breakdown of 7 enemy categories (bosses, melee/ranged elites, specials, disablers, and common enemies). It displays localized enemy names, kill counts, and damage dealt by each player for every specific opponent (46 enemy types). The board highlights active killstreaks and opens automatically after the mission.\n<br />\n<br />\n<br />\n<br />\n<br />Enjoying the mods? You can support my work via donationalerts: [url=https://www.donationalerts.com/r/rrmllnv]https://www.donationalerts.com/r/rrmllnv[/url]"
