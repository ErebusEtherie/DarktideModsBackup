nexusDescription="[b][size=3]Contagion Sample Retrieval and Pneumatic Transfer Event (Final Objective Encounter)[/size][/b]\n<br />\n<br />In the final event of Excise Vault, players must identify the correct vaults, open containers to locate Moebian Pox Zetaphyte-13 strain samples, then carry the retrieved luggable contagion caskets to the central pneumatic conveyor.\n<br />\n<br />This mod will highlight the location of the caskets. Once a casket is slotted, its marker will disappear. It will highlight the control for the security door when it becomes available and you can leave. Choose from markers that are glyphs or a digital countdown as the caskets are slotted. Choose whether the markers should indicate which floor the caskets are on, upper or lower. It can also optionally highlight the pneumatic conveyor's extraction button when it becomes available.\n<br />\n<br />[b][size=3]Servitor Colony Cypher-Ident Extraction Event (Mid-Mission Objective Encounter)[/size][/b]\n<br />\n<br />In the mid event of Excise Vault, players must plant three interrogators and then fix each as they fail. This mod will highlight where to plant the three interrogators and then highlight them again when they need fixing, as well as highlighting the control for the security door when it becomes available and you can leave.\n<br />\n<br />[b][size=3]Ideal for the Quick Work penance[/size][/b]\n<br />\n<br />Using the mod's countdown option, line up the caskets near each slot, they'll all say \"3\". As soon as one is slotted, the other two will say \"2\", signalling for the final two caskets to be slotted immediately. (Tried and tested!)"
