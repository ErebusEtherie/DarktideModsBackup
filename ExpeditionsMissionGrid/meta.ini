nexusDescription="[b]Description:[/b]\n<br />Expeditions Mission Grid changes the Expeditions screen into a flat, readable mission board instead of the default spread-out map layout.\n<br />It moves the expedition nodes into a connected grid, draws clear mission cards over them, keeps the cards selectable, and reduces the original background node feedback so the screen is easier to read and use. The mod only changes presentation and interaction on the Expeditions menu.\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/766/766-1773767599-1046571257.png[/img]\n<br />\n<br />[b]Core Features:[/b]\n<br />[list]\n<br />[*]Replaces the expedition map layout with a connected grid mission style\n<br />[*]Draws flat mission cards for each expedition node\n<br />[*]Locked nodes are shown in red\n<br />[*]Cards grow on hover and stay emphasized when selected\n<br />[*]Selection works through the custom card layout instead of the old background positions\n<br />[*]Suppresses most of the original background node hover/select presentation\n<br />[*]Simple mission connection lines between expedition nodes. If there is no connection, it means the mission is free to start, so long as you meet its requirements.\n<br />[/list]\n<br />[b]Settings:[/b]\n<br />[list]\n<br />[*]Grid X Position\n<br />[*]Grid Y Position\n<br />[*]Column Spacing\n<br />[*]Row Spacing\n<br />[*]Max Columns\n<br />[*]Card Size\n<br />[/list]\n<br />[b]Usage:[/b]\n<br />[list]\n<br />[*]Enable the mod in DMF mod settings in-game\n<br />[*]Open the Expeditions menu\n<br />[*]Adjust layout settings in mod options if you want the grid in a different screen position or size\n<br />[*]Click the mission cards directly to move the  selection\n<br />[/list]\n<br />[b]Installation:[/b]\n<br />[list]\n<br />[*]Extract into: ..&#92;Steam&#92;steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE&#92;mods\n<br />[*]Folder path should be: ...&#92;mods&#92;ExpeditionsMissionGrid\n<br />[*]Ensure Darktide Mod Framework (DMF) is installed\n<br />[*]Add ExpeditionsMissionGrid to your mod load order\n<br />[/list]\n<br />[b]Compatibility / Limitations:[/b]\n<br />[list]\n<br />[*]Mods that also hook or redraw the Expeditions screen may conflict\n<br />[*]If Fatshark changes Expeditions UI structure in a future update, this mod may need an update\n<br />[*]This mod is focused on the Expeditions board screen and does not modify expedition gameplay logic\n<br />[/list]\n<br />[b]Bug Report:[/b]\n<br />[list]\n<br />[*]Attach the latest log from: ..&#92;AppData&#92;Roaming&#92;Fatshark&#92;Darktide&#92;console_logs\n<br />[*]Include the Script Error section if one exists\n<br />[*]Include a screenshot if the grid, lines, or selection look wrong\n<br />[*]Mention your current settings values if the issue looks layout-related\n<br />[/list]\n<br />[b]Changelog:[/b]\n<br />[list]\n<br />[*]1.0.0 - Initial release\n<br />[/list]"
