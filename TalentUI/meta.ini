nexusDescription="This mod adds ability icons with cooldown timers to the team HUD, allowing you to see allies' ability statuses and track their cooldowns for better coordination.\n<br />\n<br />[size=4][u][b]For Allies in Team HUD[/b][/u][/size]\n<br />\n<br />[size=3][b]Tracked Ability Types[/b]:[/size]\n<br />[list]\n<br />[*]Ability — Primary class combat ability.\n<br />[*]Blitz — Grenades and explosive abilities.\n<br />[*]Aura — Passive co-op abilities.\n<br />[/list][b]\n<br />[/b][size=3][b]Weapon Icons[/b]:[/size]\n<br />[list]\n<br />[*]Displays melee and ranged weapon icons with ammo counts for each teammate.\n<br />[*]Customizable position, orientation, and text alignment.\n<br />[/list][size=4][b]Position Presets[/b]:[/size]\n<br />[size=2]Several position presets are available for ability and weapon icons\n<br />[/size]\n<br />[list]\n<br />[*]Default — Standard positioning.\n<br />[*]Large Icons (Portrait Side) — Large vertical icons next to the player portrait (automatically hides the Aura icon).\n<br />[*]Below Health — Icons positioned under the health bar.\n<br />[*]Near Coherency — Icons next to the coherency indicator.\n<br />[/list][size=3][b]Customization Options[/b]:[/size]\n<br />[list]\n<br />[*]Adjustable icon sizes, spacing, and offsets.\n<br />[*]Customizable cooldown text alignment (Left, Right, Top, Bottom, Center).\n<br />[*]Font size control for cooldown text.\n<br />[*]Advanced settings for fine-tuning positions.\n<br />[/list]\n<br />\n<br />[size=4][u][b]For Local Player[/b][/u]\n<br />[/size]\n<br />[size=3][b]Ability Icon Cooldown[/b]:[/size]\n<br />[list]\n<br />[*]Cooldown text is displayed in the center of the standard HUD ability icon.\n<br />[*]Two display formats: time in seconds or recharge percentage.\n<br />[*]Adjustable font size (30-50).\n<br />[/list][size=3][b]Active Ability Timer[/b]:[/size]\n<br />[list]\n<br />[*]Shows remaining duration while the ability is active.\n<br />[*]Color coding: Light Green for active status, Red for cooldown.\n<br />[*]Optional decimal precision for time display.\n<br />[/list][size=3][b]Notifications[/b]:[/size]\n<br />[list]\n<br />[*]Visual notification when the ability becomes ready after cooldown.\n<br />[/list]\n<br />\n<br />[url=https://www.nexusmods.com/profile/RRMLLNV/mods?gameId=4943][img]https://www.mllnv.com/uploads/pictures/all-mods.png[/img][/url]\n<br />\n<br />\n<br />\n<br />Enjoying the mods? You can support my work via donationalerts: [url=https://www.donationalerts.com/r/rrmllnv]https://www.donationalerts.com/r/rrmllnv\n<br />\n<br />[img]https://www.mllnv.com/uploads/pictures/doneishen-alerts_medium.png[/img][/url]"
