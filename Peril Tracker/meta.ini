nexusDescription="[size=4][b]Description[/b][/size]\n<br />[color=#D4D4D8]Tracks peril over time during missions and displays a chart. Sessions are saved to %appdata%&#92;Fatshark&#92;Darktide&#92;peril_tracker for historical review.[/color]\n<br />\n<br />[size=4][b]Installation instructions[/b][/size]\n<br />[color=#D4D4D8]Extract the peril_tracker folder to your mods folder in the 'steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE[/color]` directory, or use the Nexus Mod Manager/Darktide Mod Loader (https://www.nexusmods.com/warhammer40kdarktide/mods/19) to install it automatically.\n<br />\n<br />[size=4][b]Main features[/b][/size]\n<br />[color=#D4D4D8][size=3]This mod collects your peril level on an adjustable scale (1s to 5s), saves it to a .json, and allows you to view it after the mission. The default key is F9, but it can be modified in the mod's settings. This mod also tracks your peril overloads and whether or not you've survived them, as well as your average peril throughout a game.[/size][/color]\n<br />\n<br />[color=#D4D4D8][size=3]The options currently available are:\n<br />\n<br />- Open Peril History - change which button opens the chart view[/size][/color]\n<br />[color=#D4D4D8][size=3]- Sample Interval - how often, in seconds, the mod samples your peril[/size][/color]\n<br />[color=#D4D4D8][size=3]- Show Warp Nexus Lines - Displays teal lines across the chart at 20%, 40%, 60%, and 80%[/size][/color]\n<br />[color=#D4D4D8][size=3]- Debug messages - displays debug messages relevant to the mod[/size][/color]\n<br />[color=#D4D4D8][size=3]- Delete old entries - automatically delete entries once you hit a certain file count[/size][/color]\n<br />[color=#D4D4D8][size=3]- Number of save files - how many files you keep before automatic deleting starts[/size][/color]\n<br />\n<br />[color=#D4D4D8][size=3]Important note: this mod was created using the help of generative AI.[/size][/color]"
