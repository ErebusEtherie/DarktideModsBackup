nexusDescription="[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />What started out as a simple improvement for my long mod menus in Enemies Improved and Markers AIO Improved ended up as a whole extension of QoL and upgrades to the mod settings menu. Custom widgets, long-standing bug fixes, many much-requested quality of life improvements, all in one completely optional extension. The general motto being \"If installed, you get more fun toys and a good time, if not installed then no problem\". \n<br />\n<br />[i]I know I'm gonna get asked \"But why not just merge this into DMF\". Because that isn't what I was going for, check out the code and you'll see, I'm doing almost everything at runtime with very minimal overrides to ensure a plug and play optional experience. It's an extension for a reason :)[/i]\n<br />\n<br />Long reason:\n<br />[spoiler]Personal Preference c:\n<br />\n<br />Essentially, I wanted to build this as an [i]option[/i]. That was my main original goal. It just ended up fixing up and adding a huge chunk of QoL features too (which I don't think I could go back to not using them tbh). But at the same time, it's all done at runtime - with feature toggles. So nobody is forced to use anything or update any mods to be able to use this extension and have all features available.\n<br />\n<br />One great benefit of this is that modders can add support for this extension's features (RGB widgets, tabs etc - check out my mods enemies improved or markers improved for examples), all whilst still having support for those without the extension, as I don't enforce creation of a new widget_type or anything like that. It'll be compatible with old mods that will never get updated (and automatically upgrade them with new features!), and it'll work great with new mods people do or don't add explicit support for :)[/spoiler]\n<br />\n<br />[i]compatible with [url=https://www.nexusmods.com/warhammer40kdarktide/mods/723]Sorted Mod Menu[/url] or base [url=https://www.nexusmods.com/warhammer40kdarktide/mods/8]DMF[/url][/i]\n<br />\n<br />[b][i]I STRONGLY SUGGEST PLACING AT THE TOP OF YOUR LOAD ORDER JUST AFTER DMF OR LETTING AML TAKE CARE OF IT[/i][/b]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][b][i][size=6][font=Serif]TLDR[/font][/size][/i][/b][/center]\n<br />[i]A bunch of super neat quality-of-life improvements and brand new features, that can automatically upgrade the DMF mod settings page in your Darktide games. Along with an entirely optional, simple and backwards-compatible implementation method for mod authors.[/i]\n<br />\n<br />[left][size=4][i]And [u]yes[/u], this will benefit you whether you make mods or just use them. It will automatically upgrade &amp; improve all of your settings pages.[/i][/size][/left]\n<br />\n<br />[b]Mod Tabs[/b]\n<br />- Automated and author-curated options for splitting long pages into tabs!\n<br />[b]Click to type values on sliders (Effects ALL settings pages, even vanilla options)[/b]\n<br />- Automatically upgrades the options sliders game-wide so you can click on the text value to type an exact value.\n<br />[b]Scroll position memory[/b]\n<br />- Remember where you were when you re-open the mod settings page.\n<br />[b]Custom RGB/Colour widget[/b]\n<br />- No more stacked sliders, you now have a more compact widget to adjust the RGB colours, along with a preview of the colour, and direct text input!\n<br />[b]Dropdown menu icon support[/b]\n<br />- Mod authors rejoice, you can now add icons to dropdown menus.\n<br />[b]Clickable scrollbars in dropdowns[/b]\n<br />- You can now click the mini scrollbar in dropdown menus, so you can use your mouse to drag.\n<br />[b]Font face preview direct in menus[/b]\n<br />- You can now set text to render in specific fonts, just like the #color option, but with #font\n<br />[b]DMF Mod reload rebind[/b]\n<br />- Oh boy, you can now set a new keybind for mod reloads! No more accidental presses.\n<br />[b]step_size_value supported numbers increased[/b]\n<br />[left]- Increased the range of supported values in the  [b]\"step_size_value[/b]\" mod option for any number between 0.1 and 100 (including 2, 5 etc)[/left]\n<br />[left][/left]\n<br />[left][/left]\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][size=6][font=Serif][b][i]Mod Tabs[/i][/b][/font][/size][/center]\n<br />[center]Automated and author-curated options for splitting long pages into tabs! [/center]\n<br />\n<br />[center]Curated tabs:[/center]\n<br />[center][img width=500,height=200]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167141-1441623335.png[/img][/center]\n<br />\n<br />[center]Generalised tabs:[/center]\n<br />[center][img width=500,height=200]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167184-2031586915.png[/img][/center]\n<br />\n<br />[size=5][font=Impact]FEATURES:[/font][/size]\n<br />- Global mod tabs now available, with two options. \n<br />- Curated tabs need to be implemented by mod authors, but allow specifying tab names and content.\n<br />- Generalised tabs can be applied by users, without ANY intervention from mod authors! These will try to make a tab system for all the groups in a mod. (These need to be enabled in the settings page, as they may not always be accurate!)\n<br />[font=Impact][size=5]\n<br />Mod Authors:[/size][/font]\n<br />[spoiler]- To implement curated tabs in your own mod is super simple. Just add the following tag in your _data.lua mod settings. \n<br />\n<br />Note: Groups will apply the tab to all it's contents, but individual items can still have a tab specified.\n<br />Also, adding this \"tab\" variable will NOT cause any issues for those not using Alf's DMF Extensions. They simply won't see the tabs!\n<br />\n<br />I'd suggest adding a single \"group_header\" setting around your settings entries, and apply the tab to that. All sub settings should get pulled in to the same tab.\n<br />\n<br />[quote]tab = \"Your Tab Name Here\", [/quote]For example:\n<br />[quote]                   {\n<br />                        setting_id = \"ammo_med_scale\",\n<br />                        type = \"numeric\",\n<br />[b]                        tab = \"Ammo &amp; Med\",[/b]\n<br />                        default_value = 100,\n<br />                        range = { 50, 150 },\n<br />                        step_size = 1,\n<br />                        tooltip = \"scale_tooltip\",\n<br />                    },[/quote]That's all you need to do to implement a custom tab system!\n<br />\n<br />[size=5][font=Impact]TAB OVERRIDES[/font][/size]\n<br />As of v1.1.0 you are now able to implement overrides to certain styling of your mod's tabs!\n<br />\n<br />These are implemented in the same fashion as the tabs themselves. Ideally just place a group_header around a bunch of your individual settings, and give that the tab tag.\n<br />\n<br />For example:\n<br />[quote]tab_overrides = {\n<br />        font_size = 16,\n<br />        font_color = { 255, 255, 0, 0 },\n<br />        font_color_hover = { 255, 255, 255, 0 },\n<br />        font_color_selected = { 255, 0, 255, 255 },\n<br />        tooltip = mod:localize(\"general_tab_tooltip\"),\n<br />        truncate_num = 4,\n<br />},[/quote]The settings are self explanatory, and all are completely optional.\n<br />\n<br />A full settings example with custom mod tabs and overrides would be in the following format:\n<br />[quote]    setting_id = \"general_settings\",\n<br />    type = \"group\",\n<br />    tab = \"General\",\n<br />    tab_overrides = {\n<br />        font_size = 16,\n<br />        font_color = { 255, 255, 0, 0 },\n<br />        font_color_hover = { 255, 255, 255, 0 },\n<br />        font_color_selected = { 255, 0, 255, 255 },\n<br />        tooltip = mod:localize(\"general_tab_tooltip\"),\n<br />        truncate_num = 4,\n<br />    },\n<br />    sub_widgets = {\n<br />        {\n<br />            setting_id = \"draw_distance\",\n<br />            type = \"numeric\",\n<br />            default_value = 30,\n<br />            step_size_value = 5,\n<br />            range = {\n<br />                5,\n<br />                100,\n<br />            },\n<br />            tooltip = \"draw_distance_tooltip\",\n<br />        },\n<br />        {\n<br />            setting_id = \"global_opacity\",\n<br />            type = \"numeric\",\n<br />            default_value = 1,\n<br />            decimals_number = 2,\n<br />            step_size_value = 0.1,\n<br />            range = {\n<br />                0.1,\n<br />                1,\n<br />            },\n<br />            tooltip = \"global_opacity_tooltip\",\n<br />        }\n<br />    }[/quote][/spoiler]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img] [size=6][font=Serif][b][i]Scroll Position Saving[/i][/b][/font][/size][/center]\n<br />[center]Remember where you were when you re-open the mod settings page.[/center]\n<br />\n<br />[size=5][font=Impact]FEATURES:[/font][/size]\n<br />- Resume exactly where you were in the DMF mod settings page.\n<br />- Works with ALL mods, and with the tab system too!\n<br />- Requires no extra implementation.\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img]\n<br /> [size=6][font=Serif][b][i]Custom RGB/ARGB Widget[/i][/b][/font][/size][/center]\n<br />[center]No more stacked sliders, you now have a more compact widget to adjust the RGB colours, along with a preview of the colour, and direct text input![/center]\n<br />\n<br />[center][img width=500,height=75]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167145-1827273747.png[/img][/center]\n<br />\n<br />[size=5][font=Impact]FEATURES:[/font][/size]\n<br />- Automated RGB/ARGB widget creation for many mods.\n<br />- Has simple sliders that can be clicked and dragged on with a mouse.\n<br />- The value text e.g. \"255\" can be clicked on for direct text input.\n<br />- The exact colour can be seen in the small square to the left of the sliders.\n<br />\n<br />[size=5][font=Impact]Mod Authors:[/font][/size]\n<br />[spoiler]- Support is simple, this widget replaces old-school slider stacks that have a simple pattern, shown below.\n<br />- All you need to do is change the setting_id of your RGB widgets to follow the pattern. \n<br />- Alpha sliders are automatically supported too.\n<br />- [b]Any combination of consecutive alpha, red, green, blue numeric sliders will be automatically converted.[/b]\n<br />- Supports decimal values, non 0-255 ranges (e.g. 0-100) and the step_size_value setting.\n<br />\n<br />[i]If a user has Alf's DMF extension, these sliders will automatically convert to the new widget. If they don't have it installed, they will still see the default DMF sliders.[/i]\n<br />\n<br />[quote]Colour settings ID formats supported:\n<br />+ All RGB slider clusters ending in formats like \"_R\", \"_Red\".\n<br />+ Includes groups ending in \"color\" or \"colour\". Although entirely optional.[/quote]EXAMPLE:\n<br />[quote]                    {\n<br />                        setting_id = \"ammo_large_colour\",\n<br />                        type = \"group\",\n<br />                        tab = \"Ammo &amp; Med\",\n<br />                        sub_widgets = {\n<br />                            { setting_id = \"ammo_large_colour_R\", type = \"numeric\", default_value = 252, range = { 0, 255 }, step_size = 1, tooltip = \"colour_R_tooltip\" },\n<br />                            { setting_id = \"ammo_large_colour_G\", type = \"numeric\", default_value = 252, range = { 0, 255 }, step_size = 1, tooltip = \"colour_G_tooltip\" },\n<br />                            { setting_id = \"ammo_large_colour_B\", type = \"numeric\", default_value = 222, range = { 0, 255 }, step_size = 1, tooltip = \"colour_B_tooltip\" },\n<br />                        },\n<br />                    },[/quote][/spoiler]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img]\n<br /> [b][i][size=6][font=Serif]Icons within dropdown options[/font][/size][/i][/b][/center]\n<br />[center]Mod authors rejoice, you can now add icons to dropdown menus.[/center]\n<br />\n<br />[center][img width=500,height=200]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167148-916303980.png[/img][/center]\n<br />\n<br />[size=5][font=Impact]FEATURES:[/font][/size]\n<br />- Mod authors can show exact icons for each entry.\n<br />- Useful for customisation, or categorisation of settings!\n<br />- Mods will need (simple) implementation for this to work.\n<br />- Supports custom colours too!\n<br />\n<br />[size=5][font=Impact]Mod Authors:[/font][/size]\n<br />[spoiler]- Implementation is easy, much like the tabs, it involves the _data.lua mod settings file. \n<br />- Add a new variable to your dropdown tables with the key: \"icon\" and value: \"path to icon\"\n<br />- Colour can be specified by the same doing key: \"icon_colour\" value: {255,255,255,255}\n<br />\n<br />EXAMPLE FOR DROPDOWN CONTENTS:\n<br />[quote]   {\n<br />        text = \"Exclamation\",\n<br />        value = \"content/ui/materials/hud/interactions/icons/environment_alert\",\n<br />        icon = \"content/ui/materials/hud/interactions/icons/environment_alert\",\n<br />        icon_colour = { 255, 255, 255, 0 },\n<br />    },[/quote]\n<br />\n<br />As of v1.2, you can now specify icon packages to be loaded to help prevent missing icons in your dropdowns.\n<br />- Implementation is done by adding a new \"required_icon_packages\" variable to your data option's return statement.\n<br />\n<br />EXAMPLE:\n<br />[quote]return {\n<br />    name = mod:localize(\"mod_name\"),\n<br />    description = mod:localize(\"mod_description\"),\n<br />    is_togglable = true,\n<br />    required_icon_packages = { \"packages/ui/views/inventory_view/inventory_view\", \"packages/ui/hud/player_weapon/player_weapon\"},\n<br />    options = {\n<br />        options_widgets_here,\n<br />    }\n<br />}[/quote]\n<br />\n<br />\n<br />[/spoiler]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img] [b][i][size=6][font=Serif]Clickable [i]dropdown[/i] scrollbar[/font][/size][/i][/b][/center]\n<br />[center]You can now click the mini scrollbar in dropdown menus, so you can use your mouse to drag.[/center]\n<br />\n<br />FEATURES:\n<br />- Allows you to use your mouse to click and drag on the scroll bar in dropdowns!\n<br />- No extra implementation needed.\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img]\n<br /> [b][i][size=6][font=Serif]Font face Previews on text[/font][/size][/i][/b][/center]\n<br />[center]You can now set text to render in specific fonts, just like the #color option, but with #font[/center]\n<br />[center][img width=500,height=200]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167141-1004515171.png[/img][/center]\n<br />\n<br />[size=5][font=Impact]FEATURES:[/font][/size]\n<br />- Allows mod authors to show exactly what font you can pick from in their settings menus.\n<br />- Simple implementation, allowing the use of \"{#font(x)}\" style, much like the #color implementation already present in Darktide.\n<br />\n<br />[size=5][font=Impact]Mod Authors:[/font][/size]\n<br />[spoiler]- Implementation can be achieved in multiple ways!\n<br />- Simple way would be to use the #font tag on your text\n<br />[b]EXAMPLE[/b]\n<br />[quote]{#font(X)}Y{#reset()}\n<br />\n<br />[i] with X being the internal name of the font, and Y being your text. [/i][/quote]- Can be added as an automated dropdown, examples of this can be seen in my enemies improved and markers improved localisation files. (insert_fonts function)\n<br />\n<br />The full code to get all fonts available in game, and convert them to a dropdown is:\n<br />[quote]-- Always use an updated font list.\n<br />-- Thanks to GideonAriphael on Nexusmods for recommendation\n<br />mod._get_font_options = function()\n<br />    local FontDefinitions = require(\"scripts/managers/ui/ui_fonts_definitions\")\n<br />    local fonts = FontDefinitions.fonts or {}\n<br />    local options = {}\n<br />    local i = 1\n<br />\n<br />    for font_name, _ in next, fonts do\n<br />        options[i] = { text = font_name, value = font_name }\n<br />        i = i + 1\n<br />    end\n<br />\n<br />    -- Sort alphabetically by the underlying font name for consistency\n<br />    table.sort(options, function(a, b)\n<br />        return a.value &lt; b.value\n<br />    end)\n<br />\n<br />    return options\n<br />end\n<br />\n<br />-- function to apply font face to localisation text\n<br />local apply_font_to_text = function(text, font_name)\n<br />    return string.format(\"{#font(%s)}%s{#reset()}\", font_name, text)\n<br />end\n<br />\n<br />local insert_fonts = function(localisation_table)\n<br />    local fonts_data = mod._get_font_options()\n<br />\n<br />    for _, data in next, fonts_data do\n<br />        -- Convert snake_case to Title Case for display (e.g. proxima_nova_bold -&gt; Proxima Nova Bold)\n<br />        local readable = data.text:gsub(\"_\", \" \"):gsub(\"(%a)([%w]*)\", function(first, rest)\n<br />            return first:upper() .. rest\n<br />        end)\n<br />\n<br />        local text = string.format(\"%s\", readable)\n<br />\n<br />        local new_localised_readable_text = {\n<br />            en = apply_font_to_text(text, data.value),\n<br />        }\n<br />        localisation_table[data.value] = new_localised_readable_text\n<br />    end\n<br />end[/i][/quote][/spoiler]\n<br />\n<br />\n<br />[center][i][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img]\n<br /> [b][i][size=6][font=Serif]Mod reload keybind replacement[/font][/size][/i][/b][/i][/center]\n<br />[center][i]Oh boy, you can now set a new keybind for mod reloads! No more accidental presses.[/i][/center]\n<br />\n<br />[center][i][img width=500,height=500]https://staticdelivery.nexusmods.com/mods/4943/images/864/864-1779167184-1176544521.png[/img][/i][/center]\n<br />[i]\n<br />FEATURES:\n<br />- Super simple replacement for the DMF mod hot-reload keybind.\n<br />- Lets you set the keybind to whatever you wish, overriding the default \"CTRL + SHIFT + R\" which can cause issues if you crouch slide reload like I always do.\n<br />- No extra implementation needed!\n<br />\n<br />[/i]\n<br />[center][i][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img]\n<br />[b][i][size=6][font=Serif]Step_size_value range increased[/font][/size][/i][/b][/i][/center]\n<br />[center][i]Increased the range of supported values in the  [b]\"step_size_value[/b]\" mod option for any number between 0.1 and 100 (including 5)[/i][/center]\n<br />[center][/center]\n<br />[left][i]FEATURES:\n<br />- This is mostly for mod authors, but increased the step size on settings sliders to support ANY number, so you can step up/down however you like[/i][/left]\n<br />[left][/left]\n<br />[center][i][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/i][/center]\n<br />[i]If you would like more QoL improvements, check out some of my other mods:\n<br />\n<br />[b]\"Improved\" Series[/b]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/344]How Did I Get That[/url]﻿\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/347]Character Cosmetics View Improved[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/346]Weapon Cosmetics View Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/348]Commodore's Vestures Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/355]Penance View Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/360/]Rolling Steel Timer Improved[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/382]\n<br />Mourningstar Dialogue Improved[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/809]Enemies Improved[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/864]Alf's Mod Settings Extension[/url]\n<br />\n<br />[b]\"Markers\" Series\n<br />[/b][i]All-in-One:[/i]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/447]Markers Improved All-in-One[/url]﻿\n<br />\n<br />All of my mods are designed to fit seamlessly together, and improve each other.\n<br />\n<br />[/i]\n<br />[code][code][url=https://ko-fi.com/alfthebigheaded][img]https://ko-fi.com/img/githubbutton_sm.svg[/img][/url][/code][i][/code][/i]"
