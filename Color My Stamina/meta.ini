nexusDescription="[font=Verdana][size=5][color=#00ff00]Colo[/color][color=#ff7700]r My[/color][color=#1e84cc]Stam[/color][color=#ff0000]ina![/color][/size][color=#cccccc]﻿\n<br />\n<br />This mod lets you customize the color of your stamina bar using four different thresholds based on your current stamina. You can set the exact color and the percentage trigger for each one.\n<br />\n<br />[/color][color=#cccccc]Want the whole bar to stay one color? Just set every threshold to the same thing. Only want a warning color for when your stamina is low? You can do that too by just adjusting the percentages and colors to what you want!\n<br />\n<br />[/color]This mod currently conflicts with Perfect Indicator. I am working on a solution that will make it compatible. [/font]"
