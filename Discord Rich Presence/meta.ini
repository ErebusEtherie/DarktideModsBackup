nexusDescription="[size=3]Enables Discord Rich Presence features so your friends can see what you're playing\n<br />[/size][list]\n<br />[*][size=3]Game state or current mission[/size]\n<br />[*][size=3]Party state or current difficulty[/size]\n<br />[*][size=3]Current character class, name, and level[/size]\n<br />[*][size=3]Time in current mission[/size]\n<br />[/list]\n<br />[b]Installation (IMPORTANT!)[/b]\n<br />[size=3]\n<br />This mod is automatically installable with Vortex Extension v1.3.0+. If you're installing manually make sure you put the files in the right folders within the Darktide install.[/size]\n<br />\n<br />This mod has two extra dependencies: darktide_discord_pluginw64.dll and discord_game_sdk.dll.\n<br />Find them on the downloads page and place them in the correct game install folders.\n<br />\n<br />Place discord_game_sdk.dll in [install folder]/binaries and darktide_discord_pluginw64.dll in [install folder]/binaries/plugins.\n<br />\n<br />[size=4][b]Acknowledgements\n<br />[/b][/size]Code for the darktide_discord_pluginw64.dll plugin is based on [url=https://github.com/thewhitegoatcb/rawray]https://github.com/thewhitegoatcb/rawray[/url] and released under the MIT License [url=https://github.com/danreeves/darktide-discord]here https://github.com/danreeves/darktide-discord[/url]"
