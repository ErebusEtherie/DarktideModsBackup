nexusDescription="[size=4][b]Description[/b][/size]\n<br />[color=#D4D4D8]Optimizes the gameplay experience for all Psyker weapons, prevents risky operations, and allows you to unleash warp energy without fear of self-explosion during Warp Unbound and Empowered Psionics. [/color]\n<br />[color=#D4D4D8]Game devs provides an incorrect start timestamp when generating local buffs, causing the Warp Unbound buff to appear active locally while already expired server-side. This mod automatically calculates network latency and blocks actions that would result in self-explosion. [/color]\n<br />\n<br />[size=4][b]Installation instructions[/b][/size]\n<br />[color=#D4D4D8]Please place this mod as late as possible in your  mod_load_order.txt [/color][color=#D4D4D8]file to ensure it loads after all other input-modifying mods. [/color]\n<br />\n<br />[size=4][b]Main features[/b][/size]\n<br />Prevent Overload: Prevents self-explosion from Warp weapon overloads\n<br />Warp Unbound: Allow unlimited Warp Actions while Warp Unbound is active\n<br />Venting Shriek Ready : Allow overload while Venting Shriek is ready\n<br />Scrier's Gaze Ready : Allow overload while Scrier's Gaze is ready\n<br />Auto Use Ability: Automatically use Venting Shriek or Scrier's Gaze to prevent self-explosion\n<br />\n<br />[heading]模组简介\n<br />[color=#e4e4e7][size=2]针对灵能者的所有武器进行游戏体验优化，阻止各类高风险操作，让你在[/size][/color][b][color=#e4e4e7][size=2]亚空间解放[/size][/color][/b][color=#e4e4e7][size=2]和[/size][/color][b][color=#e4e4e7][size=2]强化灵能[/size][/color][/b][color=#e4e4e7][size=2]期间尽情释放亚空间能量，无需担心自爆。\n<br />肥鲨在生成本地buff时提供了错误的起始时间，导致亚空间解放在本地计时尚未结束时，服务器端却已经失效，本模组会计算延迟来提前阻止会导致自爆的操作。[/size][/color][/heading]\n<br />[heading]安装说明\n<br />[color=#e4e4e7][size=2]请将本模组尽可能放在 [/size][/color][size=2][color=#e4e4e7][font=Monaco, Menlo, Consolas, monospace]mod_load_order.txt [/font][/color][/size][color=#e4e4e7][size=2]文件的末尾，以确保它晚于所有其他修改输入的模组加载。[/size][/color][/heading]\n<br />[heading]主要功能[/heading]\n<br />[list]\n<br />[*][b]防止过载[/b]：防止因亚空间武器过载导致的自爆[/*]\n<br />[*][b]亚空间解放[/b]：亚空间解放激活时允许无限制使用所有亚空间能力[/*]\n<br />[*][b]泄能尖啸就绪[/b]：泄能尖啸技能就绪时允许使用亚空间能力至过热[/*]\n<br />[*][b]占卜师的凝视就绪[/b]：占卜师凝视技能就绪时允许使用亚空间能力至过热[/*]\n<br />[*][b]自动使用技能[/b]：自动使用泄能尖啸或占卜师的凝视技能防止自爆[/*]\n<br />[/list]"
