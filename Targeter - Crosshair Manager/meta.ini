nexusDescription="Customize crosshair colour and shape per target (enemy/weakspot), per action state (hip-fire, ADS/Block, Activated Special), and weapon class. Peril/heat crosshairs tint with peril level.\n<br />\n<br />Inspired by mods like Crosshair Remapped, currently maintained by Deluxghost.\n<br />\n<br />Recommended mod to use with Targeter: [url=https://www.nexusmods.com/warhammer40kdarktide/mods/36]Crosshairs Fix[/url] by [url=https://www.nexusmods.com/warhammer40kdarktide/users/5989185]Skwuruhl[/url], many thanks for your help.\n<br />Crosshair colouring according to peril/heat based on work by [url=https://www.nexusmods.com/profile/meowbeep]meowbeep[/url], used with permission.\n<br />\n<br />Compatible with [url=https://www.nexusmods.com/warhammer40kdarktide/mods/334]Legacy Crosshairs[/url] make sure Legacy Crosshairs (crosshairs_old_remap) is before Targeter in the load order.\n<br />\n<br />Instructions for adding custom crosshair templates:\n<br />[list=1]\n<br />[*]If you have a file ready, e.g. my_amazing_crosshair.lua, save it to the &#92;Targeter&#92;scripts&#92;mods&#92;Targeter&#92;crosshairs folder.\n<br />\n<br />[*]Edit the manifest.lua file in that folder and add your crosshair to the list there, e.g. \"my_amazing_crosshair\".  The order does not matter.  Targeter will handle the rest next time you start the game or force reload.\n<br />\n<br />\n<br />[/list]Making custom crosshair templates is a little more technical but the files in that folder contain enough examples that someone with light scripting experience (or an AI) could follow the same patterns to make their own crosshairs, including ones that expand or rotate with bloom/recoil.\n<br />\n<br />Proud member of the Darktide Modders discord https://discord.gg/GFyCGNpJb8\n<br />\n<br />Current list of custom crosshairs (already includes base game crosshairs):\n<br />    \"bfg_dot\",\n<br />    \"spray_n_pray_dot\",\n<br />    \"spray_n_pray_larger_dot\",\n<br />    \"larger_dot\",\n<br />    \"chevron\",\n<br />    \"triangle_dot\",\n<br />    \"triangle_dot_rotating\",\n<br />    \"triangle_dot_inverted\",\n<br />    \"spiky\",\n<br />    \"circle_dot\",\n<br />    \"diamond\",\n<br />    \"charge_up_ads_dot\",\n<br />    \"charge_up_ads_triangle_dot\",\n<br />    \"charge_up_peril\",\n<br />    \"charge_up_peril_larger_dot\",\n<br />    \"charge_up_ads_peril\",\n<br />    \"charge_up_ads_peril_larger_dot\","
