nexusDescription="Now compatible with \"No Man's Land\" update.\n<br />\n<br />Filters Brunt's store weapon items to get rid of unusable trash. Currently it supports:\n<br />[list]\n<br />[*]Filtering based on every available item max stat (60-80%).\n<br />[*]Filtering \"ideal\" items. When checked, it shows only elements which have one max stat 60%.\n<br />[*]Filtering items which have all stats &gt;= 70-76%.\n<br />[*]Filtering curios based on their rating (0-430).\n<br />[*]Works both in Armoury and Requisitorium.\n<br />[*]English, Russian, Chinese (by deluxghost) localization.\n<br />[/list]\n<br />See also my [url=https://www.nexusmods.com/warhammer40kdarktide/mods/692]GlobalStore[/url]﻿ mod, which feels very good in combination!\n<br />[url=https://github.com/seroperson/darktide-mods]GitHub repository[/url]"
