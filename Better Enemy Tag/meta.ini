nexusDescription="[size=5][b]Main features[/b][/size]\n<br />\n<br />[b]Reduce Screen Margin[/b]: Expand the screen-space displayable range of enemy tags.\n<br />\n<br />[b]Enhanced Distance Scale[/b]: Make enemy tags shrink more noticeably at long distances.\n<br />\n<br />[b]Disable Aim Scale Up[/b]: Prevent enemy tags from scaling up when aiming.\n<br />\n<br />[b]Hide Distance Text[/b]: Hide the distance text on enemy tags.\n<br />\n<br />[b]Hide Off-Screen Icons[/b]: Hide off-screen enemy tag icons.\n<br />\n<br />[b]Enemy Tag Opacity[/b]: Adjust the opacity of enemy tags.\n<br />\n<br />[b]Fade When Aim[/b]: Fade out enemy tags when aiming.\n<br />\n<br />[b]Opacity[/b]: Set the opacity of faded enemy tags while aiming.\n<br />\n<br />[b]Customize Enemy Tag Color: [/b]Normal tag, Veteran tag, Arbites tag.\n<br />\n<br />\n<br />\n<br />[size=5][b]主要功能[/b][/size]\n<br />\n<br />减少屏幕边距：扩大敌人标签在屏幕上的可显示范围。\n<br />\n<br />增强距离缩放：使敌人标签在远距离时缩小得更明显。\n<br />\n<br />禁用瞄准缩放：防止敌人标签在瞄准时放大。\n<br />\n<br />隐藏距离文本：隐藏敌人标签上的距离文字。\n<br />\n<br />隐藏屏幕外图标：隐藏超出屏幕边缘的敌人标签图标。\n<br />\n<br />敌人标签不透明度：调整敌人标签的基础透明度。\n<br />\n<br />瞄准时淡出：瞄准时让敌人标签淡出显示。\n<br />\n<br />不透明度：设置瞄准时淡出后的标签透明度。\n<br />\n<br />自定义标签颜色：普通标签，老兵标签，法务官标签。\n<br />"
