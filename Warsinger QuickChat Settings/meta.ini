nexusDescription="Quick Chat by Zombine04 is required to use! \n<br />when you press certain callouts they will be pulled from a short list of possible lines that i seek to further refine in future releases of this mod. \n<br />The Morale check is a little flavor text addition that i like to use when coming up against an intimidating horde that i think i might choke when i fight and lose :O :(\n<br />or you can celebrate when the captain and his cronies go down to your team's well executed attack! :D :3 \n<br />either way please do not abuse it to flood the chat and use it to enhance you and your friends enjoyment of the game.\n<br />\n<br />HOW TO USE ?\n<br />Take the 'chat_settings' from this file, and use it to replace the chat settings in QuickChat, and you're good to go!\n<br />\n<br /> WHAT KIND OF CALLOUTS ARE IN HERE?\n<br />\n<br />Revive cover\n<br />Perils of the warp cover\n<br />Book cooldown (10seconds) (Chorus of Spiritual Fortitude)\n<br />Telekine dome cooldown (10 seconds) \n<br />Objective cover! You watch my back, i'll do the chores!\n<br />Sorry! good for when you meet me and blow me off the catwalk by blowing up a barrel :&lt;\n<br />Charge! let your team know you think its time to push your advantage, or you're just done with their stalling! Morrow keeps yelling at us!\n<br />Hold Ground! take no prisoners!\n<br />\n<br />PLANS!\n<br />i will make more lines made with the most requested personality, tailored to help you feel all snug in your grimdark persona. Right now im thinking zealot (i forget which i use but i digress) or loose cannon."
