nexusDescription="[size=4]Mission Progress[/size]\n<br />\n<br />[b]A feature-rich HUD mod that displays a visual progress bar for your mission, showing exactly how far you've come and what lies ahead.[/b]\n<br />\n<br />[size=4]What It Does[/size]\n<br />\n<br />Mission Progress adds a sleek progress bar to your HUD that tracks your mission completion in real-time. As you and your squad advance through the mission, the bar fills up, giving you instant feedback on your progress toward extraction. No more wondering \"are we almost done?\" – one glance tells you everything.\n<br />\n<br />[size=4]Key Features[/size]\n<br />\n<br />[size=3]Progress Tracking[/size]\n<br />[list]\n<br />[*]Visual progress bar showing mission completion percentage\n<br />[*]Real-time distance remaining to extraction (displayed in meters or kilometers)\n<br />[*]Smooth progress updates that prevent visual glitches from terrain irregularities\n<br />[/list]\n<br />Medicae Station Markers\n<br />[list]\n<br />[*]Shows the location of all medicae (healing) stations along your route\n<br />[*]Displays remaining charges for each station (full, partial, or empty)\n<br />[*]Passed stations are dimmed so you know what's still ahead\n<br />[/list]\n<br />[size=3]Respawn Beacon Markers[/size]\n<br />[list]\n<br />[*]Tracks respawn beacon positions along your path\n<br />[*]Quickly see upcoming rally points for your squad\n<br />[/list]\n<br />[size=3]Collectible Markers[/size]\n<br />[list]\n<br />[*][b]Grimoires [/b]– Purple markers show grimoire pickup locations\n<br />[*][b]Scriptures [/b]– Golden markers indicate scripture/tome positions\n<br />[*]Never miss a collectible again!\n<br />[/list]\n<br />\n<br />[size=4]15 Theme Presets\n<br />[/size]\n<br />Choose from lore-friendly themes that match your playstyle:\n<br />[b]Default [/b]– Subtle dark theme that blends with the HUD\n<br />[b]Minimal [/b]– Ultra-clean, thin bar with zero visual clutter\n<br />[b]Neon Cyber[/b] – Hot pink &amp; electric blue synthwave aesthetic\n<br />[b]Imperium [/b]– Gold and crimson – for the Emperor!\n<br />[b]Mechanicus [/b]– Red and teal – praise the Omnissiah\n<br />[b]Inquisition [/b]– Pure white and blood red – holy purity\n<br />[b]Chaos [/b]– Dark purple warp corruption\n<br />[b]Veteran [/b]– Military olive and khaki, standard issue\n<br />[b]Zealot [/b]– Orange flames – burn the heretic!\n<br />[b]Ogryn [/b]– Big and bold, for da big uns\n<br />[b]Psyker [/b]– Warp energy blue and purple\n<br />[b]Stealth [/b]– Nearly invisible until needed\n<br />[b]Hive World [/b]– Polluted amber industrial grime\n<br />[b]Void Born [/b]– Deep space cold blue\n<br />[b]Death Guard [/b]– Sickly green, Grandfather Nurgle's gifts\n<br />\n<br />[size=4]Full Customization\n<br />[/size][size=3]\n<br />Layout Options[/size]\n<br />[list]\n<br />[*]Orientation: Vertical or horizontal bar\n<br />[*]Screen position: Left or right edge (top/bottom for horizontal)\n<br />[*]Invert direction: Flip the 0%/100% ends\n<br />[*]Swap tag sides: Move percentage and markers to opposite side\n<br />[/list]\n<br />[size=3]Size &amp; Appearance[/size]\n<br />[list]\n<br />[*]Adjustable bar width (4-30 pixels)\n<br />[*]Adjustable bar height/length (100-500 pixels)\n<br />[*]Edge distance from screen border\n<br />[*]Vertical/horizontal offset for fine positioning\n<br />[*]Opacity control (10-100%)\n<br />[/list]\n<br />[size=3]Text Settings[/size]\n<br />[list]\n<br />[*]Font size (also scales marker tick sizes)\n<br />[*]Decimal precision for percentage (0, 1, or 2 decimals)\n<br />[*]Toggle distance display on/off\n<br />[*]Toggle percentage display on/off\n<br />[/list][size=3]\n<br />Marker Toggles[/size]\n<br />[list]\n<br />[*]Show/hide progress bar\n<br />[*]Show/hide medicae markers\n<br />[*]Show/hide beacon markers\n<br />[*]Show/hide grimoire markers\n<br />[*]Show/hide scripture markers\n<br />[/list]\n<br />[size=3]Custom Theme Mode[/size]\n<br />[list]\n<br />[*]Select \"Custom\" preset to unlock full RGB color control\n<br />[*]Customize bar background, fill, and border colors\n<br />[*]Override marker colors for any theme\n<br />[*]Create your own unique look\n<br />[/list][size=3]\n<br /> Keybind Support\n<br />[list]\n<br />[*]Set a hotkey to toggle the entire HUD on/off\n<br />[/list]\n<br />Requirements[/size]\n<br />[list]\n<br />[*]Darktide Mod Framework (DMF) https://www.nexusmods.com/warhammer40kdarktide/mods/8\n<br />[*]Darktide Mod Loader https://www.nexusmods.com/warhammer40kdarktide/mods/19\n<br />[/list]\n<br />[size=3]Installation[/size]\n<br />\n<br />[list=1]\n<br />[*]Extract the `mission_progress` folder to your Darktide `mods` directory\n<br />[*]Add `mission_progress` to your `mod_load_order.txt`\n<br />[*]Launch the game and access settings through the mod menu\n<br />[/list]\n<br />[size=3] Compatibility[/size]\n<br />\n<br />Works alongside other HUD mods. The progress bar is positioned on the screen edge to minimize interference with other UI elements."
