nexusDescription="[size=2](SOLO update and UI improvements are here! Future testing and feedback will help the project and things are still subject to changes)[/size][size=4]\n<br />\n<br />[/size][u][b][size=4]\n<br />What it does[/size][/b][/u]\n<br />\n<br />[size=4][b]Faith Meter – TEAM[color=#ff0000] (BETA[/color][/b][color=#ff0000][b])[/b][/color][/size][size=3]\n<br />\n<br />Faith Meter Team is a squad focus combat pressure version of the mod\n<br />\n<br />- It reflects how well your [b]team[/b] is holding the line under enemy pressure, not damage dealt, not kills (Though kills help), but [b]control[/b].\n<br />\n<br />- Special enemies that linger, overlapping threats, incapacitations, and poor recovery will weigh on the meter.\n<br />\n<br />- Strong teamwork, fast responses, and regained momentum will steady it. \n<br />\n<br />If pressure rises, Faith falters. Hold together, and the squad endures.\n<br />\n<br />Key Features[list]\n<br />[*]Team-based pressure tracking\n<br />[*]Special enemy threat awareness\n<br />[*]Squad recovery and stabilization feedback\n<br />[*]Mainly tested more around higher difficulties (May still need some tweaks)\n<br />[*]Attempted to be tuned for fairness, not punishment (Future tuning may need to be done)\n<br />[/list]MOD Notice:\n<br />This is the [b]team-focused beta build[/b].\n<br />Balance and behavior may evolve with feedback.\n<br />[b]For a personal, solo-focused experience, see the Faith Meter (Solo) \n<br />version.[/b]\n<br />\n<br />[color=#ffff00]Quick Disclaimer for compatibility:[/color]\n<br />Faith Meter - TEAM uses sound events, combat feed, team states, and HUD layering. Mods that also use:\n<br />\n<br />- Combat Feed type of tracking\n<br />- Sound event calling\n<br />- Player/Team trackers\n<br />- HUD elements that I use with the mod\n<br />May interfere with Faith Meter.[/size][size=3][size=3]\n<br />\n<br />[/size]\n<br />\n<br />[u][b][size=4]What it does[/size][/b][/u][/size][size=3]\n<br />[/size][size=3]\n<br />[/size][size=4][b]Faith Meter - SOLO [color=#ff0000](UPDATED)[/color][/b][/size][size=3]\n<br />\n<br />Faith Meter Solo is a personal focus, combat-pressure version of the mod.\n<br />\n<br />- It reflects how well [i]you[/i] are holding control under pressure, not damage dealt, not pure kill count (though kills and good handling help), but composure.\n<br />\n<br />- Unresolved specials/disablers, overlapping threats, and mistakes will weigh on the meter. Engaging slows the fall, but the surest way to steady Faith is to essentially clean the screen.\n<br />\n<br />- Recovery feels good when the situation stabilizes, but perfect Faith is earned. It’s harder to sit capped unless you keep playing clean and decisive.\n<br />\n<br />- Faith recovers when things calm down, but it’s harder to sit at max unless you keep playing clean\n<br />\n<br />- Unresolved specials/disablers create pressure over time, so you’re rewarded for dealing with threats quickly\n<br />\n<br />- Faith does not drain during empty downtime. No punishment for lulls or pacing\n<br />\n<br />- Faith freezes in the hub after games as a quiet end-of-mission reflection (resets on mission start at 50%)\n<br />\n<br />If pressure rises, Faith falters. Keep control, and you endure.\n<br />\n<br />[size=3][size=3]Key Features[list]\n<br />[*]Solo-focused pressure tracking\n<br />[*]Special enemy threat awareness and lingering pressure\n<br />[*]Recovery rhythm with brief post-hit pauses\n<br />[*]Optional difficulty tuning (Solo Challenge 1/2/3 + recovery taper toggle)\n<br />[*]Tuned to feel tense but fair. Pressure comes from threats and mistakes, not empty downtime\n<br />[/list]MOD Notice:\n<br />This is the [b]Solo-focused version of the mod[/b].\n<br />Balance and behavior may evolve with feedback.\n<br />[b]For a cooperative, Team-focused experience, see the Faith Meter (TEAM) \n<br />version.[/b][/size]\n<br />\n<br />[size=3][color=#ffff00]Quick Disclaimer for compatibility:[/color]\n<br />[/size][/size]Faith Meter (SOLO) uses player state hooks and custom HUD injection. Potential conflicts can come from mods that:\n<br />\n<br />- Also changes player status/combat state handling\n<br />- Also injects/replaces HUD elements If it overlaps with my elements (IE. The meter or the 'bar(s)' the mod is using to fill up and/ or empty)\n<br />- Also alters HUD layering/scaling/visibility\n<br />[u]If you see UI overlap or the meter not reacting correctly, try changing load order or disabling other mods to troubleshoot to pinpoint which one. I cannot test every single mod compatibility on the website, it is not humanly possible. I can just make it so it tries to play nice with others.[/u]\n<br />\n<br />\n<br />[/size]\n<br />[u][b][size=4]Built in HUD customization and MOD options[/size][/b][/u][size=3]\n<br />\n<br />New SOLO difficulty settings, adding a simple difficulty selector so you can choose how sweaty you want the meter:\n<br />[b]Solo Challenge: 1 / 2 / 3[/b][b]\n<br />1 (Low / Forgiving):[/b] gentler pressure and slower escalation\n<br />\n<br />[b]2 (Standard / Tense but Fair):[/b] a “fight the meter” experience [i](default)\n<br />\n<br />[/i][b]3 (High / Hardest):[/b] stronger pressure, faster escalation, and less forgiveness\n<br />\n<br />[b]Tapered Recovery Near Max (ON/OFF):\n<br />[/b][b]ON (default):[/b] recovery slows near the top, so perfect play matters\n<br />[b]OFF:[/b] smoother recovery all the way up if you prefer a more relaxed flow\n<br />\n<br />\n<br />[b][color=#ffff00][size=4][u]PLEASE NOTE:[/u][/size][/color][/b] [b]The biggest “Hard vs Standard” difference is in the lingering + high faith zones (As I like to call them).[/b]\n<br />As an example, IF a special enemy doesn't linger for about 10–20 seconds, Hard can feel close to Standard. A further example of that is that if you are killing specials quickly (within a few seconds), or not staying in the high-faith band while pressure persists, …then Hard won’t feel dramatically different because the parts that make it harder aren’t being triggered long enough.[size=3] AKA You're purty gud. Harder difficulties may be incorporated in the future if requested. But it needs testing and I am just but 1 man.[/size]\n<br />\n<br />What mainly shows between hard and standard is: \n<br />- [b]High Faith maintenance tax (stronger in Hard)[/b]: you notice it most when you’re sitting ~85–100 Faith [i]while pressure is still active[/i].\n<br />- [b]Lingering escalation (stronger/faster in Hard)[/b]: it only ramps up meaningfully after the special has been left past the grace window, and then accumulates from there over several intervals.\n<br />\n<br />\n<br />\n<br />[b]Faith Meter - TEAM[/b] and [b]SOLO [/b]are fully configurable via Mod Options\n<br />\n<br />I am not going to bother listing all the configurable options here as there is a ton, I basically made this open source, edit it to your complete heart's content. But I will be updating the base form here so it will be subject to changes.\n<br />\n<br />\n<br />Please report any crashes, errors, concerns, or hell, even feature ideas! Would love to hear the feedback. Thank you for downloading!\n<br />Design updates may be coming to make it clearer/ nicer to look at! Just need testing, is all.[/size]"
