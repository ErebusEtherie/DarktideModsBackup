nexusDescription="[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[size=3][font=Arial]I have been steadily working on Enemies Improved for a while now, and after an early-access period in the Darktide Modding Discord - It is finally time to release my next mod to the world on Nexusmods![/font][/size]\n<br />\n<br />[size=3][font=Arial]Enemies Improved is a combination of a bunch of brand-new (Made from scratch) features that focus on *improving* enemies within Darktide. Right now, this includes healthbars, debuff tracking, special attack warnings, outlines and above-head markers. A more in-depth overview of all of these features can be found in the sections below. [/font][/size]\n<br />\n<br />[size=3][font=Arial]Enemies Improved was built from the ground-up with customisation in mind. What you see in the screenshots and by default is purely how I have customised the UI for my current tastes. Many features, layouts and colours can be customised via the in-game mod settings menu. Further down the page you will find a more in-depth look at each setting and what you can adjust.[/font][/size]\n<br />\n<br />[size=3][font=Arial]I have made Enemies improved to be as optimised, smooth and bug-free as possible, building on features as time went on. This means you should get a smooth experience even in scenes with many enemies all at once. I have collected my findings and knowledge of Darktide modding from the past few years into every nook and cranny of this mod, consider it my pièce de résistance of my Darktide modding journey. [/font][/size]\n<br />\n<br />[size=3][font=Arial]Also, yes. I am fully aware of other mods on Nexus that on the surface level may seem to achieve similar results. Just know that Enemies Improved was built by my hands over hundreds of hours of writing code, testing and iterating over a period of several months. I built this to achieve a cohesive healthbar/debuff/warning system that was optimised and customisable to fit my needs, and hopefully you can find enjoyment from this too![/font][/size]\n<br />\n<br />[size=3][font=Arial]Every 'module' can be completely disabled from the mod settings menu too, so if you only want the debuff tracking, or just the special attack warnings - you can decide.[/font][/size]\n<br />\n<br />[size=3][font=Arial]Please take a look at the rest of the page for a deeper-dive into Enemies Improved, and be sure to check out the FAQ/Compatibility section at the bottom.[/font][/size]\n<br />\n<br />[center][size=6][font=Impact]PRETTY MUCH EVERYTHING CAN BE CUSTOMISED :D[/font][/size][/center]\n<br />[center][size=1][font=Impact]PLEASE READ AT LEAST SOME OF THE DESCRIPTION BELOW[/font][/size][/center]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[right]﻿[/right]\n<br />[center][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776540068-599783353.gif[/img][/center]\n<br />\n<br />[center][b][i][size=6][font=Serif]HEALTHBARS[/font][/size][/i][/b]\n<br />[left][size=4][font=Serif][b]OVERVIEW[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbars have been made from scratch, which allows for much more customisation, more features and means they are highly optimised.[/font][/size][/left]\n<br />[left][/left]\n<br />[left][font=Arial][b][size=3]Features include:[/size][/b][/font][/left]\n<br />[left][size=3][font=Arial]- Health tracking.[/font][/size][/left]\n<br />[left][size=3][font=Arial]- Three customisable text-based zones for enemy names, enemy class, armour type and current health.[/font][/size][/left]\n<br />[left][size=3][font=Arial]- An optional class icon depicting the class of the enemy.[/font][/size][/left]\n<br />[left][size=3][font=Arial]- A single, clustered healthbar to track a large horde of enemies. Hordes of over 20 mobs can be combined into one single health pool, which follows the center point of the horde, and combines all of that horde's health into a single bar for a more boss-like and usable horde healthbar tracking.[/font][/size][/left]\n<br />[left][size=3][font=Arial]- Damage numbers showing how much damage you have dealt to the enemy. [/font][/size][/left]\n<br />[left][size=3][font=Arial]- Loads of customisation options (Over 1000 combos and counting, please check out the in-game settings!)[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][font=Serif][b]EXAMPLES[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Enemy type-based healthbar categories:[/font][/size][/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-2012155758.png[/img][/left]\n<br />[left][/left]\n<br />[left]2 different examples of customisation, with 1000s of other combinations available:[/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182763-786985366.png[/img][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182763-1108306649.png[/img][/left]\n<br />[left][/left]\n<br />[left]Horde clustered healthbar:[/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-1252648948.png[/img][/left]\n<br />[/center]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][i][size=6][font=Serif][b]DEBUFFS &amp; DoT TRACKING[/b][/font][/size][/i][/center]\n<br />[left][size=4][font=Serif][b]OVERVIEW[/b][/font][/size]\n<br />[size=3][font=Arial]Debuff tracking has been created, allowing you to track all damage-over-time based effects (such as bleeding, toxin etc) and utility-based debuffs (such as rend, increased damage etc). All in a highly optimised and customisable fashion with icons and grouping available.[/font][/size][size=3][font=Arial]\n<br />\n<br />[b]Features include:[/b]\n<br />- Damage-over-time and utility debuff tracking for enemies.\n<br />- Recognisable icons for each debuff group.\n<br />- Stack and percentage-based details to show exactly what is applied.\n<br />- Sticks to either the healthbar or to the body of the enemy.\n<br />- Optionally combine similar debuffs together from multiple sources.\n<br />- Optionally see exactly where each debuff is sourced from by it's skill name or blesssing.[/font][/size]\n<br />\n<br />[size=4][font=Serif][b]EXAMPLES[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Non-abbreviated full text debuffs, with sources shown:[/font][/size]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-1269549014.png[/img][/left]\n<br />[left][/left]\n<br />[left]Abbreviated debuff and icon only debuff mods:[/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-1353485616.png[/img][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-1259935654.png[/img][/left]\n<br />[left][/left]\n<br />[left]Debuffs can be positioned on the healthbar, or directly on the body:[/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182766-1419920034.png[/img][/left]\n<br />[left][/left]\n<br />[left]New in 1.5.05+: Horizontal Debuff mode![/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1777319047-1553100112.png[/img][/left]\n<br />[center]﻿﻿[img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][i][b][size=6][font=Serif]OVERHEAD MARKERS[/font][/size][/b][/i][/center]\n<br />[left][size=4][font=Serif][b]OVERVIEW[/b][/font][/size]\n<br />[size=3][font=Arial]Overhead markers have been added to each enemy, allowing you a minimal way to see enemies from afar.[/font][/size][size=3][font=Arial]\n<br />\n<br />[b]Features include:[/b]\n<br />- A diamond shaped icon that sticks above the enemies head[/font][/size]\n<br />- Optional minimal quadrant-based healthbar (25%, 50%, 75%, 100%) which acts as a minimal alternative to a full blown healthbar.[/left]\n<br />[left]\n<br />[size=4][font=Serif][b]EXAMPLES[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Above head markers example:[/font][/size]\n<br />[img width=180,height=280]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776341698-2025647254.png[/img][img width=285,height=285]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776885324-950538851.png[/img][/left]\n<br />\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][i][b][size=6][font=Serif]OUTLINES[/font][/size][/b][/i][/center]\n<br />[center][left][size=4][font=Serif][b]OVERVIEW[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Outlines have been added to each enemy type letting you decide which enemies you would like outlines to show on, and also offers full customisation.[/font][/size][size=3][font=Arial]\n<br />\n<br />[b]Features include:[/b]\n<br />- Outlines for specific enemies.\n<br />- Full occlusion on outlines to stop them becoming a wall-hack (visibility based).[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][font=Serif][b]EXAMPLES[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Enemy type specific outlines and colour choices:[/font][/size][/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182765-1336465946.png[/img][/left]\n<br />[left][/left]\n<br />[/center]\n<br />[center]﻿[img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][b][i][size=6][font=Serif]SPECIAL ATTACK WARNING[/font][/size][/i][/b][/center]\n<br />[center][left][size=4][font=Serif][b]OVERVIEW[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbars, outlines and overhead markers can display a special attack warning for certain enemies. This can be toggled to be a flash or solid colour, and supports colour customisation. [/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=3][font=Arial]These warnings will display when an enemy is performing a special attack (Like a crusher cleave, or a mutant charge) to help you spot them in a crowd and get out the way![/font][/size][/left]\n<br />[left][/left]\n<br />[left]Enemies Improved also uses it's very own \"Animation tracking\", where most mods with this kind of functionality are only based  on sound events, Enemies Improved also tracks special attacks by animations, which in some instances can be fired whole seconds beforehand - so you will get even more warning![/left]\n<br />[left][/left]\n<br />[left][size=4][font=Serif][b]EXAMPLES[/b][/font][/size][/left]\n<br />[left][size=3][font=Arial]Enemy sniper special attack warning:[/font][/size][/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776183003-702463852.gif[/img][/left]\n<br />[left][/left]\n<br />[left]Enemy crusher special attack warning:[/left]\n<br />[left][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776183003-1611506549.gif[/img][/left]\n<br />[/center]\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][size=6][font=Serif][b][i]STAGGER DETECTION[/i][/b][/font][/size][/center]\n<br />[center][left][b]OVERVIEW[/b][/left]\n<br />[left]Stagger detection is a whole new system with a custom debuff or outlines available to show on enemies if an enemy is in a staggered state. [/left]\n<br />[left][/left]\n<br />[left]This can be toggled to be a flash or solid colour, and supports colour customisation. [/left]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1777123596-462773803.png[/img][/center]\n<br />\n<br />[center]﻿[img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][b][size=6][font=Serif]SETTINGS &amp; CUSTOMISATION[/font][/size][/b][/center]\n<br />[left][size=4][font=Arial][b]Currently available settings:[/b][/font][/size][/left]\n<br />[left][size=2][font=Arial](Please note that these will be different depending on the version of the mod you are using, it's best to check them out in game, but this should give you a brief overview of the some of the levels of customisation)[/font][/size][/left]\n<br />[left][/left]\n<br />[spoiler][left][b][size=4][font=Serif]GENERAL SETTINGS:[/font][/size][/b][/left]\n<br />[left][size=3][font=Arial]Draw Distance: How far enemies are detected.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Global Opacity: Adjust the alpha for all enemies improved elements.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Depth Fading: Toggle depth and stacking fading, see example:[/font][/size][/left]\n<br />[left][size=3][font=Arial][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776182765-504522521.png[/img][/font][/size][/left]\n<br />[left][size=3][font=Arial]Outlines (Global): Toggle outlines globally.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Font Type (Global): Adjust the font face for all enemies improved UI elements.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Text Scale (Global): Adjust the text sizes for all enemies improved UI elements.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Main Font colour: Set a main font colour to use.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Secondary Font colour: Set a spot colour to use for the secondary fonts.[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][b][font=Serif]HEALTHBARS:[/font][/b][/size][/left]\n<br />[left][size=3][font=Arial]Global Toggle: Toggle the entire Healthbars feature.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Icon Toggle (Global): Toggle the beside-healthbar enemy type icon globally.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Individual Horde Toggle: Toggle individual healthbars for horde enemies.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Clustered Horde Toggle: Toggle grouped healthbars for hordes of over 20 enemies.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Only show if damaged: Hides healthbars unless the enemy is damaged.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle Damage Numbers: Choose to show damage numbers on hitting enemies.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Choose a background frame: Pick a background frame for your healthbars for different aesthetics.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Change padding size of background frame: Adjust the size of the background frame.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Width: Adjust the width of the whole healthbar.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Height: Adjust the height of the whole healthbar.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Pick a text-data option for slots 1, 2 and 3: Customisable text options for the three lines on the healthbar, can be entirely disabled if you wish.[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][b][font=Serif]DEBUFFS:[/font][/b][/size][/left]\n<br />[left][size=3][font=Arial]Global Toggle: Toggle the debuff module entirely.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Damage-over-time toggle: Toggle only DoT debuffs.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Utility toggle: Toggle only Utility debuffs.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Split debuff types: Split DoT and utility debuffs into their own widgets.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Abbreviate debuff names: Shorten debuff names for easier reading.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Combine similar debuffs: Combine debuffs that apply the same effect to the enemy, despite the source.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Show debuff text names: Show the text-based names of the debuffs.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Fade out names after delay: Fades the text-based names of debuffs after a short delay.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Position on body of enemy: Choose to position debuffs on either the healthbar or the body of the enemy.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle debuffs on horde enemies: Toggle debuffs on hordes, e.g. poxwalkers etc.[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][b][font=Serif]MARKERS:[/font][/b][/size][/left]\n<br />[left][size=3][font=Arial]Global Toggle: Toggle the overhead markers module[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle for horde enemies: Enable overhead markers for horde enemies[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][b][font=Serif]SPECIAL ATTACKS:[/font][/b][/size][/left]\n<br />[left][size=3][font=Arial]Toggle Overhead Markers: Toggle special attack warnings for overhead markers.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle Healthbars: Toggle special attack warnings for healthbars.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle Outlines: Toggle special attack warnings for outlines.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Toggle Flash: Choose between a solid colour or flashing for accessibility.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Adjust pulse speed: If flashing, adjust the rate at which the outline will pulse on warning.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Pick an outline colour: Pick a colour for special attacks.[/font][/size][/left]\n<br />[left][/left]\n<br />[left][size=4][b][font=Serif]PER-ENEMY TYPE:[/font][/b][/size][/left]\n<br />[left][i][size=3][font=Arial]EACH OF THESE ARE SET PER ENEMY TYPE (horde, monster, melee elite etc)[/font][/size][/i][/left]\n<br />[left][size=3][font=Arial]Outline Toggle: Toggle outlines for this enemy type.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Outline Colour: Pick a colour for outlines .[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Toggle: Toggle healthbars for this enemy type.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Colour: Pick a colour for the healthbars.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Icon Toggle: Toggle the healthbar-adjacent icon for this enemy type.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Icon Scale: Adjust the icon scale.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Icon Glow: Add a glowing effect to the icon.[/font][/size][/left]\n<br />[left][size=3][font=Arial]Healthbar Icon Colour: Adjust the colour of the healthbar icon.[/font][/size][/left]\n<br />[/spoiler]\n<br />[left][/left]\n<br />[left][/left]\n<br />[center][/center]\n<br />[size=3][font=Arial]There are loads of options in the settings page to fully customise many aspects of Enemies Improved. Please be sure to check them out to decide what suits you best![/font][/size]\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776183934-2352312.gif[/img]\n<br />\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][b][i][size=6][font=Serif]COMPATABILITY [/font][/size][/i][/b][/center]\n<br />﻿[size=3][font=Arial]Enemies improved has different compatabilities depending on which modules you enable.[/font][/size]\n<br />\n<br />[size=3][font=Arial]Although, as enemies improved uses all it's own systems - there won't be too many true incompatibilies, there will mostly be just overlapping functionality.[/font][/size]\n<br />\n<br />[size=3][font=Arial]As you can probably expect, the 'healthbars' module will be overlapping with other mods that add/edit healthbars. [/font][/size]\n<br />\n<br />[size=3][font=Arial]The 'buffs' module will be overlapping with other mods that add debuff tracking etc.[/font][/size]\n<br />\n<br />[i][size=3][font=Arial]Also, as always, I just made this as a fun thing that I wanted to do, and to have all the features I wanted from this kind of thing. [/font][/size][/i]\n<br />[i][size=3][font=Arial]I don't want any beef or drama or whatever - just making some mods for a game and community I love[/font][/size][/i]\n<br />\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[center][b][i][size=6][font=Serif]F.A.Q[/font][/size][/i][/b][/center]\n<br />Nothing yet\n<br />\n<br />[right][img]https://staticdelivery.nexusmods.com/mods/4943/images/809/809-1776192175-1159142530.png[/img][/right]\n<br />[right]Herby found something cool and wanted to show you :)[/right]\n<br />[center][img]https://europe1.discourse-cdn.com/flex013/uploads/fatshark/original/3X/1/d/1d61096b3cb70207ca288c8670d809f9e2afbfef.png[/img][/center]\n<br />[size=3]If you would like more QoL improvements, check out some of my other mods:[/size]\n<br />\n<br />[size=4][b]\"Improved\" Series[/b][/size]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/344]How Did I Get That[/url]﻿\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/347]Character Cosmetics View Improved[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/346]Weapon Cosmetics View Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/348]Commodore's Vestures Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/355]Penance View Improved\n<br />[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/360/]Rolling Steel Timer Improved[/url][url=https://www.nexusmods.com/warhammer40kdarktide/mods/382]\n<br />Mourningstar Dialogue Improved[/url]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/809]Enemies Improved\n<br />[/url] [url=https://www.nexusmods.com/warhammer40kdarktide/mods/864]Alf's Mod Settings Extension[/url]\n<br />\n<br />[size=4][b]\"Markers\" Series\n<br />[/b][/size][i]All-in-One:[/i]\n<br />[url=https://www.nexusmods.com/warhammer40kdarktide/mods/447]Markers Improved All-in-One[/url]﻿\n<br />\n<br />[size=2]All of my mods are designed to fit seamlessly together, and improve each other.[/size]\n<br />\n<br />\n<br />[code][code]\n<br />[url=https://ko-fi.com/alfthebigheaded][img]https://ko-fi.com/img/githubbutton_sm.svg[/img][/url]\n<br />[/code][/code]\n<br />"
