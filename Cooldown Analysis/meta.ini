nexusDescription="[size=4][b]Description[/b][/size]\n<br />[color=#ffffff]Tracks combat ability cooldown durations during missions. Displays a bar chart of per-use cooldowns with aggregate statistics. Psyker: also records Warp Siphon stacks at each use. Sessions are saved to %appdata%&#92;Fatshark&#92;Darktide&#92;cooldown_analysis  for historical review.[/color]\n<br />\n<br />[size=4][b]Installation instructions[/b][/size]\n<br />[color=#ffffff]Extract the cooldown_analysis folder to your mods folder in the 'steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE` directory, or use the Nexus Mod Manager/Darktide Mod Loader (https://www.nexusmods.com/warhammer40kdarktide/mods/19) to install it automatically. [/color]\n<br />\n<br />[size=4][b]Main features[/b][/size]\n<br />[color=#ffffff]This mod tracks when your combat ability is used and how long the resulting cooldown is. I mostly created this to see the benefit of Warp Siphon, but it's an interesting bit of data for any class using cooldown reduction talents. The default key to open the mod is F10, but this can be changed.[/color]\n<br />\n<br />[color=#ffffff]The options currently available are: [/color]\n<br />\n<br />[color=#ffffff]- Open Cooldown History - change which button opens the interface[/color]\n<br />[color=#ffffff]- Debug messages - toggle debug messages relevant to this mod on or off[/color]\n<br />[color=#ffffff]- Delete old entries - automatically delete entries once you hit a certain file count\n<br />- Number of save files - how many files you keep before automatic deleting starts [/color]\n<br />\n<br />Important note: this mod was created using the help of generative AI."
