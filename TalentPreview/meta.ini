nexusDescription="[img]https://staticdelivery.nexusmods.com/mods/4943/images/707/707-1769056682-1045011321.png[/img]\n<br />[b]Description:[/b]\n<br />When you’re in the lobby, each occupied player slot will display:\n<br />[list]\n<br />[*][b]Talent icons[/b] for the talents they have selected in their build (includes hive scum stim talents)\n<br />[*]Icons are pulled directly from their current talent setup\n<br />[*][b]Hover tooltips[/b] work just like the normal talent screen (title + description)\n<br />[*]Automatically updates if someone changes their build\n<br />[*][b]Press Tab (on pc) to hide the talents[/b]\n<br />[/list]\n<br />Talent groupings are displayed in a clean order so they’re easier to read:\n<br />[list]\n<br />[*]Keystones\n<br />[*]Stat nodes\n<br />[*]Default talents\n<br />[*](Modifiers are shown too, when applicable)\n<br />[*]Tree graph will show on hover over the profile frame area, [b]CLICK ON THIS AREA TO LOCK THE TREE GRAPH IN PLACE[/b]\n<br />[*][img]https://staticdelivery.nexusmods.com/mods/4943/images/707/707-1769391263-412992512.png[/img]\n<br />[/list]Settings / Customization Talent Preview includes several settings so you can adjust it to your UI preferences:\n<br />[list]\n<br />[*][b]Enable in Lobby[/b]\n<br />[list]\n<br />[*]Turn the preview on/off instantly\n<br />[/list][*][b]Icon Size[/b]\n<br />[list]\n<br />[*]Make icons larger or smaller\n<br />[/list][*][b]Icons Per Row[/b]\n<br />[list]\n<br />[*]Control how many icons appear in each row before wrapping\n<br />[/list][*][b]Preview Offset X / Y[/b]\n<br />[list]\n<br />[*]Move the preview position  with the x and y sliders to your liking\n<br />[/list][/list]Tooltip support -&gt; Hovering over any icon shows:\n<br />[list]\n<br />[*]Talent name\n<br />[*]Talent type label\n<br />[*]Full talent description\n<br />[*]Correct scaling for the number of points spent\n<br />[/list]So you can check talent details without opening the full talent menu through other mods, all inside the pre-game countdown screen.\n<br />\n<br />[b]Installation:[/b]\n<br />[list]\n<br />[*]Extract the mod into your MODS folder.\n<br />[*]Your mods folder is typically located here if installed through Steam: ..&#92;Steam&#92;steamapps&#92;common&#92;Warhammer 40,000 DARKTIDE&#92;mods\n<br />[*]Place the TalentPreview folder inside ...&#92;Warhammer 40,000 DARKTIDE&#92;mods folder.\n<br />[*]Launch the game and enjoy!\n<br />[/list]\n<br />[b]Settings:\n<br />[/b][img]https://staticdelivery.nexusmods.com/mods/4943/images/707/707-1769392457-46237472.png[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/707/707-1769392465-1879609760.png[/img]\n<br />[img]https://staticdelivery.nexusmods.com/mods/4943/images/707/707-1769392473-1704486418.png[/img]\n<br />[b]Changelog:[/b]\n<br />[list]\n<br />[*][b]1.0.0 [/b]\n<br />[/list][b]   ﻿- [/b]Initial release\n<br />[list]\n<br />[*][b]1.1.0[/b]\n<br />[/list][b]   ﻿- [/b]Implemented backgrounds,  some stability improvements, and additional talents added\n<br />[list]\n<br />[*][b]1.1.5[/b]\n<br />[/list]   ﻿- Implemented tree hover and tree sticky graph views. Slight changes to how talents are retrieved\n<br />[b]Roadmap[/b]\n<br />[list]\n<br />[*]?1.2.0 - Localization for Japanese, Mandarin, Korean, French, Russian, Spanish, Portuguese, Polish, and German\n<br />[/list][b]Bugs[/b]\n<br />[list]\n<br />[*]? Some icons might have odd backgrounds, will take a look into a way fix this issue\n<br />[/list][b]Bug Reports[/b]\n<br />[list]\n<br />[*]Please find me on Discord [url=https://discordapp.com/users/264193933381337088]LAUREHTE[/url]\n<br />[*]WHEN YOU MESSAGE FOR BUG REPORTS PLEASE ATTACH THE LOG FILE RIGHT AFTER YOUR GAME CRASHES OR ANY RELEVENT IMAGES/VIDEOS EXPLAINING THE ISSUE\n<br />[*]Log can be found at ...&#92;AppData&#92;Roaming&#92;Fatshark&#92;Darktide&#92;console_logs\n<br />[*][b]Please sort by recents and send the correct log for the session that caused the issue (if you crashed and started the game again, the most recent log will not be the correct previous crashed log)[/b]\n<br />[*]To reach AppData, type %appdata% and press Enter in your Windows search bar\n<br />[*]Additionally, you can make a bug report here on Nexus if you are sure this mod is causing your crashes/performance issue/bugs\n<br />[*][b]To be sure, this mod is causing issues and/or crashes, [/b]\n<br />[/list][list=1]\n<br />[*][b]FIRST[/b], turning all mods off (including this one and any dependencies it has), except modloader and the DMF framework mods. Does your issue reproduce? Then your game/modloader/DMF is causing the crashes. \n<br />[*][b]Second, turn only the DEPENDENCIES[/b] (if it has any) for this mod (not the mod itself). Does it reproduce? If so, the dependency is the issue, not the mod. \n<br />[*][b]Finally[/b], if you turn on this mod and you finally can reproduce the crash/issues consistently after multiple times, then THIS MOD is potentially the issue, and you need to contact me with your log file from the location in the previous notes, or post the \"Script Error\" section of your log that should indicate which mod/package is causing the issue\n<br />[/list]\n<br />[b]Credits:[/b]\n<br />[list]\n<br />[*][b]For tooltip and description methods: [url=https://www.nexusmods.com/profile/xsSplater?gameId=4943]xsSplater's Profile - Nexus Mods[/url] - [url=https://www.nexusmods.com/warhammer40kdarktide/mods/210]Enhanced Descriptions at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[*][b]For icon rendering methods: [url=https://www.nexusmods.com/profile/RRMLLNV?gameId=4943]RRMLLNV's Profile - Nexus Mods[/url] - [url=https://www.nexusmods.com/warhammer40kdarktide/mods/683]TalentUI at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[*][b]For Tree implementations: [/b]Kevinna\n<br />[*][b]For [zh - cn] translations:[/b] DingXiang233\n<br />[/list]\n<br />\n<br />[b]My other Mods:\n<br />[list]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/687]RitualZones - Pathfinding Utilities at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/665]MiniAudioAddon at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/686]SlowMode at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[*][b][url=https://www.nexusmods.com/warhammer40kdarktide/mods/669]ElevatorMusic at Warhammer 40,000: Darktide Nexus - Mods and community[/url][/b]\n<br />[/list][/b]"
