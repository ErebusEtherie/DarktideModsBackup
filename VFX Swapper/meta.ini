nexusDescription="[size=5][i][center]﻿*[u]IMPORTANT[/u]*﻿[/center][u]\n<br />[/u][/i][/size][size=3]This mod has some overlapping settings with vfx_limiter, and those options will not work at [i]best[/i] and could cause issues. vfx_limiter is also known to be related to a specific crash (package_manager.lua:502 if you must know). However, if you absolutely insist on continuing to use vfx_limiter in spite of this, please download the optional file, which I have altered to be compatible. That file does [i]not[/i] fix the crashing issue, but I acknowledge some people want what they want. \n<br />/end of *[b][i][u]IMPORTANT[/u][/i][/b]* announcement\n<br />\n<br />\n<br />This mod was originally my own altered version of vfx_limiter where I added some more VFX to swap around and removed the settings I found to be related to the above-mentioned crash. BIG thanks to leerH for writing the original (without which I likely would not have made this one), and for giving me permission for uploading this one, which is of course based on his original. \n<br />\n<br />VFX that are swappable (as of 1.0):\n<br />[/size][list]\n<br />[*]Tox Grenade gas (cultist grenadier)\n<br />[*]Renegade Flame Grenades (this won't show in psykhanium, but works in mission, don't ask me why)\n<br />[*]Renegade Flamer\n<br />[*]Cultist Flamer\n<br />[*]Zealot's Immolation grenade\n<br />[*](havoc) Rotten Armor lingering gas (after death)\n<br />[*](havoc) The Blight Spreads nurgle goo pools (after death)\n<br />[/list]Various VFX that can be swapped in place of the listed effects above. Some are simply shorter versions of the same (green and red flame, for example), while others are complete replacements. One such effect is what I'm calling \"Flat Black Circles\" which can be hard to see by themselves, which is why...\n<br />\n<br />VFX with circular (toggle-able) AoE indicators (à la Danger Zone):\n<br />[list]\n<br />[*](havoc) Rotten Armor lingering gas (after death)\n<br />[*](havoc) The Blight Spreads nurgle goo pools (after death)\n<br />[/list]\n<br />Additionally, the \"deathsplosions\" for the above mutators (and rampaging enemies' orange \"shockwave\")when affected enemies die have been removed. \n<br />Bonus thanks to [b]all[/b] the helpful modders in the discord (literally, all of them - I don't want to list them for fear that I'd leave someone out)!"
